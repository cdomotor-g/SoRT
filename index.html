      selectedTableIndex = i; renderManage();
    });

    const up = iconBtn("↑","Move up", ()=>{ if(i>0){ swap(defs.tables,i,i-1); selectedTableIndex=i-1; afterStructuralChange(); }});
    const down = iconBtn("↓","Move down", ()=>{ if(i<defs.tables.length-1){ swap(defs.tables,i,i+1); selectedTableIndex=i+1; afterStructuralChange(); }});
    const dup = iconBtn("⧉","Duplicate", ()=>duplicateTable(i));
    const del = iconBtn("🗑","Delete table", ()=>deleteTable(i), true);
    [up,down,dup,del].forEach(b=>card.appendChild(b));
    listEl.appendChild(card);
  });
}

function renderOptionSets(){
  const wrap = document.getElementById("setList");
  wrap.innerHTML = "";
  const names = Object.keys(defs.optionSets);
  if(!names.length){
    wrap.innerHTML = `<div class="hint" style="font-size:.82rem;color:var(--ink-soft);">No shared sets. Rows can still use their own custom lists.</div>`;
    return;
  }
  names.forEach(name=>{
    const usedIn = defs.tables
      .filter(t=>effectiveRows(t).some(r=>r.optionSet === name))
      .map(t=>t.label);
    const box = document.createElement("div");
    box.className = "oset";
    const head = document.createElement("div");
    head.className = "oset-head";
    const nameInput = document.createElement("input");
    nameInput.value = name;
    nameInput.title = "Set name (used by rows)";
    nameInput.addEventListener("change", ()=>renameOptionSet(name, nameInput.value.trim()));
    const del = iconBtn("🗑","Delete set", ()=>deleteOptionSet(name), true);
    head.appendChild(nameInput);
    head.appendChild(del);

    const ta = document.createElement("textarea");
    ta.value = defs.optionSets[name].join("\n");
    ta.placeholder = "One option per line. A line starting with '### ' is a heading.";
    ta.addEventListener("input", ()=>{
      defs.optionSets[name] = ta.value.split("\n");
      afterTextChange();
    });

    box.appendChild(head);
    box.appendChild(ta);
    if(usedIn.length){
      const u = document.createElement("div");
      u.className = "used-in";
      u.textContent = "Used in: " + usedIn.join(", ");
      box.appendChild(u);
    }
    wrap.appendChild(box);
  });
}

function renderTableEditor(){

  if(!table){

    <div class="ed-section ed-grid">
      <div class="ed-field">
        <label>Tab label</label>
        <input type="text" id="tLabel" value="${escapeHtml(table.label)}">
      </div>
      <div class="ed-field">
        <label>Table ID</label>

        <span class="hint">Internal key — keep it short & unique.</span>
      </div>
      <div class="ed-field full">
        <label>Printed title (top of the copied table)</label>
        <input type="text" id="tTitle" value="${escapeHtml(table.title)}">
      </div>
    </div>
    <div class="ed-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">

  const lbl = document.getElementById("tLabel");
  lbl.addEventListener("input", ()=>{
    table.label = lbl.value;

// Dropdown to add an existing common row into the selected table.
function renderAddCommonToTable(table){
  const host = document.getElementById("addCommonToTable");
  if(!host) return;
  host.innerHTML = "";
  const shared = defs.sharedRows || [];
  if(!shared.length){
    host.innerHTML = `<span class="hint">No common rows yet — create some under “Common rows”, then add them here.</span>`;
    return;
  }
  const available = shared.filter(sr=>!tableUsesShared(table, sr.id));
  const label = document.createElement("span");
  label.className = "hint";
  label.textContent = available.length ? "Add a common row:" : "All common rows are already in this table.";
  host.appendChild(label);
  if(!available.length) return;
  const sel = document.createElement("select");
  sel.innerHTML = `<option value="">Choose a common row…</option>` +
    available.map(sr=>`<option value="${escapeHtml(sr.id)}">${escapeHtml(sr.item || sr.id)}</option>`).join("");
  const btn = document.createElement("button");
  btn.className = "mini-btn";
  btn.textContent = "Add to table";
  btn.addEventListener("click", ()=>{ if(sel.value) addSharedRefToTable(table, sel.value); });
  host.appendChild(sel);
  host.appendChild(btn);
}

function renderRowEditors(table){
  const host = document.getElementById("rowEditors");
  host.innerHTML = "";
  if(!table.rows.length){
    host.innerHTML = `<div class="hint" style="color:var(--ink-soft);">No rows yet — click “+ Add row”.</div>`;
    return;
  }
  table.rows.forEach((entry, i)=>{
    if(isSharedRef(entry)) host.appendChild(buildSharedRefCard(table, entry, i));
    else host.appendChild(buildRowEditor(table, entry, i));
  });
}

// The collapsible body shared by the inline-row editor and the common-row
// editor. opts.onId customises how a row-ID change is handled; opts.onTitle
// keeps the header title in sync as the user types.
function buildRowBody(row, opts){
  opts = opts || {};
  const body = document.createElement("div");
  body.className = "ed-row-body";
  body.innerHTML = `
    <div class="ed-grid">
      <div class="ed-field">
        <label>Item name</label>
        <input type="text" class="f-item" value="${escapeHtml(row.item)}">
      </div>
      <div class="ed-field">
        <label>Row ID</label>
        <input type="text" class="f-id" value="${escapeHtml(row.id)}">
      </div>
      <div class="ed-field">
        <label>Instruction (grey helper)</label>
        <input type="text" class="f-instruction" value="${escapeHtml(row.instruction)}">
      </div>
      <div class="ed-field">
        <label>Selection type</label>
        <select class="f-type">
          <option value="single"${row.type==="single"?" selected":""}>Single choice (radio)</option>
          <option value="multi"${row.type==="multi"?" selected":""}>Multiple choice (checkbox)</option>
          <option value="none"${row.type==="none"?" selected":""}>No options (fields / text only)</option>
        </select>
      </div>
      <div class="ed-field">
        <label>Icon (shown in the Scope Builder)</label>
        <div class="icon-pick">
          <button type="button" class="icon-pick-btn f-icon"></button>
          <button type="button" class="mini-btn f-icon-clear">Remove</button>
        </div>
      </div>
      <div class="ed-field full">
        <label>Approval note (amber box, optional)</label>
        <input type="text" class="f-note" value="${escapeHtml(row.note || "")}">
      </div>
    </div>
    <div class="ed-section optionsBlock"></div>
    <div class="ed-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <label style="font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;">Fields (free-text inputs)</label>
        <button class="mini-btn btnAddField">+ Add field</button>
      </div>
      <div class="field-editor fieldEditor"></div>
    </div>
    <div class="ed-section">
      <label style="font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:6px;">Site Map pin</label>
      <div class="mappin-editor mapPinEditor"></div>
    </div>
  `;

  // text inputs (no re-render)
  const itemInput = body.querySelector(".f-item");
  itemInput.addEventListener("input", ()=>{
    row.item = itemInput.value;
    if(opts.onTitle) opts.onTitle(row.item || "(untitled row)");
    afterTextChange();
  });
  body.querySelector(".f-id").addEventListener("change", (e)=>{
    const v = e.target.value.trim();
    if(opts.onId) opts.onId(v);
    else { row.id = v; afterStructuralChange(); }
  });
  body.querySelector(".f-instruction").addEventListener("input", (e)=>{ row.instruction = e.target.value; afterTextChange(); });
  body.querySelector(".f-note").addEventListener("input", (e)=>{ row.note = e.target.value; afterTextChange(); });
  body.querySelector(".f-type").addEventListener("change", (e)=>{
    const newType = e.target.value;
    row.type = newType;
    if(newType === "none"){
      // options no longer relevant; keep nothing stray
    } else if(!row.optionSet && !Array.isArray(row.options)){
      row.options = [];
    }
    row._open = true;
    afterStructuralChange();
  });
  const iconPickEl = body.querySelector(".f-icon");
  const iconClearEl = body.querySelector(".f-icon-clear");
  const syncIconPick = ()=>{
    iconPickEl.innerHTML = row.icon
      ? `<span class="cur">${escapeHtml(row.icon)}</span><span>Change icon…</span>`
      : `<span>Choose icon…</span>`;
    iconClearEl.classList.toggle("hidden", !row.icon);
  };
  const setIcon = (icon)=>{
    if(icon) row.icon = icon; else delete row.icon;
    syncIconPick();
    if(opts.onIcon) opts.onIcon(row.icon || "");
    afterTextChange();
  };
  syncIconPick();
  iconPickEl.addEventListener("click", ()=>openIconPicker(row.icon || "", setIcon));
  iconClearEl.addEventListener("click", ()=>setIcon(""));
  body.querySelector(".btnAddField").addEventListener("click", ()=>{
    if(!row.fields) row.fields = [];
    const taken = row.fields.map(f=>f.key);
    row.fields.push({ key: uniqueId("field", taken), label:"New field", type:"text" });
    row._open = true;
    afterStructuralChange();
  });

  renderOptionsBlock(body.querySelector(".optionsBlock"), row);
  renderFieldEditor(body.querySelector(".fieldEditor"), row);
  renderMapPinEditor(body.querySelector(".mapPinEditor"), row);
  return body;
}

/* Editor for a row's optional Site Map pin (§4). Declaring a pin here is what
   makes a new coordinate row a *definitions* edit rather than a code change. */
const MAP_PIN_COLOURS = ["red","orange","blue","purple","green","teal"];
function renderMapPinEditor(host, row){
  host.innerHTML = "";
  const enable = document.createElement("label");
  enable.className = "mappin-enable";
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = !!row.mapPin;
  enable.appendChild(cb);
  enable.appendChild(document.createTextNode(" This row carries a coordinate for the Site Map"));
  host.appendChild(enable);

  const detail = document.createElement("div");
  detail.className = "mappin-detail";
  host.appendChild(detail);

  const fieldKeys = (row.fields || []).map(f => f.key).filter(Boolean);

  function drawDetail(){
    detail.innerHTML = "";
    if(!row.mapPin){ detail.classList.add("hidden"); return; }
    detail.classList.remove("hidden");
    const mp = row.mapPin;

    // Which field holds the coordinate.
    const fieldWrap = document.createElement("div");
    fieldWrap.className = "ed-field";
    fieldWrap.innerHTML = `<label>Coordinate field (which field above holds the lat/long)</label>`;
    if(fieldKeys.length){
      const sel = document.createElement("select");
      fieldKeys.forEach(k=>{
        const o = document.createElement("option"); o.value = k; o.textContent = k;
        o.selected = k === mp.field; sel.appendChild(o);
      });
      if(!fieldKeys.includes(mp.field)){ const o=document.createElement("option"); o.value=mp.field; o.textContent=mp.field+" (missing)"; o.selected=true; sel.appendChild(o); }
      sel.addEventListener("change", ()=>{ mp.field = sel.value; afterTextChange(); });
      fieldWrap.appendChild(sel);
    } else {
      const inp = document.createElement("input");
      inp.type = "text"; inp.placeholder = "field key"; inp.value = mp.field || "";
      inp.addEventListener("change", ()=>{ mp.field = inp.value.trim(); afterTextChange(); });
      fieldWrap.appendChild(inp);
      const h = document.createElement("span"); h.className="hint"; h.textContent="Add a field above first, then pick it here.";
      fieldWrap.appendChild(h);
    }
    detail.appendChild(fieldWrap);

    // Label + colour.
    const grid = document.createElement("div");
    grid.className = "ed-grid";
    grid.innerHTML = `
      <div class="ed-field"><label>Pin label</label><input type="text" class="mp-label" value="${escapeHtml(mp.label||"")}"></div>
      <div class="ed-field"><label>Pin colour</label><select class="mp-colour">${
        MAP_PIN_COLOURS.map(c=>`<option value="${c}"${(mp.colour||"red")===c?" selected":""}>${c}</option>`).join("")
      }</select></div>`;
    grid.querySelector(".mp-label").addEventListener("input", e=>{ mp.label = e.target.value; afterTextChange(); });
    grid.querySelector(".mp-colour").addEventListener("change", e=>{ mp.colour = e.target.value; afterTextChange(); });
    detail.appendChild(grid);

    // Flags.
    const flags = document.createElement("div");
    flags.className = "mappin-flags";
    const onLbl = document.createElement("label");
    const onCb = document.createElement("input"); onCb.type="checkbox"; onCb.checked = mp.defaultOn !== false;
    onCb.addEventListener("change", ()=>{ mp.defaultOn = onCb.checked; afterTextChange(); });
    onLbl.appendChild(onCb); onLbl.appendChild(document.createTextNode(" Ticked by default on the map"));
    const anLbl = document.createElement("label");
    const anCb = document.createElement("input"); anCb.type="checkbox"; anCb.checked = !!mp.anchor;
    anCb.addEventListener("change", ()=>{ if(anCb.checked) mp.anchor = true; else delete mp.anchor; afterTextChange(); });
    anLbl.appendChild(anCb); anLbl.appendChild(document.createTextNode(" Default map centre (anchor)"));
    flags.appendChild(onLbl); flags.appendChild(anLbl);
    detail.appendChild(flags);

    // Optional gate: show this pin only when another row's answer is / isn't X.
    const gate = document.createElement("div");
    gate.className = "mappin-gate";
    const hasReq = !!(mp.requires && mp.requires.row);
    const gcb = document.createElement("label");
    const gEnable = document.createElement("input"); gEnable.type="checkbox"; gEnable.checked = hasReq;
    gEnable.addEventListener("change", ()=>{
      if(gEnable.checked) mp.requires = { row:"", not:"No" }; else delete mp.requires;
      afterTextChange(); drawDetail();
    });
    gcb.appendChild(gEnable); gcb.appendChild(document.createTextNode(" Only show when another row's answer gates it"));
    gate.appendChild(gcb);
    if(hasReq){
      const gg = document.createElement("div");
      gg.className = "ed-grid";
      const rowIds = (activeManageTable() ? effectiveRows(activeManageTable()).map(r=>r.id) : []);
      gg.innerHTML = `
        <div class="ed-field"><label>Gate on row ID</label><input type="text" class="mp-req-row" list="mpReqRows" value="${escapeHtml(mp.requires.row||"")}"></div>
        <div class="ed-field"><label>Condition</label>
          <div style="display:flex;gap:6px;align-items:center;">
            <select class="mp-req-kind"><option value="not"${mp.requires.not!=null?" selected":""}>is NOT</option><option value="equals"${mp.requires.equals!=null?" selected":""}>equals</option></select>
            <input type="text" class="mp-req-val" style="flex:1" value="${escapeHtml(mp.requires.not!=null?mp.requires.not:(mp.requires.equals!=null?mp.requires.equals:""))}">
          </div>
        </div>`;
      const dl = document.createElement("datalist"); dl.id="mpReqRows";
      rowIds.forEach(id=>{ const o=document.createElement("option"); o.value=id; dl.appendChild(o); });
      gg.appendChild(dl);
      gg.querySelector(".mp-req-row").addEventListener("change", e=>{ mp.requires.row = e.target.value.trim(); afterTextChange(); });
      const kindSel = gg.querySelector(".mp-req-kind");
      const valInp = gg.querySelector(".mp-req-val");
      const applyGate = ()=>{
        const kind = kindSel.value, v = valInp.value;
        delete mp.requires.not; delete mp.requires.equals;
        mp.requires[kind] = v;
        afterTextChange();
      };
      kindSel.addEventListener("change", applyGate);
      valInp.addEventListener("input", applyGate);
      gate.appendChild(gg);
    }
    detail.appendChild(gate);
  }

  cb.addEventListener("change", ()=>{
    if(cb.checked){
      row.mapPin = { field: fieldKeys[0] || "", label: row.item || "", colour:"red", defaultOn:true };
    } else {
      delete row.mapPin;
    }
    afterTextChange();
    drawDetail();
  });
  drawDetail();
}
// The table currently open in Manage Tables (used to offer gate row-ID hints).
function activeManageTable(){
  return (defs && defs.tables && defs.tables[selectedTableIndex]) ? defs.tables[selectedTableIndex] : null;
}

function buildRowEditor(table, row, i){
  const box = document.createElement("div");
  box.className = "ed-row" + (row._open ? " open" : "");

  const head = document.createElement("div");
  head.className = "ed-row-head";
  head.innerHTML = `
    <span class="caret">▶</span>
    <span class="er-icon"${row.icon ? "" : ` style="display:none"`}>${escapeHtml(row.icon || "")}</span>
    <span class="er-title">${escapeHtml(row.item || "(untitled row)")}</span>
    <span class="er-type">${row.type}</span>`;
  head.addEventListener("click", (e)=>{
    if(e.target.closest(".icon-btn")) return;
    row._open = !box.classList.contains("open");
    box.classList.toggle("open");
  });
  const up = iconBtn("↑","Move up", ()=>{ if(i>0){ swap(table.rows,i,i-1); afterStructuralChange(); }});
  const down = iconBtn("↓","Move down", ()=>{ if(i<table.rows.length-1){ swap(table.rows,i,i+1); afterStructuralChange(); }});
  const dup = iconBtn("⧉","Duplicate row", ()=>duplicateRow(table,i));
  const mk = iconBtn("✦","Make this a common (shared) row so other tables can use it", ()=>promoteRowToShared(table,i));
  const del = iconBtn("🗑","Delete row", ()=>deleteRow(table,i), true);
  [up,down,dup,mk,del].forEach(b=>head.appendChild(b));
  box.appendChild(head);

  box.appendChild(buildRowBody(row, {
    onTitle: (t)=>{ head.querySelector(".er-title").textContent = t; },
    onIcon: (ic)=>{ const el = head.querySelector(".er-icon"); el.textContent = ic; el.style.display = ic ? "" : "none"; }
  }));
  return box;
}

// A locked card shown in the table editor for a { shared:<id> } reference.
// The definition is edited under "Common rows"; here you only reorder or remove.
function buildSharedRefCard(table, entry, i){
  const sr = sharedRowById(entry.shared);
  const box = document.createElement("div");
  box.className = "ed-row ref";
  const head = document.createElement("div");
  head.className = "ed-row-head";
  head.innerHTML = `
    <span class="er-shared">shared</span>
    ${sr && sr.icon ? `<span class="er-icon">${escapeHtml(sr.icon)}</span>` : ""}
    <span class="er-title">${escapeHtml(sr ? (sr.item || "(untitled row)") : entry.shared)}</span>
    <span class="er-type">${sr ? sr.type : "missing"}</span>`;
  const up = iconBtn("↑","Move up", ()=>{ if(i>0){ swap(table.rows,i,i-1); afterStructuralChange(); }});
  const down = iconBtn("↓","Move down", ()=>{ if(i<table.rows.length-1){ swap(table.rows,i,i+1); afterStructuralChange(); }});
  const remove = iconBtn("✕","Remove from this table (keeps the common row)", ()=>{ table.rows.splice(i,1); afterStructuralChange(); }, true);
  [up,down,remove].forEach(b=>head.appendChild(b));
  box.appendChild(head);

  const note = document.createElement("div");
  note.className = "ref-note";
  if(sr){
    note.innerHTML = `Shared common row — edit it under <button class="link-btn" type="button">Common rows</button> to change it in every table at once.`;
    note.querySelector(".link-btn").addEventListener("click", ()=>openCommonRow(entry.shared));
  } else {
    note.innerHTML = `⚠ References a missing common row “${escapeHtml(entry.shared)}”. Remove it, or recreate that common row.`;
  }
  box.appendChild(note);
  return box;
}

function renderOptionsBlock(host, row){
  host.innerHTML = "";
  if(!rowHasOptions(row)){
    host.innerHTML = `<div class="hint" style="color:var(--ink-soft);font-size:.78rem;">This row shows no option list.</div>`;
    return;
  }
  const usingSet = !!row.optionSet;
  const setNames = Object.keys(defs.optionSets);

  const source = document.createElement("div");
  source.className = "opt-source";
  source.innerHTML = `
    <label><input type="radio" name="src_${cssEscape(row.id)}_${Math.random().toString(36).slice(2,6)}" class="srcCustom" ${usingSet?"":"checked"}> Custom list</label>
    <label><input type="radio" class="srcShared" ${usingSet?"checked":""} ${setNames.length?"":"disabled"}> Shared set</label>
  `;
  host.appendChild(source);

  if(usingSet){
    const sel = document.createElement("select");
    sel.className = "f-set";
    setNames.forEach(n=>{
      const o = document.createElement("option");
      o.value = n; o.textContent = n; o.selected = n === row.optionSet;
      sel.appendChild(o);
    });
    sel.addEventListener("change", ()=>{ row.optionSet = sel.value; afterTextChange(); });
    const field = document.createElement("div");
    field.className = "ed-field";
    field.innerHTML = `<label>Which shared set</label>`;
    field.appendChild(sel);
    const hint = document.createElement("span");
    hint.className = "hint";
    hint.textContent = `${rowOptions(row).length} option(s). Edit the list under “Shared option sets”.`;
    field.appendChild(hint);
    host.appendChild(field);
  } else {
    const field = document.createElement("div");
    field.className = "ed-field full";
    field.innerHTML = `<label>Options — one per line ('### Heading' for a divider)</label>`;
    const ta = document.createElement("textarea");
    ta.style.minHeight = "90px";
    ta.value = (row.options || []).join("\n");
    ta.addEventListener("input", ()=>{ row.options = ta.value.split("\n"); afterTextChange(); });
    field.appendChild(ta);
    host.appendChild(field);
  }

  source.querySelector(".srcCustom").addEventListener("change", (e)=>{
    if(!e.target.checked) return;
    row.options = rowOptions(row).slice();   // seed from whatever was resolving
    delete row.optionSet;
    afterStructuralChange();
  });
  const sharedRadio = source.querySelector(".srcShared");
  sharedRadio.addEventListener("change", (e)=>{
    if(!e.target.checked) return;
    row.optionSet = setNames[0];
    delete row.options;
    afterStructuralChange();
  });
}

function renderFieldEditor(host, row){
  host.innerHTML = "";
  const fields = row.fields || [];
  if(!fields.length){
    host.innerHTML = `<div class="hint" style="color:var(--ink-soft);font-size:.78rem;">No fields. These render as free-text inputs beneath the options.</div>`;
    return;
  }
  fields.forEach((f, i)=>{
    const r = document.createElement("div");
    r.className = "fe-row";
    const key = document.createElement("input");
    key.type = "text"; key.placeholder = "key"; key.value = f.key;
    key.addEventListener("change", ()=>{ f.key = key.value.trim(); afterTextChange(); });
    const label = document.createElement("input");
    label.type = "text"; label.placeholder = "Label shown to user"; label.value = f.label;
    label.addEventListener("input", ()=>{ f.label = label.value; afterTextChange(); });
    const type = document.createElement("select");
    type.innerHTML = `<option value="text"${f.type==="text"?" selected":""}>Text</option><option value="textarea"${f.type==="textarea"?" selected":""}>Text area</option>`;
    type.addEventListener("change", ()=>{ f.type = type.value; afterTextChange(); });
    const del = iconBtn("🗑","Remove field", ()=>{ row.fields.splice(i,1); if(!row.fields.length) delete row.fields; afterStructuralChange(); }, true);
    r.appendChild(key); r.appendChild(label); r.appendChild(type); r.appendChild(del);
    host.appendChild(r);
  });
}

/* ---- editor mutations ---- */
function swap(arr,a,b){ const t=arr[a]; arr[a]=arr[b]; arr[b]=t; }

function addTable(){
  const taken = defs.tables.map(t=>t.id);
  const id = uniqueId("table", taken);
  defs.tables.push({ id, label:"New Table", title:"New Table", rows:[] });
  selectedTableIndex = defs.tables.length - 1;
  afterStructuralChange();
}
function duplicateTable(i){
  const copy = clone(defs.tables[i]);
  copy.id = uniqueId(copy.id + "-copy", defs.tables.map(t=>t.id));
  copy.label = copy.label + " (copy)";
  defs.tables.splice(i+1, 0, copy);
  selectedTableIndex = i+1;
  afterStructuralChange();
}
function deleteTable(i){
  if(!confirm(`Delete table "${defs.tables[i].label}" and all its rows?`)) return;
  defs.tables.splice(i,1);
  if(selectedTableIndex >= defs.tables.length) selectedTableIndex = Math.max(0, defs.tables.length-1);
  afterStructuralChange();
}
function addRow(table){
  const id = uniqueId("row", table.rows.map(r=>r.id));
  const row = { id, item:"New row", instruction:"", type:"single", options:["Option 1"], _open:true };
  table.rows.push(row);
  afterStructuralChange();
}
function duplicateRow(table, i){
  const copy = clone(table.rows[i]);
  copy.id = uniqueId(copy.id + "-copy", table.rows.map(r=>r.id));
  copy._open = true;
  table.rows.splice(i+1, 0, copy);
  afterStructuralChange();
}
function deleteRow(table, i){
  if(!confirm(`Delete row "${table.rows[i].item}"?`)) return;
  table.rows.splice(i,1);
  afterStructuralChange();
}
function addOptionSet(){
  const base = "newSet";
  const name = uniqueId(base, Object.keys(defs.optionSets));
  defs.optionSets[name] = ["Option 1"];
  afterStructuralChange();
}
function renameOptionSet(oldName, newName){
  if(!newName || newName === oldName){ renderOptionSets(); return; }
  if(defs.optionSets[newName]){ alert(`A set named "${newName}" already exists.`); renderOptionSets(); return; }
  // Rebuild keeping order.
  const rebuilt = {};
  Object.keys(defs.optionSets).forEach(k=>{
    rebuilt[k === oldName ? newName : k] = defs.optionSets[k];
  });
  defs.optionSets = rebuilt;
  // Update references on inline table rows and shared/common rows.
  defs.tables.forEach(t=>t.rows.forEach(r=>{ if(!isSharedRef(r) && r.optionSet === oldName) r.optionSet = newName; }));
  (defs.sharedRows || []).forEach(r=>{ if(r.optionSet === oldName) r.optionSet = newName; });
  afterStructuralChange();
}
function deleteOptionSet(name){
  const users = [];
  (defs.sharedRows || []).forEach(r=>{ if(r.optionSet === name) users.push(r); });
  defs.tables.forEach(t=>t.rows.forEach(r=>{ if(!isSharedRef(r) && r.optionSet === name) users.push(r); }));
  const msg = users.length
    ? `Delete set "${name}"? ${users.length} row(s) use it — they will keep a copy of the current options as a custom list.`
    : `Delete set "${name}"?`;
  if(!confirm(msg)) return;
  const values = defs.optionSets[name] || [];
  users.forEach(r=>{ delete r.optionSet; r.options = values.slice(); });
  delete defs.optionSets[name];
  afterStructuralChange();
}

/* ---- common (shared) rows: library editor + mutations ---- */
function renderCommonRows(){
  const host = document.getElementById("commonRowList");
  if(!host) return;
  host.innerHTML = "";
  const rows = defs.sharedRows || [];
  if(!rows.length){
    host.innerHTML = `<div class="hint" style="color:var(--ink-soft);">
      No common rows yet. Click “+ Add common row”, or open a table above, expand a row and
      click ✦ to “make common”.</div>`;
    return;
  }
  rows.forEach((row,i)=>host.appendChild(buildSharedRowEditor(row,i)));
}

function buildSharedRowEditor(row, i){
  const box = document.createElement("div");
  box.className = "ed-row" + (row._open ? " open" : "");
  box.dataset.sharedId = row.id;

  const head = document.createElement("div");
  head.className = "ed-row-head";
  head.innerHTML = `
    <span class="caret">▶</span>
    <span class="er-shared">shared</span>
    <span class="er-icon"${row.icon ? "" : ` style="display:none"`}>${escapeHtml(row.icon || "")}</span>
    <span class="er-title">${escapeHtml(row.item || "(untitled row)")}</span>
    <span class="er-type">${row.type}</span>`;
  head.addEventListener("click", (e)=>{
    if(e.target.closest(".icon-btn")) return;
    row._open = !box.classList.contains("open");
    box.classList.toggle("open");
  });
  const up = iconBtn("↑","Move up", ()=>{ if(i>0){ swap(defs.sharedRows,i,i-1); afterStructuralChange(); }});
  const down = iconBtn("↓","Move down", ()=>{ if(i<defs.sharedRows.length-1){ swap(defs.sharedRows,i,i+1); afterStructuralChange(); }});
  const dup = iconBtn("⧉","Duplicate common row", ()=>duplicateSharedRow(i));
  const del = iconBtn("🗑","Delete common row", ()=>deleteSharedRow(i), true);
  [up,down,dup,del].forEach(b=>head.appendChild(b));
  box.appendChild(head);

  const body = buildRowBody(row, {
    onTitle: (t)=>{ head.querySelector(".er-title").textContent = t; },
    onIcon: (ic)=>{ const el = head.querySelector(".er-icon"); el.textContent = ic; el.style.display = ic ? "" : "none"; },
    onId: (v)=>renameSharedRow(row, v)
  });
  const users = tablesUsingShared(row.id);
  const usage = document.createElement("div");
  usage.className = "ref-note";
  usage.innerHTML = users.length
    ? `In use by: ${users.map(t=>escapeHtml(t.label)).join(", ")}.`
    : `Not in any table yet — tick it in from the <b>Table Map</b>, or a table's “add common row”.`;
  body.appendChild(usage);
  box.appendChild(body);
  return box;
}

// Expand a common row's editor and scroll to it (switching to Manage first).
function openCommonRow(id){
  const sr = sharedRowById(id);
  if(!sr) return;
  sr._open = true;
  if(mode !== "manage") setMode("manage");
  else renderManage();
  setTimeout(()=>{
    const el = document.querySelector(`#commonRowList [data-shared-id="${cssEscape(id)}"]`);
    if(el) el.scrollIntoView({ behavior:"smooth", block:"center" });
  }, 40);
}

function addSharedRow(){
  if(!Array.isArray(defs.sharedRows)) defs.sharedRows = [];
  const id = uniqueId("commonRow", defs.sharedRows.map(r=>r.id));
  defs.sharedRows.push({ id, item:"New common row", instruction:"", type:"single", options:["Option 1"], _open:true });
  afterStructuralChange();
}
function duplicateSharedRow(i){
  const copy = clone(defs.sharedRows[i]);
  copy.id = uniqueId(copy.id + "-copy", defs.sharedRows.map(r=>r.id));
  copy.item = (copy.item || "") + " (copy)";
  copy._open = true;
  defs.sharedRows.splice(i+1, 0, copy);
  afterStructuralChange();
}
function deleteSharedRow(i){
  const row = defs.sharedRows[i];
  const users = tablesUsingShared(row.id);
  const msg = users.length
    ? `Delete common row "${row.item}"? It will be removed from ${users.length} table(s): ${users.map(t=>t.label).join(", ")}.`
    : `Delete common row "${row.item}"?`;
  if(!confirm(msg)) return;
  defs.tables.forEach(t=>{ t.rows = t.rows.filter(e=>!(isSharedRef(e) && e.shared === row.id)); });
  defs.sharedRows.splice(i,1);
  afterStructuralChange();
}
function renameSharedRow(row, newId){
  const old = row.id;
  newId = (newId || "").trim();
  if(!newId){ afterStructuralChange(); return; }
  if(newId === old){ afterTextChange(); return; }
  if(defs.sharedRows.some(r=>r !== row && r.id === newId)){
    alert(`A common row with ID "${newId}" already exists.`); renderManage(); return;
  }
  row.id = newId;
  defs.tables.forEach(t=>t.rows.forEach(e=>{ if(isSharedRef(e) && e.shared === old) e.shared = newId; }));
  afterStructuralChange();
}
// Promote an inline table row into a reusable common row, replacing it in place
// with a reference so this table keeps showing it.
function promoteRowToShared(table, i){
  const row = table.rows[i];
  if(isSharedRef(row)) return;
  if(!Array.isArray(defs.sharedRows)) defs.sharedRows = [];
  const sharedId = uniqueId(row.id || "commonRow", defs.sharedRows.map(r=>r.id));
  const def = clone(row);
  def.id = sharedId;
  def._open = true;
  defs.sharedRows.push(def);
  table.rows[i] = { shared: sharedId };
  afterStructuralChange();
}
function addSharedRefToTable(table, sharedId){
  if(!sharedRowById(sharedId)) return;
  if(tableUsesShared(table, sharedId)) return;
  if(table.rows.some(e=>!isSharedRef(e) && e.id === sharedId)){
    alert(`This table already has its own row with ID "${sharedId}". Rename or remove it before adding the common row.`);
    return;
  }
  table.rows.push({ shared: sharedId });
  afterStructuralChange();
}
function removeSharedRefFromTable(table, sharedId){
  table.rows = table.rows.filter(e=>!(isSharedRef(e) && e.shared === sharedId));
  afterStructuralChange();
}

function iconBtn(glyph, title, handler, danger){
  const b = document.createElement("button");
  b.className = "icon-btn" + (danger ? " danger" : "");
  b.type = "button";
  b.title = title;
  b.textContent = glyph;
  b.addEventListener("click", (e)=>{ e.stopPropagation(); handler(); });
  return b;
}

/* ===================== DATA SOURCE ACTIONS ===================== */
const importFileEl = document.getElementById("importFile");

function mStatus(msg, isError){
  // Target the status line inside whichever editor view is visible.
  const host = mode === "map" ? mapView : (mode === "ps" ? psManageView : manageView);
  const el = host ? host.querySelector(".status-msg") : null;
  if(!el) return;
  el.textContent = msg;
  el.style.color = isError ? "var(--danger)" : "var(--accent-dark)";
  setTimeout(()=>{ if(el) el.textContent = ""; }, 4000);
}

function exportDefinitions(){
  const data = JSON.stringify(exportableDefinitions(), null, 2) + "\n";
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = DEFINITIONS_FILE;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  mStatus("Downloaded " + DEFINITIONS_FILE);
}

importFileEl.addEventListener("change", (e)=>{
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      applyDefinitions(parsed, "imported");
      writeLocal();                       // persist the imported copy…
      localStorage.removeItem(LS_URL);    // …and forget any remembered URL
      mStatus("Imported " + file.name);
    }catch(err){
      mStatus("Import failed: " + err.message, true);
    }
    importFileEl.value = "";
  };
  reader.readAsText(file);
});

function promptLoadUrl(){
  const existing = localStorage.getItem(LS_URL) || "";
  const url = prompt("URL of a definitions.json to load (e.g. a SharePoint / on-prem link):", existing);
  if(url === null) return;
  const trimmed = url.trim();
  if(!trimmed){ localStorage.removeItem(LS_URL); mStatus("Cleared saved URL."); return; }
  loadFromUrl(trimmed, true);
}

async function loadFromUrl(url, remember){
  try{
    mStatus("Loading…");
    const d = await fetchDefs(url);
    if(remember) localStorage.setItem(LS_URL, url);
    localStorage.removeItem(LS_DEFS);   // URL is authoritative until edited
    applyDefinitions(d, "url");
    mStatus("Loaded from URL.");
  }catch(err){
    mStatus("Load failed: " + err.message, true);
  }
}

function resetToPublished(){
  if(!confirm("Discard local edits and reload the published definitions file? This clears your in-browser copy.")) return;
  localStorage.removeItem(LS_DEFS);
  localStorage.removeItem(LS_URL);
  boot(true);
}

async function fetchDefs(url){
  const res = await fetch(url, { cache:"no-store" });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const json = await res.json();
  if(!json || typeof json !== "object" || !Array.isArray(json.tables)){
    throw new Error("not a valid definitions file");
  }
  return json;
}

// Set new definitions from any source and refresh everything.
function applyDefinitions(raw, origin){
  defs = normalizeDefinitions(raw);
  defsOrigin = origin;
  selectedTableIndex = 0;
  reconcileState();
  renderSourceChip();
  renderBuilder();
  if(mode === "manage") renderManage();
  else if(mode === "map") renderMap();
  else if(mode === "ps") renderPsManage();
}

function renderSourceChip(){
  const map = {
    remote: ["", "Definitions: central store (published)"],
    file:   ["", "Definitions: published file"],
    url:    ["", "Definitions: loaded from URL"],
    imported:["local", "Definitions: imported file (browser only)"],
    local:  ["local", "Definitions: unpublished changes in this browser"],

/* ===================== TABLE MAP (common rows × tables) ===================== */
function renderMap(){
  if(!defs){ mapView.innerHTML = renderNoDefsHtml(); wireNoDefs(); return; }
  const shared = defs.sharedRows || [];
  const tables = defs.tables;
  const issues = collectIssues();

  const publishActions = REMOTE_ON
    ? `<button class="btn btn-primary" id="btnPublishMap">Publish to central store</button>
       <button class="btn btn-secondary" id="btnReloadMap">Reload latest</button>`
    : `<button class="btn btn-primary" id="btnExportMap">Export JSON</button>`;

  let gridHtml;
  if(!shared.length || !tables.length){
    gridHtml = `<div class="empty-state">
      <h3>${shared.length ? "No tables to map yet" : "No common rows yet"}</h3>
      <p>${shared.length
          ? "Add a table under <b>Manage Tables</b>, then tick common rows into it here."
          : "Common rows are rows shared across tables. Add one below, or open a table under <b>Manage Tables</b>, expand a row and click ✦ <b>Make common</b>."}</p>
      <button class="btn btn-primary" id="btnAddCommonMapEmpty">+ Add common row</button>
    </div>`;
  } else {
    const head = `<tr><th class="corner">Common row</th>${
      tables.map(t=>`<th>${escapeHtml(t.label || "(untitled)")}<br><span style="font-weight:400;font-size:.72rem;">${t.rows.length} row(s)</span></th>`).join("")
    }</tr>`;
    const body = shared.map(sr=>{
      const cells = tables.map(t=>{
        const on = tableUsesShared(t, sr.id);
        return `<td class="cell" data-shared="${escapeHtml(sr.id)}" data-table="${escapeHtml(t.id)}">
          <input type="checkbox" ${on ? "checked" : ""} aria-label="${escapeHtml(sr.item || sr.id)} in ${escapeHtml(t.label)}">
        </td>`;
      }).join("");
      return `<tr>
        <th class="row-head">${sr.icon ? `<span class="row-icon">${escapeHtml(sr.icon)}</span>` : ""}${escapeHtml(sr.item || sr.id)}<span class="map-type">${sr.type}</span>
          ${sr.instruction ? `<span class="r-instr">${escapeHtml(sr.instruction)}</span>` : ""}</th>
        ${cells}
      </tr>`;
    }).join("");
    gridHtml = `<div class="map-scroll"><table class="map-grid"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
  }

  mapView.innerHTML = `
    <div class="admin-actions">
      ${publishActions}
      <button class="btn btn-secondary" id="btnAddCommonMap">+ Add common row</button>
      <span class="grow"></span>
      <span class="status-msg" id="mStatusMap"></span>
    </div>
    <div class="admin-note map-intro">
      Tick a box to include that <b>common row</b> in a table; untick to remove it. Only rows shared
      across tables appear here — a table's own one-off rows live under <b>Manage Tables</b>.
      Changes are saved in <b>this browser</b>${REMOTE_ON ? ` — click <b>Publish</b> to share them` : ``}.
    </div>
    ${issues.length ? `<div class="warn-banner"><b>Please fix before publishing:</b><ul>${issues.map(i=>`<li>${escapeHtml(i)}</li>`).join("")}</ul></div>` : ""}
    ${gridHtml}
  `;

  const bind = (id, fn)=>{ const el = document.getElementById(id); if(el) el.addEventListener("click", fn); };
  bind("btnAddCommonMap", addSharedRow);
  bind("btnAddCommonMapEmpty", addSharedRow);
  if(REMOTE_ON){ bind("btnPublishMap", publishToRemote); bind("btnReloadMap", reloadFromRemote); }
  else bind("btnExportMap", exportDefinitions);

  mapView.querySelectorAll("td.cell input[type=checkbox]").forEach(cb=>{
    cb.addEventListener("change", ()=>{
      const td = cb.closest("td.cell");
      const table = defs.tables.find(t=>t.id === td.getAttribute("data-table"));
      const sid = td.getAttribute("data-shared");
      if(!table) return;
      if(cb.checked) addSharedRefToTable(table, sid);
      else removeSharedRefFromTable(table, sid);
    });
  });
}

/* =========================================================================
   PROPERTY SERVICES  — separate table shown at the bottom of the Scope Builder
   and copied into Word as its own second table.
   -------------------------------------------------------------------------
   Answers live in state[tableId].__ps = { answers:{key:val}, dirty:{key:true} }.
   Fields with a `source` mirror an answer from the active scope table (coords,
   relocation…). The mirror is *live until the user edits it*: the first manual
   change sets dirty[key], after which the entered value sticks (an override the
   user can revert). This one-way, visible link is the "safe" interaction model —
   scope answers flow down into Property Services, never the other way.
   ========================================================================= */
function psDef(){ return (defs && defs.propertyServices) ? defs.propertyServices : DEFAULT_PROPERTY_SERVICES; }

// The orifice / "Water Level site details only" rows are only *required* on a
// water-level table. Detect one by its river-line row or its title.
function isWaterLevelTable(table){
  if(!table) return false;
  if(effectiveRows(table).some(r=>r.id === "riverCoords")) return true;
  return /water\s*level/i.test(((table.title||"") + " " + (table.label||"")));
}
function todayStr(){
  const d = new Date();
  return String(d.getDate()).padStart(2,"0") + "/" +
         String(d.getMonth()+1).padStart(2,"0") + "/" + d.getFullYear();
}
function psState(tableId){
  if(!state[tableId]) state[tableId] = {};
  if(!state[tableId].__ps) state[tableId].__ps = { answers:{}, dirty:{} };
  const ps = state[tableId].__ps;
  if(!ps.answers) ps.answers = {};
  if(!ps.dirty) ps.dirty = {};
  return ps;
}
// Pull a value out of the active scope table's answers (field:null = selected).
function psDerive(table, source){
  if(!source || !table) return "";
  const rs = state[table.id] && state[table.id][source.row];
  if(!rs) return "";
  if(source.field == null){
    return Array.isArray(rs.selected) ? rs.selected.join(", ") : (rs.selected || "");
  }
  return (rs.fields && rs.fields[source.field]) ? String(rs.fields[source.field]) : "";
}
// Effective text value for a coord/text/date key: user override → derived → default.
function psEffectiveText(table, key, source, def){
  const ps = psState(table.id);
  if(ps.dirty[key]) return ps.answers[key] != null ? ps.answers[key] : "";
  const derived = psDerive(table, source);
  if(derived) return derived;
  return def != null ? def : "";
}
// Effective selected option for a question: override → mapped derived → "".
function psQuestionValue(table, row){
  const ps = psState(table.id);
  if(ps.dirty[row.id]) return ps.answers[row.id] || "";
  const derived = psDerive(table, row.source);
  if(derived){
    const m = (row.options||[]).find(o => o.toLowerCase() === String(derived).toLowerCase());
    if(m) return m;
  }
  return "";
}
function psRowApplies(table, row){ return !(row.wlOnly && !isWaterLevelTable(table)); }
function psRowNeedsAnswer(table, row){
  if(!row.required || !psRowApplies(table, row)) return false;
  if(row.kind === "question") return !psQuestionValue(table, row);
  if(row.kind === "text") return !psEffectiveText(table, row.id, row.source, "");
  return false;
}

/* ---- Builder render ---- */
function renderPropertyServices(){
  if(!psContainerEl) return;
  const table = activeTable();
  if(!defs || !table){ psContainerEl.innerHTML = ""; return; }
  const ps = psDef();
  const wl = isWaterLevelTable(table);

  psContainerEl.innerHTML = "";

  // Tick box (ticked by default) controlling whether the Property Services table
  // is copied out. Untick to copy only the scope table above.
  const copyToggle = document.createElement("label");
  copyToggle.className = "ps-copy-toggle";
  copyToggle.innerHTML =
    `<input type="checkbox" id="includePs"${includePsCopy ? " checked" : ""}>` +
    `<span>Include the Property Services table when copying (untick to copy the scope table only)</span>`;
  psContainerEl.appendChild(copyToggle);

  const block = document.createElement("div");
  block.className = "ps-block" + (includePsCopy ? "" : " ps-block--excluded");
  copyToggle.querySelector("input").addEventListener("change", (e)=>{
    includePsCopy = e.target.checked;
    block.classList.toggle("ps-block--excluded", !includePsCopy);
  });
  block.innerHTML = `
    <div class="ps-banner">
      <span class="ps-title">${escapeHtml(ps.title)}</span>
      <span class="ps-sub">Separate table — copied into Word below the scope table above</span>
    </div>
    <div class="ps-intro">
      This is its own table. Coordinates and the relocation answer are pre-filled from your
      answers above where possible — edit any box to override it. Highlighted rows still need an answer.
    </div>`;
  const body = document.createElement("div");
  body.className = "ps-body";
  block.appendChild(body);

  ps.rows.forEach(row=>{
    if(row.kind === "sectionHeader"){
      const applies = psRowApplies(table, row);
      const h = document.createElement("div");
      h.className = "ps-sectionheader" + (applies ? "" : " muted");
      h.innerHTML = `<span>${escapeHtml(row.label)}</span>` +
        (row.wlOnly ? `<span class="ps-link-chip">${applies ? "applies to this site" : "not this site type"}</span>` : "");
      body.appendChild(h);
      return;
    }
    body.appendChild(buildPsRow(table, row, wl));
  });

  // Final note — appears here AND in the Word copy (unlike the per-row "driven
  // by above" note, which is HTML-only).
  if(ps.note){
    const note = document.createElement("div");
    note.className = "ps-note-final";
    note.innerHTML = `<span class="ps-note-head">Note</span>${escapeHtml(ps.note)}`;
    body.appendChild(note);
  }

  psContainerEl.appendChild(block);
}

function buildPsRow(table, row, wl){
  const applies = psRowApplies(table, row);
  const needs = psRowNeedsAnswer(table, row);
  const rowEl = document.createElement("div");
  rowEl.className = "ps-row" + (needs ? " needs" : "") + (applies ? "" : " muted");

  const item = document.createElement("div");
  item.className = "ps-rowitem";
  item.innerHTML = `<div class="label">${escapeHtml(row.label)}</div>` +
    (needs ? `<span class="needs-tag">Needs an answer</span>` : "") +
    (row.wlOnly ? `<span class="wl-tag">Water Level only</span>` : "");
  rowEl.appendChild(item);

  const controls = document.createElement("div");
  controls.className = "ps-controls";
  rowEl.appendChild(controls);

  if(row.kind === "question"){
    // HTML-only "driven by above" note.
    if(row.linkedNote){
      const ln = document.createElement("div");
      ln.className = "ps-linked-note";
      ln.innerHTML = escapeHtml(row.linkedNote);
      controls.appendChild(ln);
    }
    const value = psQuestionValue(table, row);
    const opts = document.createElement("div");
    opts.className = "options-list";
    (row.options||[]).forEach(opt=>{
      const label = document.createElement("label");
      label.className = "option-row";
      const input = document.createElement("input");
      input.type = "radio";
      input.name = `ps_${table.id}_${row.id}`;
      input.checked = value === opt;
      input.addEventListener("change", ()=>{
        const ps = psState(table.id);
        ps.answers[row.id] = opt; ps.dirty[row.id] = true;
        renderPropertyServices();
      });
      const span = document.createElement("span");
      span.textContent = opt;
      label.appendChild(input); label.appendChild(span);
      opts.appendChild(label);
    });
    controls.appendChild(opts);
    controls.appendChild(psLinkBar(table, row.id, !!row.source));

  } else if(row.kind === "coordGroup"){
    const group = document.createElement("div");
    group.className = "ps-coordgroup";
    (row.coords||[]).forEach(c=>{
      const key = `${row.id}.${c.key}`;
      const cr = document.createElement("div");
      cr.className = "ps-coord-row";
      const lab = document.createElement("div");
      lab.className = "ps-coord-label";
      lab.textContent = c.label;
      const inWrap = document.createElement("div");
      inWrap.className = "ps-coord-input";
      const input = document.createElement("input");
      input.type = "text";
      input.value = psEffectiveText(table, key, c.source, c.default);
      input.placeholder = c.default || "coordinates";
      input.addEventListener("input", ()=>{
        const ps = psState(table.id);
        ps.answers[key] = input.value; ps.dirty[key] = true;
        refreshPsLinkBar(cr, table, key, !!c.source);
      });
      inWrap.appendChild(input);
      inWrap.appendChild(psLinkBar(table, key, !!c.source, ()=>{ input.value = psEffectiveText(table, key, c.source, c.default); }));
      cr.appendChild(lab); cr.appendChild(inWrap);
      group.appendChild(cr);
    });
    controls.appendChild(group);

  } else if(row.kind === "text"){
    const input = document.createElement("input");
    input.type = "text";
    input.style.cssText = "width:100%;border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:.87rem;font-family:inherit;";
    input.value = psEffectiveText(table, row.id, row.source, "");
    input.placeholder = row.placeholder || "";
    input.addEventListener("input", ()=>{
      const ps = psState(table.id);
      ps.answers[row.id] = input.value; ps.dirty[row.id] = true;
      rowEl.classList.toggle("needs", psRowNeedsAnswer(table, row));
      const tag = item.querySelector(".needs-tag");
      if(tag && !psRowNeedsAnswer(table, row)) tag.remove();
      refreshPsLinkBar(controls, table, row.id, !!row.source);
    });
    controls.appendChild(input);
    controls.appendChild(psLinkBar(table, row.id, !!row.source, ()=>{ input.value = psEffectiveText(table, row.id, row.source, ""); }));

  } else if(row.kind === "date"){
    const wrap = document.createElement("div");
    wrap.className = "ps-datefield";
    const input = document.createElement("input");
    input.type = "text";
    input.value = psEffectiveText(table, row.id, null, todayStr());
    input.addEventListener("input", ()=>{
      const ps = psState(table.id);
      ps.answers[row.id] = input.value; ps.dirty[row.id] = true;
      refreshPsLinkBar(wrap, table, row.id, false, "today");
    });
    wrap.appendChild(input);
    wrap.appendChild(psLinkBar(table, row.id, false, ()=>{ input.value = todayStr(); }, "today"));
    controls.appendChild(wrap);
  }

  return rowEl;
}

// Small "linked / overridden + revert" bar shown under a field that can be
// prefilled. `sourceKind` "today" labels the auto-date link. onRevert is called
// after clearing the override so the caller can refresh its own input value.
function psLinkBar(table, key, hasSource, onRevert, sourceKind){
  const bar = document.createElement("div");
  bar.className = "ps-linkbar";
  bar.dataset.psKey = key;
  fillPsLinkBar(bar, table, key, hasSource, onRevert, sourceKind);
  return bar;
}
function fillPsLinkBar(bar, table, key, hasSource, onRevert, sourceKind){
  bar.innerHTML = "";
  const ps = psState(table.id);
  const overridden = !!ps.dirty[key];
  const linkable = hasSource || sourceKind === "today";
  if(!linkable && !overridden) return;
  const chip = document.createElement("span");
  chip.className = "ps-link-chip" + (overridden ? " overridden" : "");
  chip.textContent = overridden
    ? "Overridden"
    : (sourceKind === "today" ? "Auto: today's date" : "Linked to scope answer");
  bar.appendChild(chip);
  if(overridden){
    const revert = document.createElement("button");
    revert.type = "button";
    revert.className = "ps-revert";
    revert.textContent = sourceKind === "today" ? "Reset to today" : "Reset to scope value";
    revert.addEventListener("click", ()=>{
      const p = psState(table.id);
      delete p.dirty[key]; delete p.answers[key];
      if(onRevert) onRevert();
      // Re-render so highlighting / values re-derive everywhere consistently.
      renderPropertyServices();
    });
    bar.appendChild(revert);
  }
}
// Update just one link bar in place (used on keystroke to avoid losing focus).
function refreshPsLinkBar(scopeEl, table, key, hasSource, sourceKind){
  const bar = scopeEl.querySelector(`.ps-linkbar[data-ps-key="${cssEscape(key)}"]`)
           || (scopeEl.classList && scopeEl.classList.contains("ps-linkbar") ? scopeEl : null);
  if(bar) fillPsLinkBar(bar, table, key, hasSource, null, sourceKind);
}

/* ---- Word copy (a second, separate table) ---- */
function buildPropertyServicesHtml(table){
  const ps = psDef();
  const B = "border:1px solid #999;";
  const cell = `style="padding:6px 8px;${B}vertical-align:top;"`;
  const labelCell = `style="padding:6px 8px;${B}vertical-align:top;font-weight:bold;width:38%;"`;
  let rows = `<tr><td colspan="2" style="background:#1f2d3d;color:#fff;font-weight:bold;padding:8px;${B}">${escapeHtml(ps.title)}</td></tr>`;
  ps.rows.forEach(row=>{
    if(row.kind === "coordGroup"){
      rows += `<tr><td colspan="2" style="background:#e8e8e8;font-weight:bold;padding:6px 8px;${B}">${escapeHtml(row.label)}</td></tr>`;
      (row.coords||[]).forEach(c=>{
        const v = psEffectiveText(table, `${row.id}.${c.key}`, c.source, c.default);
        rows += `<tr><td ${labelCell}>${escapeHtml(c.label)}</td><td ${cell}>${escapeHtml(v)}</td></tr>`;
      });
    } else if(row.kind === "question"){
      rows += `<tr><td ${labelCell}>${escapeHtml(row.label)}</td><td ${cell}>${escapeHtml(psQuestionValue(table, row))}</td></tr>`;
    } else if(row.kind === "text"){
      rows += `<tr><td ${labelCell}>${escapeHtml(row.label)}</td><td ${cell}>${escapeHtml(psEffectiveText(table, row.id, row.source, ""))}</td></tr>`;
    } else if(row.kind === "sectionHeader"){
      rows += `<tr><td colspan="2" style="background:#f0f0f0;font-style:italic;font-weight:bold;padding:6px 8px;${B}">${escapeHtml(row.label)}</td></tr>`;
    } else if(row.kind === "date"){
      rows += `<tr><td ${labelCell}>${escapeHtml(row.label)}:</td><td ${cell}>${escapeHtml(psEffectiveText(table, row.id, null, todayStr()))}</td></tr>`;
    }
  });
  if(ps.note){
    rows += `<tr><td colspan="2" style="font-weight:bold;padding:6px 8px;${B}">Note</td></tr>`;
    rows += `<tr><td colspan="2" style="padding:6px 8px;${B}">${escapeHtml(ps.note)}</td></tr>`;
  }
  return `<table style="border-collapse:collapse;width:100%;font-family:Calibri,Arial,sans-serif;font-size:11pt;">${rows}</table>`;
}
function buildPropertyServicesText(table){
  const ps = psDef();
  let out = `${ps.title}\n`;
  ps.rows.forEach(row=>{
    if(row.kind === "coordGroup"){
      out += `${row.label}\n`;
      (row.coords||[]).forEach(c=>{ out += `\t${c.label}\t${psEffectiveText(table, `${row.id}.${c.key}`, c.source, c.default)}\n`; });
    } else if(row.kind === "question"){
      out += `${row.label}\t${psQuestionValue(table, row)}\n`;
    } else if(row.kind === "text"){
      out += `${row.label}\t${psEffectiveText(table, row.id, row.source, "")}\n`;
    } else if(row.kind === "sectionHeader"){
      out += `${row.label}\n`;
    } else if(row.kind === "date"){
      out += `${row.label}:\t${psEffectiveText(table, row.id, null, todayStr())}\n`;
    }
  });
  if(ps.note) out += `Note\n${ps.note}\n`;
  return out;
}

/* =========================================================================
   PROPERTY SERVICES  — management editor (its own tab)
   ========================================================================= */
function psStructuralChange(){ persistLocal(); renderPsManage(); }

function renderPsManage(){
  if(!defs){ psManageView.innerHTML = renderNoDefsHtml(); wireNoDefs(); return; }
  const ps = defs.propertyServices;
  const actions = REMOTE_ON
    ? `<button class="btn btn-primary" id="psPublish">Publish to central store</button>
       <button class="btn btn-secondary" id="psReload">Reload latest</button>
       <button class="btn btn-secondary" id="psExport">Export JSON</button>`
    : `<button class="btn btn-primary" id="psExport">Export JSON</button>
       <button class="btn btn-secondary" id="psImport">Import JSON…</button>`;

  psManageView.innerHTML = `
    <div class="admin-actions">
      ${actions}
      <span class="grow"></span>
      <span class="status-msg" id="psStatus"></span>
    </div>
    <div class="admin-note">
      This edits the <b>Property Services Instruction</b> table shown at the bottom of every
      Scope Builder table. Answers are collected per site in the builder; here you only shape the
      questions, labels and note. Prefilled values (coordinates, relocation, date) are wired up
      automatically and can always be overridden by the user.
    </div>
    <div class="admin-cols">
      <div class="panel">
        <div class="panel-head">Table heading &amp; note</div>
        <div class="panel-body">
          <div class="ed-field" style="margin-bottom:12px;">
            <label>Table title</label>
            <input type="text" id="psTitle" value="${escapeHtml(ps.title)}">
          </div>
          <div class="ed-field">
            <label>Note (shown in the app <b>and</b> copied into Word)</label>
            <textarea id="psNote" style="min-height:120px;">${escapeHtml(ps.note)}</textarea>
            <span class="hint">The per-question "driven by above" note is separate and never copied into Word.</span>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          Rows (${ps.rows.length})
          <span>
            <button class="mini-btn" data-add="question">+ Question</button>
            <button class="mini-btn" data-add="text">+ Text</button>
            <button class="mini-btn" data-add="sectionHeader">+ Section</button>
            <button class="mini-btn" data-add="coordGroup">+ Coordinates</button>
          </span>
        </div>
        <div class="panel-body" id="psRowList"></div>
      </div>
    </div>
  `;

  const bind = (id, fn)=>{ const el = document.getElementById(id); if(el) el.addEventListener("click", fn); };
  bind("psExport", exportDefinitions);
  if(REMOTE_ON){ bind("psPublish", publishToRemote); bind("psReload", reloadFromRemote); }
  else bind("psImport", ()=>importFileEl.click());

  const titleEl = document.getElementById("psTitle");
  titleEl.addEventListener("input", ()=>{ ps.title = titleEl.value; afterTextChange(); });
  const noteEl = document.getElementById("psNote");
  noteEl.addEventListener("input", ()=>{ ps.note = noteEl.value; afterTextChange(); });
  psManageView.querySelectorAll("[data-add]").forEach(b=>{
    b.addEventListener("click", ()=>psAddRow(b.getAttribute("data-add")));
  });

  const list = document.getElementById("psRowList");
  list.innerHTML = "";
  ps.rows.forEach((row,i)=>list.appendChild(buildPsRowEditor(ps, row, i)));
}

function buildPsRowEditor(ps, row, i){
  const box = document.createElement("div");
  box.className = "ed-row open";
  const head = document.createElement("div");
  head.className = "ed-row-head";
  head.style.cursor = "default";
  head.innerHTML = `
    <span class="er-title">${escapeHtml(row.label || "(untitled)")}</span>
    <span class="er-type">${escapeHtml(row.kind)}</span>`;
  const up = iconBtn("↑","Move up", ()=>{ if(i>0){ swap(ps.rows,i,i-1); psStructuralChange(); }});
  const down = iconBtn("↓","Move down", ()=>{ if(i<ps.rows.length-1){ swap(ps.rows,i,i+1); psStructuralChange(); }});
  const del = iconBtn("🗑","Delete row", ()=>{ if(confirm(`Delete "${row.label||row.kind}"?`)){ ps.rows.splice(i,1); psStructuralChange(); } }, true);
  [up,down,del].forEach(b=>head.appendChild(b));
  box.appendChild(head);

  const body = document.createElement("div");
  body.className = "ed-row-body";
  body.style.display = "block";

  // Label (all kinds carry one)
  const labelField = document.createElement("div");
  labelField.className = "ed-field full";
  labelField.innerHTML = `<label>${row.kind === "coordGroup" ? "Group heading" : row.kind === "sectionHeader" ? "Section heading" : "Question / label"}</label>`;
  const labelInput = document.createElement("input");
  labelInput.type = "text"; labelInput.value = row.label || "";
  labelInput.addEventListener("input", ()=>{ row.label = labelInput.value; head.querySelector(".er-title").textContent = row.label || "(untitled)"; afterTextChange(); });
  labelField.appendChild(labelInput);
  body.appendChild(labelField);

  // Flags row (required / wlOnly) where relevant
  if(row.kind === "question" || row.kind === "text" || row.kind === "sectionHeader"){
    const flags = document.createElement("div");
    flags.className = "opt-source";
    if(row.kind !== "sectionHeader"){
      const reqL = document.createElement("label");
      const reqC = document.createElement("input"); reqC.type = "checkbox"; reqC.checked = !!row.required;
      reqC.addEventListener("change", ()=>{ if(reqC.checked) row.required = true; else delete row.required; afterTextChange(); });
      reqL.appendChild(reqC); reqL.appendChild(document.createTextNode(" Required (highlight until answered)"));
      flags.appendChild(reqL);
    }
    const wlL = document.createElement("label");
    const wlC = document.createElement("input"); wlC.type = "checkbox"; wlC.checked = !!row.wlOnly;
    wlC.addEventListener("change", ()=>{ if(wlC.checked) row.wlOnly = true; else delete row.wlOnly; afterTextChange(); });
    wlL.appendChild(wlC); wlL.appendChild(document.createTextNode(" Water Level sites only"));
    flags.appendChild(wlL);
    body.appendChild(flags);
  }

  if(row.kind === "question"){
    const optField = document.createElement("div");
    optField.className = "ed-field full";
    optField.innerHTML = `<label>Options — one per line</label>`;
    const ta = document.createElement("textarea");
    ta.style.minHeight = "70px";
    ta.value = (row.options||[]).join("\n");
    ta.addEventListener("input", ()=>{ row.options = ta.value.split("\n").map(s=>s.trim()).filter(Boolean); afterTextChange(); });
    optField.appendChild(ta);
    body.appendChild(optField);

    const lnField = document.createElement("div");
    lnField.className = "ed-field full";
    lnField.innerHTML = `<label>In-app note under this question (never copied into Word)</label>`;
    const lnInput = document.createElement("input");
    lnInput.type = "text"; lnInput.value = row.linkedNote || "";
    lnInput.placeholder = "e.g. Preselected from the Relocation answer above";
    lnInput.addEventListener("input", ()=>{ if(lnInput.value.trim()) row.linkedNote = lnInput.value; else delete row.linkedNote; afterTextChange(); });
    lnField.appendChild(lnInput);
    body.appendChild(lnField);

    body.appendChild(psSourceEditor(row));
  } else if(row.kind === "text"){
    const ph = document.createElement("div");
    ph.className = "ed-field full";
    ph.innerHTML = `<label>Placeholder</label>`;
    const phInput = document.createElement("input");
    phInput.type = "text"; phInput.value = row.placeholder || "";
    phInput.addEventListener("input", ()=>{ if(phInput.value) row.placeholder = phInput.value; else delete row.placeholder; afterTextChange(); });
    ph.appendChild(phInput);
    body.appendChild(ph);
    body.appendChild(psSourceEditor(row));
  } else if(row.kind === "coordGroup"){
    body.appendChild(psCoordsEditor(row));
  }

  box.appendChild(body);
  return box;
}

// Advanced "linked source" editor collapsed by default so it is not fiddled with
// accidentally. Maps this field onto a scope row id + optional field key.
function psSourceEditor(target){
  const det = document.createElement("details");
  det.style.cssText = "margin-top:8px;border:1px dashed var(--line);border-radius:6px;padding:6px 10px;";
  const src = target.source || {};
  det.innerHTML = `
    <summary style="cursor:pointer;font-size:.78rem;color:var(--ink-soft);font-weight:600;">Linked to a scope answer (advanced)</summary>
    <div class="ed-grid" style="margin-top:8px;">
      <div class="ed-field"><label>Scope row id</label><input type="text" class="ps-src-row" value="${escapeHtml(src.row||"")}" placeholder="e.g. relocation"></div>
      <div class="ed-field"><label>Field key (blank = the selected option)</label><input type="text" class="ps-src-field" value="${escapeHtml(src.field||"")}" placeholder="e.g. newLocation"></div>
    </div>
    <span class="hint">Common ids: <code>coords</code>/existing, <code>relocation</code> (selected) or <code>relocation</code>/newLocation, <code>riverCoords</code>/detail.</span>`;
  if(src.row) det.open = true;
  const rowIn = det.querySelector(".ps-src-row");
  const fieldIn = det.querySelector(".ps-src-field");
  const sync = ()=>{
    const r = rowIn.value.trim();
    if(!r){ delete target.source; }
    else target.source = { row:r, field: fieldIn.value.trim() || null };
    afterTextChange();
  };
  rowIn.addEventListener("input", sync);
  fieldIn.addEventListener("input", sync);
  return det;
}

function psCoordsEditor(row){
  const wrap = document.createElement("div");
  wrap.className = "ed-section";
  const head = document.createElement("div");
  head.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;";
  head.innerHTML = `<label style="font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;">Coordinate rows</label>`;
  const addBtn = document.createElement("button");
  addBtn.className = "mini-btn"; addBtn.textContent = "+ Add coordinate";
  addBtn.addEventListener("click", ()=>{
    if(!Array.isArray(row.coords)) row.coords = [];
    row.coords.push({ key: uniqueId("c", row.coords.map(c=>c.key)), label:"New coordinate" });
    psStructuralChange();
  });
  head.appendChild(addBtn);
  wrap.appendChild(head);

  (row.coords||[]).forEach((c,ci)=>{
    const card = document.createElement("div");
    card.style.cssText = "border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-bottom:8px;";
    const labField = document.createElement("div");
    labField.className = "ed-field full";
    labField.innerHTML = `<label>Coordinate label</label>`;
    const labIn = document.createElement("input");
    labIn.type = "text"; labIn.value = c.label || "";
    labIn.addEventListener("input", ()=>{ c.label = labIn.value; afterTextChange(); });
    labField.appendChild(labIn);
    card.appendChild(labField);

    const grid = document.createElement("div");
    grid.className = "ed-grid";
    grid.style.marginTop = "6px";
    grid.innerHTML = `
      <div class="ed-field"><label>Default when blank</label><input type="text" class="c-default" value="${escapeHtml(c.default||"")}" placeholder="e.g. na"></div>
      <div class="ed-field"><label>Linked scope row id</label><input type="text" class="c-src-row" value="${escapeHtml((c.source&&c.source.row)||"")}"></div>
      <div class="ed-field"><label>Linked field key</label><input type="text" class="c-src-field" value="${escapeHtml((c.source&&c.source.field)||"")}"></div>
    `;
    const defIn = grid.querySelector(".c-default");
    defIn.addEventListener("input", ()=>{ if(defIn.value) c.default = defIn.value; else delete c.default; afterTextChange(); });
    const cRow = grid.querySelector(".c-src-row");
    const cField = grid.querySelector(".c-src-field");
    const sync = ()=>{
      const r = cRow.value.trim();
      if(!r) delete c.source; else c.source = { row:r, field: cField.value.trim() || null };
      afterTextChange();
    };
    cRow.addEventListener("input", sync);
    cField.addEventListener("input", sync);
    card.appendChild(grid);

    const delBtn = document.createElement("button");
    delBtn.className = "mini-btn danger";
    delBtn.style.marginTop = "6px";
    delBtn.textContent = "Remove coordinate";
    delBtn.addEventListener("click", ()=>{ row.coords.splice(ci,1); psStructuralChange(); });
    card.appendChild(delBtn);
    wrap.appendChild(card);
  });
  return wrap;
}

function psAddRow(kind){
  const ps = defs.propertyServices;
  const taken = ps.rows.map(r=>r.id);
  const base = { question:"psQuestion", text:"psText", sectionHeader:"psSection", coordGroup:"psCoords" }[kind] || "psRow";
  const id = uniqueId(base, taken);
  let row;
  if(kind === "question") row = { id, kind, label:"New question", options:["Yes","No"] };
  else if(kind === "text") row = { id, kind, label:"New field" };
  else if(kind === "sectionHeader") row = { id, kind, label:"New section" };
  else row = { id, kind:"coordGroup", label:"New coordinates", coords:[{ key:"primary", label:"Primary" }] };
  ps.rows.push(row);
  psStructuralChange();
}
