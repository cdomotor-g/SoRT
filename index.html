<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoRT Forum Scope Builder</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='8'%20fill='%230f6e6a'/%3E%3Ctext%20x='50%25'%20y='50%25'%20font-size='36'%20font-weight='700'%20text-anchor='middle'%20dominant-baseline='central'%20fill='%23ffffff'%20font-family='Segoe%20UI,Arial,sans-serif'%3ES%3C/text%3E%3C/svg%3E">
  
<style>
  :root{
    --ink:#152531;
    --ink-soft:#4b5f6d;
    --paper:#f5f7f6;
    --card:#ffffff;
    --line:#dbe3e0;
    --accent:#0f6e6a;
    --accent-dark:#0b4f4c;
    --accent-soft:#e4f1ef;
    --amber:#b5760a;
    --amber-soft:#fbf1de;
    --danger:#b02a1f;
    --danger-soft:#fbe6e4;
    --radius:8px;
    font-size:15px;
  }
  /* ---- dark theme (toggled via data-theme on <html>) ---- */
  :root[data-theme="dark"]{
    --ink:#e7eef1;
    --ink-soft:#9db0bb;
    --paper:#0f1a20;
    --card:#17242c;
    --line:#2c3b45;
    --accent:#3bb0a9;
    --accent-dark:#0f6e6a;
    --accent-soft:#123733;
    --amber:#e0a83f;
    --amber-soft:#33290f;
    --danger:#e5766b;
    --danger-soft:#3a1e1b;
    color-scheme:dark;
  }
  :root[data-theme="dark"] .row-item{ background:#1d2c34; }
  :root[data-theme="dark"] .tbl-card{ background:#1d2c34; }
  :root[data-theme="dark"] .mini-btn{ background:var(--card); }
  :root[data-theme="dark"] .ed-row{ background:var(--card); }
  :root[data-theme="dark"] .ed-row-head{ background:#1d2c34; }
  :root[data-theme="dark"] .btn-danger{ border-color:#5a2b26; }
  :root[data-theme="dark"] .btn-danger:hover{ background:#4a2420; }
  :root[data-theme="dark"] .admin-note{ border-color:#5a4a1f; }
  :root[data-theme="dark"] .warn-banner{ border-color:#5a2b26; }
  :root[data-theme="dark"] input[type=text],
  :root[data-theme="dark"] textarea,
  :root[data-theme="dark"] select{
    background:#0f1a20; color:var(--ink);
  }
  :root[data-theme="dark"] input[type=text]::placeholder,
  :root[data-theme="dark"] textarea::placeholder{ color:#6f828d; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI", "Calibri", Arial, sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  header.app-header{
    background:var(--accent-dark);
    color:#fff;
    padding:18px 28px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    border-bottom:4px solid var(--accent);
  }
  header.app-header h1{
    margin:0;
    font-size:1.25rem;
    letter-spacing:.2px;
    font-weight:600;
  }
  header.app-header .sub{
    font-size:.82rem;
    color:#cfe6e3;
  }
  .header-titles{
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; min-width:0;
  }
  .theme-toggle{
    appearance:none; cursor:pointer; font-family:inherit; align-self:center;
    display:inline-flex; align-items:center; gap:7px;
    background:rgba(255,255,255,.12); color:#fff;
    border:1px solid rgba(255,255,255,.28);
    padding:7px 13px; border-radius:999px; font-size:.82rem; font-weight:600;
    transition:background .15s ease, border-color .15s ease;
  }
  .theme-toggle:hover{ background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.5); }
  .theme-toggle:focus-visible{ outline:2px solid #fff; outline-offset:2px; }
  .theme-toggle-icon{ font-size:1rem; line-height:1; }

  /* ---- top-level mode nav + data source bar ---- */
  .mode-nav{
    background:var(--accent);
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    padding:0 20px; color:#fff;
  }
  .mode-btn{
    appearance:none; border:none; background:transparent; color:#dcefed;
    padding:12px 16px; font-size:.9rem; font-weight:600; cursor:pointer; font-family:inherit;
    border-bottom:3px solid transparent;
  }
  .mode-btn:hover{ color:#fff; }
  .mode-btn.active{ color:#fff; border-bottom-color:#fff; }
  .mode-nav .source-chip{
    margin-left:auto; font-size:.74rem; color:#e6f4f2; opacity:.95;
    display:flex; align-items:center; gap:6px; padding:4px 0;
  }
  .source-chip .dot{ width:8px; height:8px; border-radius:50%; background:#cfe6e3; }
  .source-chip .dot.local{ background:var(--amber); }
  .source-chip .dot.none{ background:var(--danger); }

  .wrap{
    max-width:1080px;
    margin:0 auto;
    padding:20px 20px 140px;
  }
  .wrap.manage{ padding-bottom:40px; }

  .meta-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:18px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .meta-card .field{display:flex; flex-direction:column; gap:4px;}
  .meta-card label{font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:600;}
  .meta-card input[type=text]{
    border:1px solid var(--line); border-radius:6px; padding:8px 10px; font-size:.92rem; font-family:inherit;
  }
  .meta-card .toggles{grid-column:1 / -1; display:flex; gap:18px; font-size:.82rem; color:var(--ink-soft); align-items:center; flex-wrap:wrap;}
  .meta-card .toggles label{display:flex; align-items:center; gap:6px; text-transform:none; font-weight:500; color:var(--ink);}

  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:16px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .tab-btn{
    appearance:none; border:1px solid transparent; background:transparent;
    padding:10px 16px; font-size:.9rem; font-weight:600; color:var(--ink-soft);
    cursor:pointer; border-radius:6px 6px 0 0; font-family:inherit;
  }
  .tab-btn:hover{ color:var(--accent-dark); background:var(--accent-soft); }
  .tab-btn.active{
    color:var(--accent-dark);
    background:var(--card);
    border-color:var(--line);
    border-bottom-color:var(--card);
    transform:translateY(1px);
  }

  .progress{
    display:flex; align-items:center; gap:10px; margin-bottom:16px;
    font-size:.82rem; color:var(--ink-soft);
  }
  .progress-bar{ flex:1; height:6px; background:var(--line); border-radius:3px; overflow:hidden; }
  .progress-bar-fill{ height:100%; background:var(--accent); width:0%; transition:width .25s ease; }

  .row{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-bottom:12px;
    display:grid;
    grid-template-columns:250px 1fr;
    overflow:hidden;
  }
  .row.has-content{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .row-item{
    background:#eef4f3;
    padding:14px 16px;
    border-right:1px solid var(--line);
  }
  .row-item .label{ font-weight:700; font-size:.9rem; color:var(--ink); }
  .row-item .instruction{ font-size:.76rem; color:var(--ink-soft); margin-top:4px; font-style:italic; }
  .row-item .note-helper{ font-size:.74rem; color:var(--amber); margin-top:8px; background:var(--amber-soft); padding:6px 8px; border-radius:5px; }

  .row-controls{ padding:14px 16px; }
  .options-list{ display:flex; flex-direction:column; gap:7px; margin-bottom:8px; }
  .option-divider{ font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--accent-dark); margin:8px 0 2px; }
  .option-divider:first-child{ margin-top:0; }
  .option-row{ display:flex; align-items:flex-start; gap:8px; font-size:.87rem; cursor:pointer; line-height:1.35; }
  .option-row input{ margin-top:3px; accent-color:var(--accent); flex-shrink:0; }

  .fields-list{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .fields-list .field label{ display:block; font-size:.76rem; color:var(--ink-soft); font-weight:600; margin-bottom:3px; }
  .fields-list input[type=text], .fields-list textarea{
    width:100%; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:.87rem; font-family:inherit;
    resize:vertical;
  }

  .note-toggle{
    display:inline-flex; align-items:center; gap:5px; font-size:.76rem; color:var(--accent-dark);
    background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; font-weight:600;
  }
  .note-box{ margin-top:6px; display:none; }
  .note-box.open{ display:block; }
  .note-box textarea{ width:100%; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:.85rem; font-family:inherit; min-height:50px; }

  .preview{
    margin-top:10px; padding:8px 10px; background:var(--paper); border-radius:6px;
    font-size:.78rem; color:var(--ink-soft); white-space:pre-wrap; border-left:3px solid var(--line);
  }
  .preview.filled{ border-left-color:var(--accent); color:var(--ink); }
  .preview .preview-label{ font-weight:700; text-transform:uppercase; font-size:.66rem; letter-spacing:.06em; color:var(--ink-soft); display:block; margin-bottom:3px; }

  .row-clear{
    float:right; font-size:.72rem; color:var(--ink-soft); background:none; border:none; cursor:pointer;
    text-decoration:underline; font-family:inherit;
  }
  .row-clear:hover{ color:var(--accent-dark); }

  .toolbar{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--card); border-top:1px solid var(--line);
    padding:14px 20px; display:flex; align-items:center; justify-content:center; gap:12px;
    box-shadow:0 -4px 14px rgba(0,0,0,.06);
  }
  .toolbar-inner{ max-width:1080px; width:100%; display:flex; align-items:center; gap:12px; }
  .btn{
    font-family:inherit; font-size:.9rem; font-weight:600; padding:11px 20px; border-radius:7px;
    border:1px solid transparent; cursor:pointer;
  }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-dark); }
  .btn-secondary{ background:transparent; color:var(--ink-soft); border-color:var(--line); }
  .btn-secondary:hover{ color:var(--ink); border-color:var(--ink-soft); }
  .btn-reset{ color:var(--danger); }
  .btn-reset:hover{ color:var(--danger); border-color:var(--danger); }
  .btn-danger{ background:var(--danger-soft); color:var(--danger); border-color:#e9c4c0; }
  .btn-danger:hover{ background:#f6d6d3; }
  .status-msg{ font-size:.85rem; color:var(--accent-dark); font-weight:600; min-width:140px; }
  .toolbar-spacer{ flex:1; }

  /* ===================== ADMIN / CRUD ===================== */
  .admin-actions{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:12px 14px; margin-bottom:14px;
  }
  .admin-actions .grow{ flex:1; }
  .admin-note{
    font-size:.78rem; color:var(--ink-soft); background:var(--amber-soft);
    border:1px solid #efdcb3; border-radius:6px; padding:8px 11px; margin-bottom:16px;
    line-height:1.4;
  }
  .admin-note b{ color:var(--amber); }
  .warn-banner{
    font-size:.8rem; color:var(--danger); background:var(--danger-soft);
    border:1px solid #e9c4c0; border-radius:6px; padding:8px 11px; margin-bottom:14px;
  }
  .warn-banner ul{ margin:6px 0 0; padding-left:18px; }

  .admin-cols{ display:grid; grid-template-columns:260px 1fr; gap:16px; align-items:start; }

  .panel{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); }
  .panel-head{
    padding:11px 14px; border-bottom:1px solid var(--line);
    font-size:.74rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .panel-body{ padding:12px 14px; }

  .tbl-list{ display:flex; flex-direction:column; gap:6px; }
  .tbl-card{
    display:flex; align-items:center; gap:6px; padding:8px 10px;
    border:1px solid var(--line); border-radius:7px; cursor:pointer; background:#fbfdfc;
  }
  .tbl-card:hover{ border-color:var(--accent); }
  .tbl-card.active{ border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 1px var(--accent) inset; }
  .tbl-card .tbl-name{ flex:1; font-weight:600; font-size:.86rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tbl-card .tbl-count{ font-size:.72rem; color:var(--ink-soft); }

  .mini-btn{
    appearance:none; border:1px solid var(--line); background:#fff; color:var(--ink-soft);
    border-radius:5px; padding:3px 7px; font-size:.74rem; cursor:pointer; font-family:inherit; line-height:1.2;
  }
  .mini-btn:hover{ border-color:var(--accent); color:var(--accent-dark); }
  .mini-btn.danger:hover{ border-color:var(--danger); color:var(--danger); }
  .icon-btn{
    appearance:none; border:none; background:transparent; cursor:pointer; color:var(--ink-soft);
    font-size:.9rem; padding:2px 5px; border-radius:4px; line-height:1;
  }
  .icon-btn:hover{ background:var(--accent-soft); color:var(--accent-dark); }
  .icon-btn.danger:hover{ background:var(--danger-soft); color:var(--danger); }

  .ed-section{ margin-bottom:18px; }
  .ed-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .ed-field{ display:flex; flex-direction:column; gap:4px; }
  .ed-field.full{ grid-column:1 / -1; }
  .ed-field label{ font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); font-weight:600; }
  .ed-field input[type=text], .ed-field select, .ed-field textarea{
    width:100%; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:.87rem; font-family:inherit; resize:vertical;
  }
  .ed-field .hint{ font-size:.72rem; color:var(--ink-soft); font-style:italic; }

  .ed-row{
    border:1px solid var(--line); border-radius:8px; margin-bottom:12px; overflow:hidden; background:#fff;
  }
  .ed-row-head{
    display:flex; align-items:center; gap:8px; padding:9px 12px; background:#eef4f3; border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .ed-row-head .er-title{ flex:1; font-weight:700; font-size:.88rem; }
  .ed-row-head .er-type{ font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-dark); background:var(--accent-soft); padding:2px 7px; border-radius:10px; }
  .ed-row-head .caret{ color:var(--ink-soft); font-size:.8rem; }
  .ed-row-body{ padding:12px; display:none; }
  .ed-row.open .ed-row-body{ display:block; }
  .ed-row.open .caret{ transform:rotate(90deg); }

  .opt-source{ display:flex; gap:16px; font-size:.82rem; margin:2px 0 8px; }
  .opt-source label{ display:flex; align-items:center; gap:5px; cursor:pointer; text-transform:none; letter-spacing:0; font-weight:500; color:var(--ink); }

  .field-editor{ display:flex; flex-direction:column; gap:7px; }
  .field-editor .fe-row{ display:grid; grid-template-columns:1fr 1.4fr 110px 28px; gap:7px; align-items:center; }
  .field-editor .fe-row input, .field-editor .fe-row select{
    border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:.82rem; font-family:inherit;
  }

  .oset{ border:1px solid var(--line); border-radius:7px; padding:10px 12px; margin-bottom:10px; }
  .oset-head{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .oset-head input{ flex:1; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:.84rem; font-weight:600; font-family:inherit; }
  .oset textarea{ width:100%; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:.82rem; font-family:inherit; min-height:70px; resize:vertical; }
  .oset .used-in{ font-size:.72rem; color:var(--ink-soft); margin-top:4px; }

  .empty-state{
    text-align:center; color:var(--ink-soft); padding:40px 20px; background:var(--card);
    border:1px dashed var(--line); border-radius:var(--radius);
  }
  .empty-state p{ margin:6px 0 16px; }

  .hidden{ display:none !important; }

  /* ===================== SHARED / COMMON ROWS + TABLE MAP ===================== */
  .er-shared{
    background:var(--amber-soft); color:var(--amber); border:1px solid #efdcb3;
    font-size:.64rem; text-transform:uppercase; letter-spacing:.05em; font-weight:700;
    padding:2px 7px; border-radius:10px;
  }
  .ed-row.ref{ border-style:dashed; }
  .ed-row.ref .ed-row-head{ cursor:default; background:var(--amber-soft); }
  .ref-note{ font-size:.76rem; color:var(--ink-soft); padding:9px 12px; line-height:1.4; }
  .link-btn{ color:var(--accent-dark); background:none; border:none; padding:0;
    font:inherit; cursor:pointer; text-decoration:underline; }
  .add-common{ display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }
  .add-common select{ border:1px solid var(--line); border-radius:6px; padding:6px 8px;
    font-size:.82rem; font-family:inherit; }

  .map-scroll{ overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--card); }
  table.map-grid{ border-collapse:separate; border-spacing:0; width:100%; font-size:.84rem; }
  table.map-grid th, table.map-grid td{ border-bottom:1px solid var(--line); border-right:1px solid var(--line); padding:9px 12px; }
  table.map-grid thead th{
    background:var(--accent-soft); color:var(--accent-dark);
    position:sticky; top:0; z-index:1; text-align:center; font-size:.78rem; font-weight:700;
  }
  table.map-grid thead th.corner{ text-align:left; left:0; z-index:3; }
  table.map-grid tbody th.row-head{
    text-align:left; background:var(--card); position:sticky; left:0; z-index:1;
    font-weight:600; min-width:200px;
  }
  table.map-grid tbody th.row-head .r-instr{ font-weight:400; color:var(--ink-soft); font-size:.74rem; display:block; margin-top:2px; }
  table.map-grid td.cell{ text-align:center; cursor:pointer; }
  table.map-grid td.cell:hover{ background:var(--accent-soft); }
  table.map-grid tbody tr:hover th.row-head{ background:var(--accent-soft); }
  table.map-grid input[type=checkbox]{ width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }
  .map-type{
    font-size:.66rem; color:var(--accent-dark); background:var(--accent-soft);
    border-radius:9px; padding:1px 6px; margin-left:6px; text-transform:uppercase; letter-spacing:.04em;
  }
  .map-intro{ margin-bottom:14px; }
  :root[data-theme="dark"] .er-shared{ border-color:#5a4a1f; }

  /* ===================== ROW ICONS + ICON PICKER ===================== */
  .row-icon{ margin-right:8px; }
  .er-icon{ font-size:1rem; line-height:1; }
  .icon-pick{ display:flex; align-items:center; gap:8px; }
  .icon-pick-btn{
    appearance:none; font-family:inherit; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--line); border-radius:6px; background:var(--card);
    padding:6px 10px; font-size:.84rem; color:var(--ink);
  }
  .icon-pick-btn:hover{ border-color:var(--accent); color:var(--accent-dark); }
  .icon-pick-btn .cur{ font-size:1.15rem; line-height:1; }
  .modal-overlay{
    position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    width:100%; max-width:540px; max-height:82vh; display:flex; flex-direction:column;
    box-shadow:0 12px 40px rgba(0,0,0,.28);
  }
  .modal-head{ display:flex; align-items:center; gap:10px; padding:13px 16px; border-bottom:1px solid var(--line); }
  .modal-head h3{ margin:0; font-size:1rem; flex:1; }
  .modal-body{ padding:14px 16px; overflow-y:auto; }
  .icon-cat{ font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700; margin:12px 0 6px; }
  .icon-cat:first-child{ margin-top:0; }
  .icon-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(42px,1fr)); gap:6px; }
  .icon-cell{
    appearance:none; border:1px solid var(--line); background:var(--paper); border-radius:7px;
    font-size:1.3rem; line-height:1; padding:8px 0; cursor:pointer; font-family:inherit;
  }
  .icon-cell:hover{ border-color:var(--accent); background:var(--accent-soft); }
  .icon-cell.selected{ border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 1px var(--accent) inset; }
  .modal-foot{ display:flex; gap:8px; align-items:center; padding:12px 16px; border-top:1px solid var(--line); flex-wrap:wrap; }
  .modal-foot input[type=text]{
    flex:1; min-width:180px; border:1px solid var(--line); border-radius:6px;
    padding:8px 10px; font-size:.87rem; font-family:inherit;
  }

  /* ===================== PROPERTY SERVICES (separate table) ===================== */
  /* A deliberately distinct block sitting at the bottom of the Scope Builder.
     It is copied into Word as its OWN second table, so it is styled to read as
     a separate document element rather than more rows of the scope table. */
  .ps-block{
    margin-top:30px;
    border:2px solid var(--accent-dark);
    border-radius:var(--radius);
    background:var(--card);
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
  }
  .ps-banner{
    background:var(--accent-dark); color:#fff; padding:12px 16px;
    display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
  }
  .ps-banner .ps-title{ font-size:1.02rem; font-weight:700; letter-spacing:.2px; }
  .ps-banner .ps-sub{ font-size:.76rem; color:#cfe6e3; }
  .ps-intro{
    font-size:.78rem; color:var(--ink-soft); padding:10px 16px;
    background:var(--accent-soft); border-bottom:1px solid var(--line); line-height:1.45;
  }
  .ps-body{ padding:14px 16px; }

  /* Tick box (above the Property Services table) controlling whether that table
     is included when copying. Ticked by default; untick to copy only the scope
     table. */
  .ps-copy-toggle{
    display:flex; align-items:center; gap:8px; margin:30px 4px 8px;
    font-size:.85rem; font-weight:600; color:var(--ink); cursor:pointer;
  }
  .ps-copy-toggle input{ width:16px; height:16px; cursor:pointer; }
  .ps-copy-toggle + .ps-block{ margin-top:0; }
  /* Visual cue that the table will be left out of the copy. */
  .ps-block.ps-block--excluded{ opacity:.5; }

  .ps-row{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:10px; display:grid; grid-template-columns:250px 1fr; overflow:hidden;
  }
  .ps-row.filled{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .ps-row.needs{ border-color:var(--amber); box-shadow:0 0 0 1px var(--amber) inset; }
  .ps-row.muted{ opacity:.72; }
  .ps-rowitem{ background:#eef4f3; padding:12px 14px; border-right:1px solid var(--line); }
  .ps-rowitem .label{ font-weight:700; font-size:.88rem; color:var(--ink); }
  .ps-rowitem .needs-tag{
    display:inline-block; margin-top:6px; font-size:.66rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; color:var(--amber); background:var(--amber-soft);
    border:1px solid #efdcb3; border-radius:10px; padding:2px 7px;
  }
  .ps-rowitem .wl-tag{
    display:inline-block; margin-top:6px; margin-left:6px; font-size:.64rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; color:var(--accent-dark); background:var(--accent-soft); border-radius:10px; padding:2px 7px;
  }
  .ps-controls{ padding:12px 14px; }
  .ps-controls .options-list{ margin-bottom:6px; }

  .ps-linked-note{
    font-size:.75rem; color:var(--accent-dark); background:var(--accent-soft);
    border-left:3px solid var(--accent); border-radius:0 5px 5px 0;
    padding:6px 9px; margin:2px 0 8px; line-height:1.4;
  }
  .ps-linked-note b{ font-weight:700; }
  .ps-linkbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:6px; }
  .ps-link-chip{
    font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:var(--accent-dark); background:var(--accent-soft); border-radius:10px; padding:2px 7px;
  }
  .ps-link-chip.overridden{ color:var(--amber); background:var(--amber-soft); border:1px solid #efdcb3; }
  .ps-revert{
    background:none; border:none; padding:0; font:inherit; cursor:pointer;
    color:var(--accent-dark); text-decoration:underline; font-size:.74rem; font-weight:600;
  }
  .ps-revert:hover{ color:var(--accent); }

  /* nested coordinate sub-table */
  .ps-coordgroup{ border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .ps-coord-row{
    display:grid; grid-template-columns:1fr 1.3fr; border-top:1px solid var(--line); align-items:stretch;
  }
  .ps-coord-row:first-child{ border-top:none; }
  .ps-coord-label{ padding:8px 10px; font-size:.82rem; font-weight:600; background:#f4f8f7; display:flex; align-items:center; }
  .ps-coord-input{ padding:6px; display:flex; align-items:center; gap:6px; }
  .ps-coord-input input{
    width:100%; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:.84rem; font-family:inherit;
  }
  :root[data-theme="dark"] .ps-rowitem{ background:#1d2c34; }
  :root[data-theme="dark"] .ps-coord-label{ background:#1d2c34; }
  :root[data-theme="dark"] .ps-coord-input input{ background:#0f1a20; color:var(--ink); }

  .ps-sectionheader{
    margin:14px 0 8px; padding:7px 12px; border-radius:6px;
    background:var(--accent-soft); color:var(--accent-dark);
    font-size:.82rem; font-weight:700; letter-spacing:.02em;
    display:flex; align-items:center; gap:8px;
  }
  .ps-datefield input{
    border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:.87rem; font-family:inherit; width:200px; max-width:100%;
  }
  .ps-note-final{
    margin-top:16px; padding:11px 13px; border:1px solid var(--line); border-radius:7px;
    background:var(--paper); font-size:.8rem; line-height:1.5; color:var(--ink);
  }
  .ps-note-final .ps-note-head{
    font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; font-weight:700;
    color:var(--ink-soft); display:block; margin-bottom:4px;
  }
  :root[data-theme="dark"] .ps-block{ border-color:var(--accent); }
  :root[data-theme="dark"] .ps-datefield input{ background:#0f1a20; color:var(--ink); }

  @media (max-width: 720px){
    .ps-row{ grid-template-columns:1fr; }
    .ps-rowitem{ border-right:none; border-bottom:1px solid var(--line); }
    .ps-coord-row{ grid-template-columns:1fr; }
    .ps-coord-label{ border-bottom:1px solid var(--line); }
  }

  @media (max-width: 860px){
    .admin-cols{ grid-template-columns:1fr; }
  }
  @media (max-width: 720px){
    .row{ grid-template-columns:1fr; }
    .row-item{ border-right:none; border-bottom:1px solid var(--line); }
    .meta-card{ grid-template-columns:1fr; }
    .ed-grid{ grid-template-columns:1fr; }
    .field-editor .fe-row{ grid-template-columns:1fr 1fr; }
  }

  /* ===================== COORDINATE VALIDATION HINTS (§3) ===================== */
  .coord-hint{
    font-size:.76rem; line-height:1.4; margin-top:5px; padding:6px 9px;
    border-radius:6px; border:1px solid transparent;
  }
  .coord-hint--warn,  .coord-hint--info{ color:var(--amber); background:var(--amber-soft); border-color:#efdcb3; }
  .coord-hint--error{ color:var(--danger); background:var(--danger-soft); border-color:#e9c4c0; }
  .coord-hint--info{ color:var(--accent-dark); background:var(--accent-soft); border-color:var(--line); }
  .coord-fix, .coord-undo{
    appearance:none; border:1px solid currentColor; background:transparent; color:inherit;
    border-radius:5px; padding:1px 8px; margin-left:6px; font:inherit; font-size:.72rem;
    font-weight:600; cursor:pointer;
  }
  .coord-fix:hover, .coord-undo:hover{ background:rgba(0,0,0,.06); }
  :root[data-theme="dark"] .coord-hint--warn, :root[data-theme="dark"] .coord-hint--info{ border-color:#5a4a1f; }
  :root[data-theme="dark"] .coord-hint--error{ border-color:#5a2b26; }

  /* ===================== mapPin ROW EDITOR (§4) ===================== */
  .mappin-editor .mappin-enable{ display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600; cursor:pointer; }
  .mappin-editor .mappin-enable input{ width:16px; height:16px; }
  .mappin-detail{ margin-top:10px; display:flex; flex-direction:column; gap:10px; }
  .mappin-detail.hidden{ display:none; }
  .mappin-flags{ display:flex; gap:18px; flex-wrap:wrap; font-size:.82rem; }
  .mappin-flags label{ display:flex; align-items:center; gap:6px; cursor:pointer; }
  .mappin-gate{ border-top:1px dashed var(--line); padding-top:10px; display:flex; flex-direction:column; gap:8px; font-size:.82rem; }
  .mappin-gate > label{ display:flex; align-items:center; gap:6px; cursor:pointer; }

  /* ===================== SITE MAP MODAL (§5,§6,§7) ===================== */
  .map-copy-toggle{
    display:flex; align-items:center; gap:7px; font-size:.82rem; font-weight:600;
    color:var(--ink); cursor:pointer; white-space:nowrap;
  }
  .map-copy-toggle input{ width:15px; height:15px; cursor:pointer; }

  .modal.modal--map{
    max-width:1120px; width:100%; height:90vh; max-height:90vh; display:flex; flex-direction:column;
  }
  .modal--map .modal-head{ flex-wrap:wrap; gap:10px 14px; }
  .smap-interval{ display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--ink-soft); }
  .smap-interval label{ display:flex; align-items:center; gap:4px; cursor:pointer; color:var(--ink); }
  .smap-interval-stamp{ color:var(--amber); font-weight:600; }
  .smap-reset--active{ border-color:var(--accent) !important; color:var(--accent-dark) !important; }

  .smap-banners{ display:flex; flex-direction:column; }
  .smap-banner{
    display:flex; align-items:center; gap:10px; padding:8px 14px; font-size:.8rem; line-height:1.4;
    border-bottom:1px solid var(--line);
  }
  .smap-banner span{ flex:1; }
  .smap-banner--warn{ color:var(--amber); background:var(--amber-soft); }
  .smap-banner--error{ color:var(--danger); background:var(--danger-soft); }
  .smap-banner-x{ appearance:none; border:none; background:transparent; color:inherit; cursor:pointer; font-size:.9rem; }

  .smap-body{ flex:1; display:flex; padding:0; min-height:0; overflow:hidden; }
  .smap-map{ flex:1; position:relative; min-height:360px; background:#e9eef0; }
  .smap-map .esri-view{ height:100%; width:100%; }
  .smap-status{
    position:absolute; inset:0; z-index:5; display:flex; align-items:center; justify-content:center;
    background:rgba(245,247,246,.9); color:var(--ink-soft); font-size:.9rem; text-align:center; padding:20px;
  }
  /* CRITICAL: `display:flex` above would otherwise beat the [hidden] UA rule, so
     setting `statusHost.hidden = true` in JS would NOT clear the "Loading map…"
     overlay — it would sit over a working map forever (the reported symptom).
     This makes the hidden attribute actually hide it. */
  .smap-status[hidden]{ display:none; }
  .smap-offline{ line-height:1.6; }
  .smap-offline span{ font-size:.8rem; color:var(--ink-soft); }
  .smap-panel{
    width:290px; flex:none; overflow-y:auto; border-left:1px solid var(--line);
    padding:12px 14px; background:var(--card); display:flex; flex-direction:column; gap:8px;
  }
  .smap-panel-head, .smap-legend-head{
    font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700;
  }
  .smap-pin-list{ display:flex; flex-direction:column; gap:6px; }
  .smap-empty{ font-size:.8rem; color:var(--ink-soft); line-height:1.4; }
  .smap-pin{
    display:flex; align-items:flex-start; gap:8px; padding:7px 8px; border:1px solid var(--line);
    border-radius:7px; cursor:pointer; font-size:.82rem;
  }
  .smap-pin:hover{ border-color:var(--accent); }
  .smap-pin--invalid{ opacity:.7; cursor:default; background:var(--danger-soft); border-color:#e9c4c0; }
  .smap-pin input{ margin-top:2px; }
  .smap-dot{ width:12px; height:12px; border-radius:50%; margin-top:3px; flex:none; box-shadow:0 0 0 1px rgba(0,0,0,.15); }
  .smap-pin-text{ display:flex; flex-direction:column; gap:1px; min-width:0; }
  .smap-pin-label{ font-weight:600; }
  .smap-anchor{
    font-size:.6rem; text-transform:uppercase; letter-spacing:.04em; color:var(--accent-dark);
    background:var(--accent-soft); border-radius:8px; padding:1px 5px; margin-left:4px; font-weight:700;
  }
  .smap-pin-coord{ color:var(--ink-soft); font-size:.76rem; word-break:break-word; }
  .smap-pin-err{ color:var(--danger); }
  .smap-legend{ margin-top:6px; border-top:1px solid var(--line); padding-top:8px; display:flex; flex-direction:column; gap:4px; }
  .smap-legend-row{ display:flex; align-items:center; gap:7px; font-size:.8rem; }
  .smap-credit{ padding-top:10px; font-size:.68rem; color:var(--ink-soft); line-height:1.4; }

  /* "Zoom in to see contours / road reserve" hint, over the map (§4.6). */
  .smap-scalehint{
    position:absolute; left:50%; bottom:12px; transform:translateX(-50%); z-index:6;
    max-width:80%; padding:6px 12px; border-radius:16px; font-size:.78rem; text-align:center;
    background:rgba(21,37,49,.86); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.25); pointer-events:none;
  }

  /* In-app diagnostics (§6) — collapsed by default, copyable as plain text. */
  .smap-diag{ margin-top:auto; padding-top:10px; border-top:1px solid var(--line); }
  .smap-diag > summary{
    cursor:pointer; font-size:.7rem; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); font-weight:700; list-style:revert;
  }
  .smap-diag > summary:hover{ color:var(--accent-dark); }
  .smap-diag-body{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .smap-diag-hint{ margin:0; font-size:.72rem; color:var(--ink-soft); line-height:1.4; }
  .smap-diag-copy{ align-self:flex-start; }
  .smap-diag-text{
    margin:0; padding:8px 10px; background:var(--code-bg,#0d1b24); color:var(--code-ink,#dfe8ee);
    border:1px solid var(--line); border-radius:6px; font-size:.68rem; line-height:1.45;
    white-space:pre-wrap; word-break:break-word; max-height:260px; overflow:auto;
    font-family:"Cascadia Code",Consolas,"Courier New",monospace;
  }

  @media (max-width: 720px){
    .smap-body{ flex-direction:column; }
    .smap-panel{ width:auto; border-left:none; border-top:1px solid var(--line); max-height:38%; }
    .modal.modal--map{ height:94vh; max-height:94vh; }
  }
</style>
<script>
  /* Apply the saved (or system-preferred) theme before first paint to avoid a flash. */
  (function(){
    try{
      var saved = localStorage.getItem("sort.theme");
      var dark = saved ? saved === "dark"
                       : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    }catch(e){}
  })();
</script>
</head>
<body>

<header class="app-header">
  <div class="header-titles">
    <h1>SoRT Forum Scope Builder</h1>
    <div class="sub">Click through a table, then copy the finished result straight into your report</div>
  </div>
  <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" aria-pressed="false" title="Toggle dark mode">
    <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
    <span class="theme-toggle-label">Dark</span>
  </button>
</header>

<nav class="mode-nav">
  <button class="mode-btn active" data-mode="builder">Scope Builder</button>
  <button class="mode-btn" data-mode="manage">Manage Tables</button>
  <button class="mode-btn" data-mode="map">Table Map</button>
  <button class="mode-btn" data-mode="ps">Property Services</button>
  <span class="source-chip" id="sourceChip"><span class="dot"></span><span id="sourceLabel">Loading…</span></span>
</nav>

<div class="wrap" id="wrap">

  <!-- ===================== BUILDER VIEW ===================== -->
  <div id="builderView">
    <div class="meta-card">
      <div class="field">
        <label for="forumDate">SoRT Forum Date</label>
        <input type="text" id="forumDate" placeholder="dd/mm/yyyy">
      </div>
      <div class="field">
        <label for="forumAttendees">SoRT Forum Attendees</label>
        <input type="text" id="forumAttendees" placeholder="Initials">
      </div>
      <div class="toggles">
        <label><input type="checkbox" id="includeHeader" checked> Include title/date/attendees when copying</label>
        <label><input type="checkbox" id="includeEmpty" checked> Include rows with nothing filled in</label>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="progress">
      <span id="progressText">0 of 0 rows filled</span>
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>

    <div id="rowsContainer"></div>

    <!-- Property Services — a separate, visually distinct table copied into Word
         as its own second table. Rendered below whichever scope table is active. -->
    <div id="psContainer"></div>
  </div>

  <!-- ===================== MANAGE VIEW ===================== -->
  <div id="manageView" class="hidden"></div>

  <!-- ===================== TABLE MAP VIEW ===================== -->
  <div id="mapView" class="hidden"></div>

  <!-- ===================== PROPERTY SERVICES MANAGE VIEW ===================== -->
  <div id="psManageView" class="hidden"></div>

</div>

<div class="toolbar" id="builderToolbar">
  <div class="toolbar-inner">
    <button class="btn btn-primary" id="copyBtn">Copy table for Word</button>
    <button class="btn btn-secondary" id="siteMapBtn" title="Open the site map for this table's coordinates">🗺 Site Map</button>
    <label class="map-copy-toggle" title="Include a screenshot of the site map (with pins) in the copied Word output">
      <input type="checkbox" id="includeMapChk"> Include site map in copied output
    </label>
    <button class="btn btn-secondary hidden" id="copyMapImgBtn" title="Copy just the map image to the clipboard (paste it into Word in one extra step)">Copy map image</button>
    <span class="status-msg" id="statusMsg"></span>
    <span class="toolbar-spacer"></span>
    <button class="btn btn-secondary" id="undoResetBtn">Undo Clear Table</button>
    <button class="btn btn-secondary btn-reset" id="resetBtn">Clear this table</button>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" class="hidden">

<script>
/* =========================================================================
   SoRT Forum Scope Builder
   -------------------------------------------------------------------------
   Table + row definitions live outside this page so they can evolve without
   editing the app. This file provides:
     • the end-user "Scope Builder" (unchanged behaviour), and
     • a "Manage Tables" CRUD editor for the definitions.
   Definitions are read from a central Supabase row when the SUPABASE config
   below is filled in (edit → Publish → everyone gets it on next load). If it
   is left blank the app falls back to the bundled definitions.json plus
   manual Import/Export, i.e. the original offline behaviour.

   Definition shape:
   {
     version, meta:{...},
     optionSets: { <name>: [ "opt", "### Divider", ... ] },
     sharedRows: [ ROW ],                 // "common" rows reused across tables
     tables: [ { id, label, title, rows:[ ROW | {shared:<id>} ] } ]
   }
   ROW = {
     id, item, instruction, type:"single"|"multi"|"none",
     icon?,   // emoji shown beside the item name in the Scope Builder
     note?, optionSet? (name) OR options?[] , fields?:[{key,label,type,placeholder?}]
   }
   type: single -> radio, multi -> checkbox, none -> fields/text only.
   An option string beginning with "### " renders as a non-selectable divider.
   A table row may instead be { shared:<id> } — a reference to a sharedRows
   entry, so one "common row" definition can appear in many tables (managed
   via the Common rows editor + the Table Map). See effectiveRows().
   ========================================================================= */

const LS_DEFS = "sort.definitions.v1";   // saved (edited) definitions / unpublished draft
const LS_URL  = "sort.definitionsUrl";   // remembered "load from URL" source
const DEFINITIONS_FILE = "definitions.json";

/* Migration fallback for the Site Map pins (§4). The durable mechanism is the
   row-level `mapPin` declaration (see normalizeMapPin) — this map is ONLY used
   to seed the well-known coordinate rows when a loaded document predates the
   schema and declares no pin at all, exactly as DEFAULT_PROPERTY_SERVICES does
   for the Property Services block. A document that authors its own mapPin(s)
   overrides these entirely, so this is a bridge, not the source of truth. */
const DEFAULT_MAP_PINS = {
  coords:          { field:"existing",    label:"Current location",       colour:"red",    defaultOn:true, anchor:true },
  relocation:      { field:"newLocation", label:"Relocation site",        colour:"orange", defaultOn:true, requires:{ row:"relocation", not:"No" } },
  riverCoords:     { field:"detail",      label:"River line termination", colour:"blue",   defaultOn:true },
  riverRelocation: { field:"newRiver",    label:"River line relocation",  colour:"purple", defaultOn:true }
};

/* ===================== PROPERTY SERVICES =====================
   The "Property Services Instruction" block is a *second, separate* table shown
   at the bottom of the Scope Builder for every station type and copied into Word
   as its own table. Its shape lives under defs.propertyServices so it can be
   managed without touching code; this DEFAULT is the built-in fallback used when
   the loaded definitions (e.g. the central store) do not yet carry one.

   Row kinds:
     coordGroup    — a titled sub-table of coordinate rows {key,label,source?,default?}
     question      — a single-choice question (radio) with options
     text          — a free-text answer
     sectionHeader — a labelled subsection divider
     date          — an auto-filled date (today), overridable
   A row/coord may carry a `source:{row,field}` that derives its default from the
   active scope table's answers (field:null means the row's selected value). A
   `wlOnly:true` row is only *required* on the Water Level table. Anything derived
   or prefilled is always editable — the first manual edit "detaches" it. */
const DEFAULT_PROPERTY_SERVICES = {
  title: "Property Services Instruction",
  note: "Property Services conducts its due diligence and secures tenure agreements based on the information provided in this Site Assessment. If there have been any changes to the coordinates since the completion date of this site assessment, you must inform Property Services (FWINLeasing@bom.gov.au) to ensure that the due diligence performed remains valid.",
  rows: [
    { id:"currentCoords", kind:"coordGroup", label:"Current Co-Ordinates", coords:[
      { key:"primary",    label:"Primary (main equipment)",  source:{ row:"coords",     field:"existing" } },
      { key:"subsidiary", label:"Subsidiary (orifice line)", source:{ row:"riverCoords", field:"detail" } }
    ]},
    { id:"relocating", kind:"question", label:"Is the equipment being relocated?",
      options:["Yes","No"], source:{ row:"relocation", field:null },
      linkedNote:"Preselected from the Relocation answer in the table above — change it here if this differs." },
    { id:"relocationCoords", kind:"coordGroup", label:"Relocation Co-Ordinates", coords:[
      { key:"primary",   label:"Primary (main equipment)",              source:{ row:"relocation", field:"newLocation" }, default:"na" },
      { key:"orifice",   label:"Orifice line termination or GCO",        default:"na" },
      { key:"raingauge", label:"Rain gauge (if not located at primary)", default:"na" }
    ]},
    { id:"turnSoil", kind:"question", label:"Does the work require the turning of soil?", options:["Yes","No"], required:true },
    { id:"wlHeader", kind:"sectionHeader", label:"Water Level site details only", wlOnly:true },
    { id:"orificeReplace", kind:"question", label:"Will the orifice line be replaced?", options:["Yes","No"], required:true, wlOnly:true },
    { id:"orificeDirection", kind:"text", label:"What direction does the orifice line run from the primary equipment?", placeholder:"e.g. East-South-East", wlOnly:true },
    { id:"date", kind:"date", label:"Date" }
  ]
};

   when someone clicks "Publish to central store". See README for the exact
   table + policy setup.
     • Leave `url` or `anonKey` blank to stay in offline mode (bundled
       definitions.json + Import/Export), i.e. the original behaviour.
     • `anonKey` is the PUBLIC "anon" key — it is designed to be shipped to
       the browser; Row Level Security is what actually protects the data.  */
const SUPABASE = {
  url:      "https://gggahciaeooxolqzfpra.supabase.co",             // e.g. "https://abcdefgh.supabase.co"  (no trailing slash)
  anonKey:  "sb_publishable_DvIAiM8j6w_7hCyUImXwyQ_w3OwnoVb",             // the public anon key from Project Settings → API

  rowId:    1,              // primary-key id of the single master row
  // Optional friction before publishing. NOTE: this is a speed-bump, not real
  // security (anyone with the anon key can write per your RLS policy). Leave
  // "" to let anyone who can open this page publish.
  publishPassphrase: ""
};
const REMOTE_ON = !!(SUPABASE.url && SUPABASE.anonKey);
let remoteVersion = null;   // version of the row we last loaded (optimistic-lock check)

let defs = null;          // active definitions used by the builder + editor
let defsOrigin = "none";  // "file" | "url" | "local" | "imported" | "none"
let mode = "builder";     // "builder" | "manage"

/* ===================== DEFINITION HELPERS ===================== */
function clone(x){ return JSON.parse(JSON.stringify(x)); }

function normalizeDefinitions(raw){
  const d = (raw && typeof raw === "object") ? raw : {};
  const out = {
    version: d.version || 1,
    meta: (d.meta && typeof d.meta === "object") ? d.meta : {},
    optionSets: (d.optionSets && typeof d.optionSets === "object") ? d.optionSets : {},
    propertyServices: normalizePropertyServices(d.propertyServices),
    sharedRows: Array.isArray(d.sharedRows) ? d.sharedRows : [],
    tables: Array.isArray(d.tables) ? d.tables : []
  };
  // Coerce every set to an array of strings.
  Object.keys(out.optionSets).forEach(k=>{
    if(!Array.isArray(out.optionSets[k])) out.optionSets[k] = [];
    out.optionSets[k] = out.optionSets[k].map(String);
  });
  // Shared ("common") rows: full row definitions stored once and referenced by
  // any number of tables. Ensure each has a unique id.
  const sharedTaken = [];
  out.sharedRows = out.sharedRows.map((r,ri)=>{
    const row = normalizeRow(r, ri);
    row.id = uniqueId(row.id || ("commonRow" + (ri+1)), sharedTaken);
    sharedTaken.push(row.id);
    return row;
  });
  out.tables = out.tables.map((t,ti)=>({
    id: t.id || ("table" + (ti+1)),
    label: t.label || t.title || ("Table " + (ti+1)),
    title: t.title || t.label || ("Table " + (ti+1)),
    rows: Array.isArray(t.rows) ? t.rows.map((r,ri)=>normalizeTableRow(r,ri)) : []
  }));
  // Site Map pins: if the whole document predates the mapPin schema (nothing
  // declares one), seed the known coordinate rows so the map works out of the
  // box. A document that declares ANY mapPin is left exactly as authored (§4).
  const anyPin = out.sharedRows.some(r=>r.mapPin) ||
    out.tables.some(t=>t.rows.some(r=>!isSharedRef(r) && r.mapPin));
  if(!anyPin){
    const seed = (r)=>{
      if(r && !r.mapPin && DEFAULT_MAP_PINS[r.id]){
        const mp = normalizeMapPin(DEFAULT_MAP_PINS[r.id]);
        if(mp) r.mapPin = mp;
      }
    };
    out.sharedRows.forEach(seed);
    out.tables.forEach(t=>t.rows.forEach(r=>{ if(!isSharedRef(r)) seed(r); }));
  }
  return out;
}
// A table row is either a reference to a shared/common row ({shared:<id>}) or
// an inline row definition (the original shape).
function normalizeTableRow(r, ri){
  if(r && typeof r === "object" && typeof r.shared === "string" && r.shared){
    return { shared: r.shared };
  }
  return normalizeRow(r, ri);
}
function normalizeRow(r, ri){
  const type = (r.type === "single" || r.type === "multi") ? r.type
             : (r.type === "none" || r.type == null) ? "none" : "single";
  const row = {
    id: r.id || ("row" + (ri+1)),
    item: r.item || "",
    instruction: r.instruction || "",
    type
  };
  if(r.icon != null && String(r.icon).trim()) row.icon = String(r.icon).trim();
  if(r.note) row.note = r.note;
  if(type !== "none"){
    if(r.optionSet) row.optionSet = r.optionSet;
    else row.options = Array.isArray(r.options) ? r.options.map(String) : [];
  }
  // Optional site-map pin declaration (see normalizeMapPin). Older definition
  // documents simply carry no mapPin, so this degrades to "row has no pin".
  const mp = normalizeMapPin(r.mapPin);
  if(mp) row.mapPin = mp;
  if(Array.isArray(r.fields) && r.fields.length){
    row.fields = r.fields.map(f=>{
      const field = { key: f.key || "", label: f.label || "", type: (f.type === "textarea" ? "textarea" : "text") };
      if(f.placeholder) field.placeholder = f.placeholder;
      return field;
    });
  }
  return row;
}

/* Normalise a row's optional `mapPin` declaration. This is what lets a row
   declare itself as carrying a coordinate for the Site Map, so adding a new
   coordinate row is a *definitions* edit rather than a code change. Shape:
     mapPin: {
       field:     "<field key holding the coordinate>",   // required
       label:     "Pin label",
       colour:    "red" | "orange" | "blue" | "purple" | "green" | "#rrggbb",
       defaultOn: true,          // pin ticked by default (default true)
       anchor:    true,          // this pin is the default map centre (§6)
       requires:  { row:"relocation", not:"No" }  // optional gating (generic)
     }
   Returns null (row carries no pin) when there is nothing usable. Unknown keys
   are dropped, so a document written by a newer app still normalises cleanly. */
function normalizeMapPin(mp){
  if(!mp || typeof mp !== "object") return null;
  const field = (mp.field != null && String(mp.field).trim()) ? String(mp.field).trim() : "";
  if(!field) return null;   // a pin with no coordinate field is meaningless
  const out = { field, label: mp.label != null ? String(mp.label) : "" };
  const colour = (mp.colour != null ? mp.colour : mp.color);
  if(colour != null && String(colour).trim()) out.colour = String(colour).trim();
  out.defaultOn = mp.defaultOn !== false;   // ticked by default unless explicitly false
  if(mp.anchor) out.anchor = true;
  if(mp.requires && typeof mp.requires === "object" && mp.requires.row){
    const req = { row: String(mp.requires.row) };
    // A generic gate: show the pin only when the referenced row's answer
    // is (not) a given value. Implemented generically — no row id is
    // special-cased in JS (the "relocation not No" rule lives in data).
    if(mp.requires.not != null)    req.not    = String(mp.requires.not);
    if(mp.requires.equals != null) req.equals = String(mp.requires.equals);
    out.requires = req;
  }
  return out;
}

/* Normalise the Property Services block, falling back to the built-in default
   when a loaded definition set does not carry one (or carries an empty one). */
function normalizePropertyServices(ps){
  const src = (ps && typeof ps === "object" && Array.isArray(ps.rows) && ps.rows.length)
    ? ps : DEFAULT_PROPERTY_SERVICES;
  const cleanSource = s => (s && typeof s === "object" && s.row)
    ? { row: String(s.row), field: (s.field == null ? null : String(s.field)) } : null;
  const rows = (src.rows || []).map((r, ri)=>{
    const kind = ["coordGroup","question","text","sectionHeader","date"].includes(r.kind) ? r.kind : "text";
    const row = { id: r.id || ("psRow" + (ri+1)), kind, label: r.label || "" };
    if(r.wlOnly) row.wlOnly = true;
    if(r.required) row.required = true;
    if(r.linkedNote) row.linkedNote = String(r.linkedNote);
    if(r.placeholder) row.placeholder = String(r.placeholder);
    if(kind === "coordGroup"){
      row.coords = (Array.isArray(r.coords) ? r.coords : []).map((c, ci)=>{
        const coord = { key: c.key || ("c" + (ci+1)), label: c.label || "" };
        const cs = cleanSource(c.source); if(cs) coord.source = cs;
        if(c.default != null) coord.default = String(c.default);
        return coord;
      });
    } else if(kind === "question"){
      row.options = Array.isArray(r.options) ? r.options.map(String).filter(o=>o.trim()!=="") : [];
      const s = cleanSource(r.source); if(s) row.source = s;
    } else if(kind === "text"){
      const s = cleanSource(r.source); if(s) row.source = s;
    }
    return row;
  });
  return {
    title: src.title || DEFAULT_PROPERTY_SERVICES.title,
    note: src.note != null ? String(src.note) : DEFAULT_PROPERTY_SERVICES.note,
    rows
  };
}

// Resolve the option strings for a row (shared set or inline), filtering blanks.
function rowOptions(row){
  if(!rowHasOptions(row)) return [];
  let list = row.optionSet ? (defs.optionSets[row.optionSet] || []) : (row.options || []);
  return list.filter(o => String(o).trim() !== "");
}
function rowHasOptions(row){ return row.type === "single" || row.type === "multi"; }

/* ---- shared ("common") row helpers ----
   A table's rows may contain references of the form { shared:<id> } pointing
   into defs.sharedRows. resolveTableRow turns an entry into the concrete row
   object; effectiveRows is the resolved, render-ready row list for a table
   (dangling references are dropped). */
function isSharedRef(entry){ return !!(entry && typeof entry.shared === "string"); }
function sharedRowById(id){ return (defs && Array.isArray(defs.sharedRows) ? defs.sharedRows : []).find(r=>r.id === id) || null; }
function resolveTableRow(entry){ return isSharedRef(entry) ? sharedRowById(entry.shared) : entry; }
function effectiveRows(table){ return table.rows.map(resolveTableRow).filter(Boolean); }
function tableUsesShared(table, id){ return table.rows.some(e=>isSharedRef(e) && e.shared === id); }
function tablesUsingShared(id){ return defs.tables.filter(t=>tableUsesShared(t, id)); }

/* Produce a clean copy for export (drops empty option lines, unused keys). */
function exportableDefinitions(){
  const d = clone(defs);
  Object.keys(d.optionSets).forEach(k=>{
    d.optionSets[k] = d.optionSets[k].filter(o => String(o).trim() !== "");
  });
  const cleanRow = r=>{
    delete r._open;
    if(rowHasOptions(r) && Array.isArray(r.options)){
      r.options = r.options.filter(o => String(o).trim() !== "");
    }
  };
  if(!Array.isArray(d.sharedRows)) d.sharedRows = [];
  d.sharedRows.forEach(cleanRow);
  d.tables.forEach(t=>t.rows.forEach(r=>{ if(!isSharedRef(r)) cleanRow(r); }));
  // Property Services survives export re-normalised (drops any transient keys).
  d.propertyServices = normalizePropertyServices(d.propertyServices);
  if(!d.meta) d.meta = {};
  d.meta.updated = new Date().toISOString().slice(0,10);
  return d;
}

/* ===================== BUILDER STATE ===================== */
// state[tableId][rowId] = { selected: string|string[]|null, fields:{key:value}, note:string }
let state = {};
let activeTableId = null;
// Snapshot of a table's answers taken just before "Reset this table" clears it,
// so the clear can be undone. Shape: { tableId, data } or null when nothing to undo.
let clearedSnapshot = null;

function emptyRowState(row){
  return { selected: row.type === "multi" ? [] : null, fields:{}, note:"" };
}
// Rebuild builder state to match the current definitions, preserving any
// in-progress answers whose table/row still exist and whose type is compatible.
function reconcileState(){
  const next = {};
  (defs ? defs.tables : []).forEach(t=>{
    next[t.id] = {};
    effectiveRows(t).forEach(r=>{
      const prev = state[t.id] && state[t.id][r.id];
      if(prev){
        const wantsArray = r.type === "multi";
        const hadArray = Array.isArray(prev.selected);
        next[t.id][r.id] = {
          selected: wantsArray ? (hadArray ? prev.selected : []) : (hadArray ? null : prev.selected),
          fields: prev.fields || {},
          note: prev.note || ""
        };
      } else {
        next[t.id][r.id] = emptyRowState(r);
      }
    });
    // Preserve this table's Property Services answers across reconciliation.
    const prevPs = state[t.id] && state[t.id].__ps;
    next[t.id].__ps = {
      answers: (prevPs && prevPs.answers) || {},
      dirty:   (prevPs && prevPs.dirty)   || {}
    };
  });
  state = next;
  const ids = defs ? defs.tables.map(t=>t.id) : [];
  if(!ids.includes(activeTableId)) activeTableId = ids[0] || null;
}

function activeTable(){ return defs ? defs.tables.find(t=>t.id === activeTableId) : null; }

const wrapEl = document.getElementById("wrap");
const builderView = document.getElementById("builderView");
const manageView = document.getElementById("manageView");
const mapView = document.getElementById("mapView");
const psManageView = document.getElementById("psManageView");
const tabsEl = document.getElementById("tabs");
const rowsContainerEl = document.getElementById("rowsContainer");
const psContainerEl = document.getElementById("psContainer");
const progressTextEl = document.getElementById("progressText");
const progressFillEl = document.getElementById("progressFill");
const builderToolbar = document.getElementById("builderToolbar");
const sourceLabelEl = document.getElementById("sourceLabel");
const sourceChipEl = document.getElementById("sourceChip");

/* ===================== BUILDER RENDER ===================== */
function renderTabs(){
  tabsEl.innerHTML = "";
  defs.tables.forEach(t=>{
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (t.id === activeTableId ? " active" : "");
    btn.textContent = t.label;
    btn.addEventListener("click", ()=>{ activeTableId = t.id; renderBuilder(); });
    tabsEl.appendChild(btn);
  });
}

function rowHasContent(table, row){
  const s = state[table.id][row.id];
  const hasSelection = row.type === "multi" ? s.selected.length > 0 : !!s.selected;
  const hasFieldValue = row.fields ? row.fields.some(f => (s.fields[f.key]||"").trim().length>0) : false;
  const hasNote = s.note.trim().length>0;
  return hasSelection || hasFieldValue || hasNote;
}

function rowOutputLines(table, row){
  const s = state[table.id][row.id];
  const lines = [];
  if(row.type === "single" && s.selected){
    lines.push(s.selected);
  } else if(row.type === "multi" && s.selected.length){
    lines.push(...s.selected);
  }
  if(row.fields){
    row.fields.forEach(f=>{
      const v = (s.fields[f.key]||"").trim();
      if(v) lines.push(`${f.label}: ${v}`);
    });
  }
  if(s.note.trim()) lines.push(s.note.trim());
  return lines;
}

// A field is a "coordinate field" when its row's mapPin points at it. This is
// the single link between "this input holds a coordinate" and the Site Map, so
// declaring a new coordinate row (a mapPin in the definitions) automatically
// turns on validation here too — no hardcoded field list.
function isCoordField(row, key){ return !!(row && row.mapPin && row.mapPin.field === key); }

// Attach on-blur validation + DMS-paste conversion to a coordinate input. Uses
// the shared parseCoord so "valid" means the same thing here and on the map.
function attachCoordValidation(fieldEl, input, s, key){
  const hint = document.createElement("div");
  hint.className = "coord-hint"; hint.hidden = true;
  fieldEl.appendChild(hint);
  const commit = ()=>{ s.fields[key] = input.value; renderPreviewAndProgress(); };
  const clearHint = ()=>{ hint.hidden = true; hint.innerHTML = ""; };
  const wireFix = (r)=>{
    const fix = hint.querySelector(".coord-fix");
    if(fix && r.swap) fix.addEventListener("click", ()=>{
      input.value = formatCoord(r.swap.lat, r.swap.lon); commit(); validate();
    });
  };
  function validate(){
    const r = parseCoord(input.value);
    if(r.empty){ clearHint(); return; }          // empty = no pin, not an error
    if(!r.ok){
      let html = escapeHtml(r.error || "Not a valid coordinate.");
      if(r.swap) html += ` <button type="button" class="coord-fix">Swap to ${escapeHtml(formatCoord(r.swap.lat, r.swap.lon))}</button>`;
      hint.hidden = false; hint.className = "coord-hint coord-hint--error"; hint.innerHTML = html;
      wireFix(r); return;
    }
    if(r.warn){
      let html = escapeHtml(r.warn);
      if(r.swap) html += ` <button type="button" class="coord-fix">Swap to ${escapeHtml(formatCoord(r.swap.lat, r.swap.lon))}</button>`;
      hint.hidden = false; hint.className = "coord-hint coord-hint--warn"; hint.innerHTML = html;
      wireFix(r); return;
    }
    clearHint();
  }
  input.addEventListener("blur", validate);
  input.addEventListener("paste", (e)=>{
    const cd = e.clipboardData || window.clipboardData;
    const text = cd && cd.getData ? cd.getData("text") : "";
    if(!text) return;
    const r = parseCoord(text);
    if(!(r.ok && r.format === "dms")) return;     // only convert real DMS
    const converted = formatCoord(r.lat, r.lon);
    // Only announce a conversion when the stored text visibly changes — pasting
    // "-27.47° 153.02°" is already decimal and must not claim a DMS conversion.
    if(converted.replace(/\s/g,"") === String(text).trim().replace(/\s/g,"")) return;
    e.preventDefault();
    input.value = converted; commit();
    hint.hidden = false; hint.className = "coord-hint coord-hint--info";
    hint.innerHTML = `Converted from DMS. <button type="button" class="coord-undo">Undo</button>`;
    const undo = hint.querySelector(".coord-undo");
    // mousedown + preventDefault so clicking Undo does NOT blur the input: a blur
    // would run validate() on the now-valid decimal and clear this hint (and the
    // Undo button with it) before the click could land.
    undo.addEventListener("mousedown", (ev)=>{ ev.preventDefault(); input.value = String(text).trim(); commit(); validate(); });
  });
  // Validate whatever is already there on first render (e.g. restored answers).
  if((input.value||"").trim()) validate();
}

function renderRows(){
  const table = activeTable();
  rowsContainerEl.innerHTML = "";
  updateUndoBtn();
  // Option changes, tab switches and clears can all change the pins → the cached
  // screenshot is stale (§7.3).
  invalidateScreenshot();
  if(!table) return;

  let filledCount = 0;
  const rows = effectiveRows(table);

  rows.forEach(row=>{
    const s = state[table.id][row.id];
    const filled = rowHasContent(table, row);
    if(filled) filledCount++;

    const rowEl = document.createElement("div");
    rowEl.className = "row" + (filled ? " has-content" : "");

    // left column
    const itemEl = document.createElement("div");
    itemEl.className = "row-item";
    itemEl.innerHTML = `
      <div class="label">${row.icon ? `<span class="row-icon">${escapeHtml(row.icon)}</span>` : ""}${escapeHtml(row.item)}</div>
      ${row.instruction ? `<div class="instruction">${escapeHtml(row.instruction)}</div>` : ""}
      ${row.note ? `<div class="note-helper">${escapeHtml(row.note)}</div>` : ""}
    `;
    rowEl.appendChild(itemEl);

    // right column
    const controlsEl = document.createElement("div");
    controlsEl.className = "row-controls";

    const clearBtn = document.createElement("button");
    clearBtn.className = "row-clear";
    clearBtn.textContent = "Clear";
    clearBtn.addEventListener("click", ()=>{
      state[table.id][row.id] = emptyRowState(row);
      renderRows();
    });
    controlsEl.appendChild(clearBtn);

    if(rowHasOptions(row)){
      const optsWrap = document.createElement("div");
      optsWrap.className = "options-list";
      rowOptions(row).forEach((opt)=>{
        if(opt.startsWith("###")){
          const div = document.createElement("div");
          div.className = "option-divider";
          div.textContent = opt.replace(/^###\s*/, "");
          optsWrap.appendChild(div);
          return;
        }
        const label = document.createElement("label");
        label.className = "option-row";
        const input = document.createElement("input");
        input.type = row.type === "single" ? "radio" : "checkbox";
        input.name = `${table.id}_${row.id}`;
        if(row.type === "single"){
          input.checked = s.selected === opt;
          input.addEventListener("change", ()=>{ s.selected = opt; renderRows(); });
        } else {
          input.checked = s.selected.includes(opt);
          input.addEventListener("change", ()=>{
            if(input.checked){ s.selected.push(opt); }
            else { s.selected = s.selected.filter(v=>v!==opt); }
            renderRows();
          });
        }
        const span = document.createElement("span");
        span.textContent = opt;
        label.appendChild(input);
        label.appendChild(span);
        optsWrap.appendChild(label);
      });
      controlsEl.appendChild(optsWrap);
    }

    if(row.fields && row.fields.length){
      const fieldsWrap = document.createElement("div");
      fieldsWrap.className = "fields-list";
      row.fields.forEach(f=>{
        const fieldEl = document.createElement("div");
        fieldEl.className = "field";
        const lbl = document.createElement("label");
        lbl.textContent = f.label;
        fieldEl.appendChild(lbl);
        const input = document.createElement(f.type === "textarea" ? "textarea" : "input");
        if(f.type !== "textarea") input.type = "text";
        else input.rows = 2;
        input.value = s.fields[f.key] || "";
        input.placeholder = f.placeholder || "";
        input.addEventListener("input", ()=>{ s.fields[f.key] = input.value; renderPreviewAndProgress(); });
        fieldEl.appendChild(input);
        // Coordinate fields (those a mapPin points at) get live validation, a
        // swapped-lat/lon fix, and DMS-paste conversion. See §3.
        if(isCoordField(row, f.key)) attachCoordValidation(fieldEl, input, s, f.key);
        fieldsWrap.appendChild(fieldEl);
      });
      controlsEl.appendChild(fieldsWrap);
    }

    // note toggle
    const noteToggle = document.createElement("button");
    noteToggle.className = "note-toggle";
    noteToggle.textContent = s.note ? "− Note added" : "+ Add note";
    const noteBox = document.createElement("div");
    noteBox.className = "note-box" + (s.note ? " open" : "");
    const noteTextarea = document.createElement("textarea");
    noteTextarea.placeholder = "Any extra free text for this row...";
    noteTextarea.value = s.note;
    noteTextarea.addEventListener("input", ()=>{
      s.note = noteTextarea.value;
      renderPreviewAndProgress();
    });
    noteBox.appendChild(noteTextarea);
    noteToggle.addEventListener("click", ()=>{
      noteBox.classList.toggle("open");
    });
    controlsEl.appendChild(noteToggle);
    controlsEl.appendChild(noteBox);

    // preview
    const previewEl = document.createElement("div");
    previewEl.className = "preview";
    previewEl.dataset.previewFor = row.id;
    rowEl.appendChild(controlsEl);
    controlsEl.appendChild(previewEl);

    rowsContainerEl.appendChild(rowEl);
  });

  updatePreviews();
  updateProgress(filledCount, rows.length);
  renderPropertyServices();
}

function updatePreviews(){
  const table = activeTable();
  if(!table) return;
  effectiveRows(table).forEach(row=>{
    const el = rowsContainerEl.querySelector(`[data-preview-for="${cssEscape(row.id)}"]`);
    if(!el) return;
    const lines = rowOutputLines(table, row);
    if(lines.length){
      el.classList.add("filled");
      el.innerHTML = `<span class="preview-label">Will appear as</span>${escapeHtml(lines.join("\n"))}`;
    } else {
      el.classList.remove("filled");
      el.innerHTML = `<span class="preview-label">Will appear as</span>(nothing entered)`;
    }
  });
}

function renderPreviewAndProgress(){
  updatePreviews();
  // Any answer edit (coordinates included) makes a cached site-map screenshot
  // stale (§7.3). Cheap flag flip; safe to call often.
  invalidateScreenshot();
  const table = activeTable();
  if(!table) return;
  let filledCount = 0;
  const rows = effectiveRows(table);
  rows.forEach((row, idx)=>{
    if(rowHasContent(table, row)) filledCount++;
    const rowEl = rowsContainerEl.children[idx];
    if(rowEl){
      rowEl.classList.toggle("has-content", rowHasContent(table, row));
    }
  });
  updateProgress(filledCount, rows.length);
  // Scope answers can feed the Property Services block (coords, relocation…);
  // refresh it so any non-overridden derived values follow along live.
  renderPropertyServices();
}

function updateProgress(filled, total){
  progressTextEl.textContent = `${filled} of ${total} rows filled`;
  progressFillEl.style.width = total ? `${(filled/total)*100}%` : "0%";
}

function renderBuilder(){
  if(!defs || !defs.tables.length){
    tabsEl.innerHTML = "";
    rowsContainerEl.innerHTML = `<div class="empty-state">

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
// Escape a value for use inside a CSS attribute selector.
function cssEscape(str){
  if(window.CSS && CSS.escape) return CSS.escape(str);
  return String(str).replace(/["\\\]]/g, "\\$&");
}

/* ===================== COORDINATE PARSING (§3) =====================
   ONE shared parser is the single definition of "a valid coordinate": it feeds
   both the coordinate inputs in the Scope Builder and the Site Map. It accepts
   decimal degrees and DMS, and reports structural errors, a QLD sanity warning,
   and a likely lat/lon swap so the UI can offer a one-click fix.

   parseCoord(input) -> {
     ok,           // true when a usable lat/lon was produced
     empty,        // true when the input was blank (valid — means "no pin")
     lat, lon,     // numbers (decimal degrees) when ok
     format,       // "decimal" | "dms"
     error,        // human message when !ok
     warn,         // amber, non-blocking (e.g. outside QLD)
     swap          // when set, { lat, lon } of the swapped interpretation
   }                                                                        */
const QLD_BOUNDS = { latMin:-29.5, latMax:-9.0, lonMin:137.9, lonMax:153.6 };

function inRange(lat, lon){ return lat>=-90 && lat<=90 && lon>=-180 && lon<=180; }
function inQld(lat, lon){
  return lat>=QLD_BOUNDS.latMin && lat<=QLD_BOUNDS.latMax &&
         lon>=QLD_BOUNDS.lonMin && lon<=QLD_BOUNDS.lonMax;
}

// Does a string look like DMS (degrees/minutes/seconds) rather than decimal?
function looksLikeDms(s){
  if(/[°'"′″]/.test(s)) return true;                     // symbols
  if(/\d\s*[NSEW]\b/i.test(s)) return true;              // hemisphere letters
  if(/\d+\s*d\s*\d+\s*m/i.test(s)) return true;          // 27d28m..
  // Three whitespace-separated numbers per axis (deg min sec) is DMS-ish.
  const nums = (s.match(/-?\d+(?:\.\d+)?/g) || []).length;
  return nums >= 5;                                       // ~ 3+3 minus overlap
}

// Sign for a DMS axis. A hemisphere letter is N/S/E/W that sits at a *token
// boundary* (followed by whitespace, comma or end) — this deliberately ignores
// the 'd'/'m'/'s' unit letters (e.g. the seconds 's' in "15.6s"), which are
// always wedged between digits/letters rather than at a boundary. Falls back to
// a leading minus sign when no hemisphere is present.
function dmsSign(str){
  const m = String(str).match(/([NSEW])(?=[\s,]|$)/i);
  if(m) return /[SW]/i.test(m[1]) ? -1 : 1;
  return /^\s*-/.test(str) ? -1 : 1;
}
// Parse a single DMS axis like  27°28'15.6"S  /  -27 28 15.6  /  27d28m15.6sS
// Returns a signed decimal degree, or null if it doesn't parse.
function parseDmsAxis(str){
  const s = String(str).trim();
  if(!s) return null;
  // Drop symbols and every letter (unit letters and hemispheres alike) so only
  // the numeric degree/minute/second run remains; the sign came from dmsSign.
  const parts = (s.replace(/[°'"′″]/g," ").replace(/[a-zA-Z]/g," ").match(/\d+(?:\.\d+)?/g) || []).map(Number);
  if(!parts.length) return null;
  const d = parts[0]||0, m = parts[1]||0, sec = parts[2]||0;
  if(m>=60 || sec>=60) return null;
  return (d + m/60 + sec/3600) * dmsSign(s);
}

// Split a DMS blob into its lat and lon halves. Prefers a boundary N/S cut;
// otherwise splits on a comma; otherwise splits the number run evenly in two.
function splitDmsPair(s){
  const t = s.trim();
  // Cut right after a boundary N/S hemisphere (ignores a seconds 's').
  const ns = t.match(/^(.*?[NS](?=[\s,]|$))\s*[, ]?\s*(.*)$/i);
  if(ns && ns[2].trim()) return [ns[1], ns[2]];
  if(t.includes(",")){ const p = t.split(","); if(p.length===2) return [p[0], p[1]]; }
  // Fall back: even split of the number tokens.
  const nums = t.match(/-?\d+(?:\.\d+)?/g) || [];
  if(nums.length>=2 && nums.length%2===0){
    const half = nums.length/2;
    // Rebuild rough halves by string position of the (half+1)-th number.
    let seen=0, idx=0;
    t.replace(/-?\d+(?:\.\d+)?/g, (m,off)=>{ if(seen===half && !idx) idx=off; seen++; return m; });
    if(idx) return [t.slice(0,idx), t.slice(idx)];
  }
  return null;
}

function parseCoord(input){
  const raw = (input == null ? "" : String(input)).trim();
  if(!raw) return { ok:false, empty:true, lat:null, lon:null };

  let lat=null, lon=null, format="decimal";

  if(looksLikeDms(raw)){
    format = "dms";
    const pair = splitDmsPair(raw);
    if(!pair) return { ok:false, error:"Couldn't read that as coordinates." };
    lat = parseDmsAxis(pair[0]);
    lon = parseDmsAxis(pair[1]);
    if(lat==null || lon==null) return { ok:false, error:"Couldn't read that DMS coordinate." };
  } else {
    const nums = raw.replace(/[°]/g," ").match(/-?\d+(?:\.\d+)?/g) || [];
    if(nums.length < 2) return { ok:false, error:"Enter latitude and longitude (e.g. -27.4710, 153.0234)." };
    if(nums.length > 2) return { ok:false, error:"Too many numbers — expected latitude, longitude." };
    lat = Number(nums[0]); lon = Number(nums[1]);
  }

  if(!isFinite(lat) || !isFinite(lon)) return { ok:false, error:"Couldn't read that as coordinates." };

  // Structural range check, with a swap suggestion when the pair is reversed.
  if(!inRange(lat, lon)){
    if(inRange(lon, lat)) return { ok:false, error:"Latitude/longitude look swapped.", swap:{ lat:lon, lon:lat } };
    return { ok:false, error:"Latitude must be -90..90 and longitude -180..180." };
  }

  const out = { ok:true, lat, lon, format };
  // Likely-swapped heuristic even when both are individually in range: QLD lat
  // is negative and small-ish, lon is ~150. If swapping lands inside QLD while
  // the current order does not, offer the swap.
  if(!inQld(lat, lon) && inQld(lon, lat)){
    out.swap = { lat:lon, lon:lat };
    out.warn = "These look swapped for a Queensland site.";
  } else if(!inQld(lat, lon)){
    out.warn = "Outside the usual Queensland range — double-check.";
  }
  return out;
}

// Format a decimal-degree pair the way the app stores/copies coordinates.
function formatCoord(lat, lon){
  const r = n => (Math.round(n*1e6)/1e6);
  return `${r(lat)}, ${r(lon)}`;
}

async function copyTable(){
  const table = activeTable();
  if(!table){ showStatus("No table to copy"); return; }
  // Two separate tables land in Word: the scope table, then the Property Services
  // table. A paragraph between them stops Word merging them into one. The
  // Property Services table is only appended when its tick box is ticked — some
  // users want only the scope table.
  let html = buildHtmlTable();
  let text = buildPlainText();

  // Optional site-map image (§7). Built here so that if it fails (offline, CORS,
  // service down) the tables still copy exactly as before — the map can never
  // break the copy (§7.4). With the tickbox unticked this whole block is skipped
  // and the output is byte-identical to before this feature (§8).
  let mapNote = "";
  if(includeMapCopy){
    showStatus("Preparing map…");
    const hadPins = (function(){ const t = activeTable(); refreshPins(t); return activeSitePins().length > 0; })();
    const res = await getMapImageForCopy();
    if(res && res.dataUrl){
      html += `<p style="margin:12px 0 0;font-family:Calibri,Arial,sans-serif;">&nbsp;</p>` +
        `<div><img src="${res.dataUrl}" alt="Site map" style="width:16cm;max-width:100%;height:auto;border:1px solid #999;"></div>`;
      text += "\n\n[Site map image included — contours: " + res.meta.interval + " m]\n";
      const outside = res.meta.pinsTotal - res.meta.pinsInView;
      if(outside > 0) mapNote = " — " + outside + " of " + res.meta.pinsTotal + " pins are outside the current view";
      else mapNote = " (map included)";
    } else if(!hadPins){
      mapNote = " (map not included — no coordinates entered)";
    } else {
      // Pins exist but the raster didn't capture: never paste black — omit the
      // image and point the user at the diagnostics (A2 "fail loudly").
      mapNote = " (map not included — capture failed; open the Site Map ▸ Map diagnostics)";
    }
  }

  if(includePsCopy){
    html += `<p style="margin:12px 0 0;font-family:Calibri,Arial,sans-serif;">&nbsp;</p>` +
      buildPropertyServicesHtml(table);
    text += "\n\n" + buildPropertyServicesText(table);
  }

  try{
    if(navigator.clipboard && window.ClipboardItem){
      const item = new ClipboardItem({
        "text/html": new Blob([html], {type:"text/html"}),
        "text/plain": new Blob([text], {type:"text/plain"})
      });
      await navigator.clipboard.write([item]);
      showStatus("Copied — paste into Word" + mapNote);
      return;
    }
  }catch(e){ /* fall through to legacy method */ }

  try{
    const container = document.createElement("div");
    container.style.position = "fixed";
    container.style.left = "-9999px";
    container.style.top = "0";
    container.innerHTML = html;
    document.body.appendChild(container);

    const range = document.createRange();
    range.selectNodeContents(container);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    const ok = document.execCommand("copy");
    sel.removeAllRanges();
    document.body.removeChild(container);

    if(ok){ showStatus("Copied — paste into Word" + mapNote); }
    else { throw new Error("execCommand failed"); }
  }catch(e){
    try{
      await navigator.clipboard.writeText(text);
      showStatus("Copied as plain text only" + (includeMapCopy ? " (map needs rich paste)" : ""));
    }catch(e2){
      showStatus("Copy failed — see console");
      console.error(e2);
    }
  }
}

function showStatus(msg){
  statusMsg.textContent = msg;
  setTimeout(()=>{ statusMsg.textContent = ""; }, 3500);
}

function collectIssues(){
  const issues = [];
  const tIds = defs.tables.map(t=>t.id);
  tIds.forEach((id,i)=>{
    if(!id.trim()) issues.push("A table has a blank ID.");
    else if(tIds.indexOf(id) !== i) issues.push(`Duplicate table ID "${id}".`);
  });
  // Shared/common rows: unique, non-blank ids and valid option-set references.
  const shared = defs.sharedRows || [];
  const sIds = shared.map(r=>r.id);
  shared.forEach((r,i)=>{
    if(!String(r.id||"").trim()) issues.push("A common row has a blank ID.");
    else if(sIds.indexOf(r.id) !== i) issues.push(`Duplicate common row ID "${r.id}".`);
    if(r.optionSet && !defs.optionSets[r.optionSet]){
      issues.push(`Common row "${r.item}" references missing option set "${r.optionSet}".`);
    }
  });
  defs.tables.forEach(t=>{
    const effIds = [];
    t.rows.forEach(e=>{
      if(isSharedRef(e)){
        if(!sharedRowById(e.shared)) issues.push(`Table "${t.label}" references missing common row "${e.shared}".`);
        else effIds.push(e.shared);
      } else {
        if(!String(e.id||"").trim()) issues.push(`Table "${t.label}" has a row with a blank ID.`);
        else effIds.push(e.id);
        if(e.optionSet && !defs.optionSets[e.optionSet]){
          issues.push(`Row "${e.item}" references missing option set "${e.optionSet}".`);
        }
      }
    });
    effIds.forEach((id,i)=>{
      if(effIds.indexOf(id) !== i) issues.push(`Table "${t.label}" has duplicate row ID "${id}".`);
    });
  });
  return [...new Set(issues)];
}
