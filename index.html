/* ===================== CENTRAL STORE (SUPABASE) ===================== */
function sbHeaders(extra){
  return Object.assign({
    "apikey": SUPABASE.anonKey,
    "Authorization": "Bearer " + SUPABASE.anonKey
  }, extra || {});
}

// Turn a failed Supabase response into an Error carrying its real message.
// (e.g. "HTTP 401: Invalid API key" instead of a bare "HTTP 401".)
async function sbError(res){
  let detail = "";
  try{
    const text = await res.text();
    try{ const j = JSON.parse(text); detail = j.message || j.msg || j.error_description || j.error || j.hint || text; }
    catch(_){ detail = text; }
  }catch(_){}
  detail = String(detail || "").trim().slice(0, 300);
  return new Error("HTTP " + res.status + (detail ? ": " + detail : ""));
}

// Read the single master row. Sets remoteVersion for the optimistic-lock check.
async function remoteLoad(){
  const url = `${SUPABASE.url}/rest/v1/${encodeURIComponent(SUPABASE.table)}` +
              `?id=eq.${encodeURIComponent(SUPABASE.rowId)}&select=doc,version,updated_at`;
  const res = await fetch(url, { headers: sbHeaders(), cache:"no-store" });
  if(!res.ok) throw await sbError(res);
  const rows = await res.json();
  if(!rows.length) throw new Error("no master row (id=" + SUPABASE.rowId + ") in table " + SUPABASE.table);
  const row = rows[0];
  if(!row.doc || typeof row.doc !== "object" || !Array.isArray(row.doc.tables)){
    throw new Error("stored value is not a valid definitions object");
  }
  remoteVersion = row.version;
  return row.doc;
}

// Publish a doc, but only if nobody else has published since we loaded.
// Throws err.conflict === true when the version has moved on.
async function remotePublish(doc){
  if(remoteVersion == null){
    // We never successfully loaded a version, so we can't safely overwrite.
    throw new Error("load the latest before publishing");
  }
  const next = remoteVersion + 1;
  const url = `${SUPABASE.url}/rest/v1/${encodeURIComponent(SUPABASE.table)}` +
              `?id=eq.${encodeURIComponent(SUPABASE.rowId)}&version=eq.${encodeURIComponent(remoteVersion)}`;
  const res = await fetch(url, {
    method: "PATCH",
    headers: sbHeaders({ "Content-Type":"application/json", "Prefer":"return=representation" }),
    body: JSON.stringify({ doc: doc, version: next, updated_at: new Date().toISOString() })
  });
  if(!res.ok) throw await sbError(res);
  const rows = await res.json();
  if(!rows.length){
    const err = new Error("someone else published first");
    err.conflict = true;
    throw err;
  }
  remoteVersion = rows[0].version;
  return rows[0].doc;
}

async function publishToRemote(){
  if(!REMOTE_ON){ mStatus("No central store is configured.", true); return; }
  const issues = collectIssues();
  if(issues.length){ mStatus("Fix the listed problems before publishing.", true); return; }
  if(SUPABASE.publishPassphrase){
    const pass = prompt("Enter the publish passphrase:");
    if(pass === null) return;
    if(pass !== SUPABASE.publishPassphrase){ mStatus("Wrong passphrase — not published.", true); return; }
  }
  mStatus("Publishing…");
  try{
    const saved = await remotePublish(exportableDefinitions());
    applyDefinitions(saved, "remote");
    localStorage.removeItem(LS_DEFS);   // the draft is now the published copy
    mStatus("Published to the central store — everyone gets it on next load.");
  }catch(err){
    if(err.conflict){
      mStatus("Someone else published since you loaded. Click “Reload latest”, re-apply your change, then publish again. (Your edits are still saved in this browser.)", true);
    }else{
      mStatus("Publish failed: " + err.message + " — your changes are still saved locally.", true);
    }
  }
}

async function reloadFromRemote(){
  if(!confirm("Discard local edits and reload the latest published definitions? This clears your unpublished changes in this browser.")) return;
  localStorage.removeItem(LS_DEFS);
  try{
    applyDefinitions(await remoteLoad(), "remote");
    mStatus("Reloaded the latest from the central store.");
  }catch(err){
    mStatus("Reload failed: " + err.message, true);
  }
}

function resumeDraft(){
  const draft = localStorage.getItem(LS_DEFS);
  if(!draft){ renderManage(); return; }
  try{ applyDefinitions(JSON.parse(draft), "local"); mStatus("Resumed your unpublished draft."); }
  catch(e){ localStorage.removeItem(LS_DEFS); mStatus("The saved draft was corrupt and has been discarded.", true); }
}
function discardDraft(){
  localStorage.removeItem(LS_DEFS);
  mStatus("Discarded the unpublished draft.");
  renderManage();
}

/* ============================================================================
   SITE MAP (§5, §6, §7)
   ----------------------------------------------------------------------------
   A modal ArcGIS map over QLD imagery + LiDAR contours + road reserve, pinned
   with every coordinate the current table carries (declared via row.mapPin, §4),
   optionally screenshotted into the Word copy.

   The Esri payload and the QLD services are ALL external. This whole module is
   written so that when they are unreachable (offline / file:// / blocked) the
   app degrades cleanly: the modal explains it needs a network connection and the
   Word copy still produces the tables. Nothing here may break the existing copy.
   ========================================================================== */

// Map *services* live here as a documented constant (like SUPABASE) so an
// endpoint move is a one-line edit. WHICH ROWS feed the map is data-driven via
// row.mapPin (§4) — deliberately not hardcoded here.
const SITE_MAP_CONFIG = {
  esriBase: "https://js.arcgis.com/4.31/",
  imagery:  "https://spatial-img.information.qld.gov.au/arcgis/rest/services/Basemaps/LatestStateProgram_AllUsers/ImageServer",
  imageryLabels: "https://spatial-gis.information.qld.gov.au/arcgis/rest/services/Basemaps/QldImageryLabel/MapServer",
  contours: "https://spatial-gis.information.qld.gov.au/arcgis/rest/services/Elevation/Contours/MapServer",
  // Sublayer 30 = "Contour LiDAR 1m" (fallback default — NOT verified against the
  // live service in this sandbox, egress to the QLD hosts is blocked here). The
  // live IDs are probed by name at runtime (resolveContourLayers) and whatever it
  // resolves is reported in the Map diagnostics panel so we can confirm them.
  contourSublayers: { "1": 30, "5": null, "10": null },
  cadastre: "https://spatial-gis.information.qld.gov.au/arcgis/rest/services/PlanningCadastre/LandParcelPropertyFramework/MapServer",
  cadastreParcelsSublayer: 4,
  // Road-reserve boundaries are drawn client-side as a FeatureLayer so we control
  // symbology + scale ourselves (A1 §5): the service's own hairline outline is
  // invisible over aerial imagery, and we never want a server-side maxScale to
  // hide it when zoomed in. High-contrast magenta outline, NO fill.
  roadOutline: { color: [255, 0, 200, 1], width: 2 },
  // Explicit draw order (A1 §2): layers stream in as they resolve, so map.layers
  // must be ordered by design, not by completion time. Lower index = bottom.
  // Pins live in view.graphics and are always on top of every layer here.
  layerOrder: { imagery: 0, road: 1, contour: 2, labels: 3 },
  // Candidate DCDB fields that may denote "road". The map reads the live schema,
  // picks the first field that exists, and filters UPPER(field) LIKE '%ROAD%'.
  // If none resolve (or none return features) the road layer is WITHHELD and a
  // banner is shown — never full unfiltered cadastre (§5).
  roadFieldCandidates: ["tenure","parcel_typ","parcel_type","feat_name","segpar_typ","lot_area"],
  attribution: "© State of Queensland (Department of Natural Resources and Mines) — CC BY 4.0",
  screenshotWidth: 1600,
  offscreenSize: { width: 1000, height: 720 },
  // Initial constructor extent (§4.5): the view is built AT the anchor pin's
  // coordinate at this zoom, so it never renders a CBD-wide default extent and
  // never issues heavy exportImage requests before framing. goTo only refines it.
  anchorZoom: 16,
  // Dynamic MapImageLayers are unreadable when zoomed right out and asking them
  // to render a whole-state extent is what makes them slow. Suppress them above
  // this scale and show a "zoom in" hint instead of silently rendering nothing
  // (§4.6). ~1:20,000. Confirm against each sublayer's own Min/Max scale in ?f=json.
  dynamicMinScale: 20000,
  // Every external call is bounded (§4.3). Nothing may block the modal forever.
  // 8 s per QLD call / layer / view; the Esri bundle is a much larger download so
  // it gets a little more headroom — still bounded, still bannered on expiry.
  timeouts: { esri: 12000, meta: 8000, layer: 8000, view: 8000 }
};

const PIN_RGB = {
  red:[214,40,40], orange:[224,122,10], blue:[30,110,200],
  purple:[130,60,200], green:[40,150,70], teal:[15,150,140]
};
function pinRgb(colour){ return PIN_RGB[colour] || PIN_RGB.red; }

// Whether the site map is included in the Word copy. Off by default so existing
// output is byte-identical unless the user opts in (§7.4, §8).
let includeMapCopy = false;

// Live module state. The MapView is kept alive between opens and re-fitted
// rather than re-instantiated (§6). Screenshot is cached and invalidated on any
// change to pins, coordinates, contour interval, or extent (§7.3).
const siteMap = {
  esriPromise: null, esri: null,
  overlay: null, mapHost: null, panelHost: null, bannerHost: null, statusHost: null,
  diagHost: null, scaleHintHost: null, scaleWatchHandle: null,
  view: null, esriMap: null,
  layers: {},               // { imagery, road, contour, labels }
  contourIds: null,         // { "1":id, "5":id, "10":id } resolved from service
  contourInterval: "1",     // requested interval
  renderedInterval: "1",    // interval actually shown after coverage fallback
  contourMode: "",          // "feature" | "mapimage" — how contours are drawn (A4)
  contoursOn: true,         // contours on/off toggle (A4 §4)
  userHasAdjustedView: false,
  moveMode: false,          // "Move pins" mode — draggable pins, off by default (B1)
  hoverGraphic: null,       // pin graphic currently under the pointer (B1)
  dragGraphic: null,        // pin graphic being dragged (B1)
  lastPinEdit: null,        // { tableId, rowId, field, prevValue } for undo (B1)
  measureWidget: null,      // DistanceMeasurement2D widget instance (B2)
  pins: [],                 // resolved pin descriptors for the current table
  triggerEl: null,
  screenshot: { dataUrl: null, valid: false, meta: null },
  building: false,
  // In-app diagnostics (§6). The user has no DevTools, so every external
  // dependency reports its own outcome here and nothing is console-only.
  diag: null
};

// ---------------------------------------------------------------------------
// External-call plumbing (§4.3): timeouts + timing + a self-reporting log.
// Nothing external may block the modal indefinitely, so every fetch / layer
// .load() / view.when() below goes through one of these bounded helpers.
// ---------------------------------------------------------------------------
function smNow(){ return (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now(); }

// A timeout that reads like a sentence a non-developer can relay (§6), e.g.
// "Contours service did not respond within 8 s" — never a raw TypeError.
function smTimeoutError(label, ms){
  const e = new Error(label + " did not respond within " + Math.round(ms/1000) + " s");
  e.isTimeout = true;
  return e;
}
// Race any promise against a timeout. Rejects with a plain-language error on
// expiry; clears its own timer either way.
function withTimeout(promise, ms, label){
  let timer;
  const t = new Promise((_, rej)=>{ timer = setTimeout(()=> rej(smTimeoutError(label, ms)), ms); });
  return Promise.race([promise, t]).finally(()=>{ clearTimeout(timer); });
}
// A JSON fetch that actually aborts on timeout (so a hung request is cancelled,
// not just ignored) and returns how long it took. Throws a plain-language error.
async function timedFetchJson(url, label, ms){
  const start = smNow();
  const ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
  const timer = ctrl ? setTimeout(()=> ctrl.abort(), ms) : null;
  try{
    const res = await fetch(url, ctrl ? { cache:"no-store", signal: ctrl.signal } : { cache:"no-store" });
    const json = await res.json();
    return { json, ms: Math.round(smNow() - start) };
  }catch(e){
    const err = (e && e.name === "AbortError") ? smTimeoutError(label, ms) : e;
    err._ms = Math.round(smNow() - start);
    throw err;
  }finally{ if(timer) clearTimeout(timer); }
}

/* ---- diagnostics model (§6) ---------------------------------------------- */
function freshDiag(){
  return {
    esri:     { status:"pending", ms:null, note:"" },
    imagery:  { status:"pending", ms:null, note:"", layerClass:"" },
    contours: { status:"pending", ms:null, note:"", sublayer:"", mode:"" },
    cadastre: { status:"pending", ms:null, note:"", resolved:"", serviceScale:"" },
    road:     { status:"pending", ms:null, note:"", mode:"" },
    labels:   { status:"pending", ms:null, note:"" },
    // Screenshot capture (A5): did takeScreenshot land a raster on the canvas?
    screenshot: { status:"idle", note:"", dims:"", decoded:null },
    // Per-layer snapshot rebuilt from map.layers on demand (A5): visible,
    // effective min/max scale, and index in the stack.
    layers: [],
    log: []
  };
}
function resetDiag(){ siteMap.diag = freshDiag(); }
function diagLog(msg){
  if(!siteMap.diag) resetDiag();
  const t = new Date().toLocaleTimeString();
  siteMap.diag.log.push("[" + t + "] " + msg);
  if(siteMap.diag.log.length > 250) siteMap.diag.log.shift();
}
// Record an outcome for one dependency and refresh the panel if it's open.
function setDiag(key, fields, logMsg){
  if(!siteMap.diag) resetDiag();
  if(siteMap.diag[key]) Object.assign(siteMap.diag[key], fields);
  if(logMsg) diagLog(logMsg);
  renderDiagnostics();
}

/* ---- reading coordinates out of the active table (same source as the PS
        mirror: state[table][row].fields[field]) ---- */
function readRowCoordRaw(table, rowId, field){
  const rs = state[table.id] && state[table.id][rowId];
  if(!rs) return "";
  if(field == null) return Array.isArray(rs.selected) ? rs.selected.join(", ") : (rs.selected || "");
  return (rs.fields && rs.fields[field] != null) ? String(rs.fields[field]) : "";
}

// Generic mapPin gate (§4). No row id is special-cased here — the rule lives in
// the definition's requires:{row,not|equals}.
function mapPinGatePasses(table, requires){
  if(!requires || !requires.row) return true;
  const answer = readRowCoordRaw(table, requires.row, null).trim();
  if(requires.not != null)    return answer.toLowerCase() !== String(requires.not).toLowerCase();
  if(requires.equals != null) return answer.toLowerCase() === String(requires.equals).toLowerCase();
  return true;
}

// Resolve the pins for a table into descriptors. Rows gated out (e.g. relocation
// = "No") are dropped; rows with a present-but-invalid coordinate are KEPT and
// flagged so the panel can show the parse error rather than silently dropping
// them (§4). Empty coordinate = no pin.
function resolveMapPins(table){
  if(!table) return [];
  const out = [];
  effectiveRows(table).forEach(row=>{
    const mp = row.mapPin;
    if(!mp || !mp.field) return;
    if(!mapPinGatePasses(table, mp.requires)) return;
    const raw = readRowCoordRaw(table, row.id, mp.field).trim();
    if(!raw) return;                       // empty = no pin
    const parsed = parseCoord(raw);
    out.push({
      key: row.id,
      rowId: row.id,
      field: mp.field,                       // which field this pin writes back to (B1/B4)
      label: mp.label || row.item || row.id,
      colour: mp.colour || "red",
      anchor: !!mp.anchor,
      defaultOn: mp.defaultOn !== false,
      raw,
      ok: !!parsed.ok,
      lat: parsed.ok ? parsed.lat : null,
      lon: parsed.ok ? parsed.lon : null,
      error: parsed.ok ? "" : (parsed.error || "Invalid coordinate"),
      warn: parsed.warn || ""
    });
  });
  return out;
}

// Merge freshly-resolved pins with any existing on/off toggles so a re-resolve
// (e.g. the user typed a new coordinate) keeps the panel choices.
function refreshPins(table){
  const prev = {};
  siteMap.pins.forEach(p=>{ prev[p.key] = p.on; });
  siteMap.pins = resolveMapPins(table).map(p=>({
    ...p,
    on: (p.key in prev) ? prev[p.key] : (p.ok && p.defaultOn)
  }));
  return siteMap.pins;
}

function activeSitePins(){ return siteMap.pins.filter(p=>p.on && p.ok); }

// Coordinate equality to the app's stored precision (6 dp ≈ 0.1 m).
function coordEq(a, b){
  if(!a || !b) return a === b;
  const r = n => Math.round(n*1e6);
  return r(a.lat) === r(b.lat) && r(a.lon) === r(b.lon);
}
// Snapshot the current anchor pin coordinate (rowId + lat/lon) for change
// detection across a modal re-open (A3).
function anchorSnapshot(pins){
  const list = (pins || []).filter(p=>p.on && p.ok);
  const anchor = list.find(p=>p.anchor) || list[0];
  return anchor ? { rowId: anchor.rowId, lat: anchor.lat, lon: anchor.lon } : null;
}

// Re-read every pin from app state on each open and decide how the view must
// react (A3). The view is kept alive between opens, but the pins — and the
// framing — must always reflect the CURRENT table values, not the values from
// when the view was first built. Returns { anchorChanged, anyChanged }.
function syncPinsForReopen(table){
  // Snapshot the pins as they stood before this open, keyed by row, so we can
  // tell what the table edit actually changed.
  const prevByRow = {};
  siteMap.pins.forEach(p=>{ if(p.ok) prevByRow[p.rowId] = { lat:p.lat, lon:p.lon }; });
  const prevAnchor = anchorSnapshot(siteMap.pins);

  refreshPins(table);                 // re-resolve from state, preserving toggles

  const nextAnchor = anchorSnapshot(siteMap.pins);
  const anchorChanged = !!(prevAnchor && nextAnchor) &&
    (prevAnchor.rowId !== nextAnchor.rowId || !coordEq(prevAnchor, nextAnchor));

  let anyChanged = false;
  const nowByRow = {};
  siteMap.pins.forEach(p=>{ if(p.ok) nowByRow[p.rowId] = { lat:p.lat, lon:p.lon }; });
  const rows = new Set([...Object.keys(prevByRow), ...Object.keys(nowByRow)]);
  rows.forEach(r=>{ if(!coordEq(prevByRow[r], nowByRow[r])) anyChanged = true; });

  if(anchorChanged){
    // The manual framing was for the OLD location and is no longer meaningful —
    // drop it so fitView re-centres on the new anchor.
    siteMap.userHasAdjustedView = false;
    diagLog("Anchor pin coordinate changed since last open — re-centring on the new location.");
  }
  if(anyChanged) invalidateScreenshot();
  return { anchorChanged, anyChanged };
}

/* ---- lazy Esri loader (§5, §7.3): inject CSS + AMD loader once, on demand ---- */
function loadEsri(){
  if(siteMap.esri){ setDiag("esri", { status:"loaded" }); return Promise.resolve(siteMap.esri); }
  if(siteMap.esriPromise) return siteMap.esriPromise;
  const start = smNow();
  diagLog("Loading the Esri map library from " + SITE_MAP_CONFIG.esriBase + " …");
  const load = new Promise((resolve, reject)=>{
    try{
      const css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = SITE_MAP_CONFIG.esriBase + "esri/themes/light/main.css";
      document.head.appendChild(css);
      const s = document.createElement("script");
      s.src = SITE_MAP_CONFIG.esriBase;
      s.async = true;
      s.onload = ()=>{
        if(!window.require){ reject(new Error("Esri loader did not initialise")); return; }
        window.require([
          "esri/Map","esri/views/MapView",
          "esri/layers/ImageryLayer","esri/layers/ImageryTileLayer",
          "esri/layers/MapImageLayer","esri/layers/TileLayer","esri/layers/FeatureLayer",
          "esri/Graphic","esri/core/reactiveUtils","esri/config",
          "esri/widgets/DistanceMeasurement2D"
        ], (Map,MapView,ImageryLayer,ImageryTileLayer,MapImageLayer,TileLayer,FeatureLayer,Graphic,reactiveUtils,esriConfig,DistanceMeasurement2D)=>{
          siteMap.esri = { Map,MapView,ImageryLayer,ImageryTileLayer,MapImageLayer,TileLayer,FeatureLayer,Graphic,reactiveUtils,esriConfig,DistanceMeasurement2D };
          resolve(siteMap.esri);
        }, reject);
      };
      s.onerror = ()=> reject(new Error("Could not load the Esri map library (network required)"));
      document.head.appendChild(s);
    }catch(e){ reject(e); }
  });
  // A slow/blocked CDN shouldn't hang forever (§4.3). The bundle is large, so it
  // gets more headroom than the QLD calls — but it is still bounded.
  siteMap.esriPromise = withTimeout(load, SITE_MAP_CONFIG.timeouts.esri, "Esri map library (js.arcgis.com)")
    .then(esri=>{
      setDiag("esri", { status:"loaded", ms: Math.round(smNow()-start) }, "Esri map library loaded.");
      return esri;
    })
    .catch(err=>{
      siteMap.esriPromise = null;   // allow a later retry
      setDiag("esri", { status: err.isTimeout ? "timed out" : "failed", ms: Math.round(smNow()-start), note: err.message||"error" },
        "Esri map library " + (err.isTimeout ? "timed out" : "failed") + ": " + (err.message||"error"));
      throw err;
    });
  return siteMap.esriPromise;
}

/* ---- resolve the road-reserve filter from the LIVE cadastre schema (§5) ----
   Bounded + timed (§4.3) and self-reporting (§6). Returns { field, where } on a
   confident match, or null (caller withholds the layer and banners it). This is
   deliberately OFF the modal's critical path (§4.1): the map opens without it. */
async function resolveRoadWhere(){
  const base = SITE_MAP_CONFIG.cadastre + "/" + SITE_MAP_CONFIG.cadastreParcelsSublayer;
  const T = SITE_MAP_CONFIG.timeouts.meta;
  let fields = [];
  try{
    const { json, ms } = await timedFetchJson(base + "?f=json", "Cadastre schema (cadastre ?f=json)", T);
    fields = (json.fields || []).map(f=> String(f.name));
    // Surface the service's OWN declared scale window for sublayer 4 (A1 §4 / A5):
    // a server-side maxScale here would hide parcels when zoomed in, exactly the
    // road-reserve-invisible symptom. minScale 0 / maxScale 0 = no server limit.
    const smin = (json.minScale != null) ? json.minScale : 0;
    const smax = (json.maxScale != null) ? json.maxScale : 0;
    const scaleNote = "sublayer " + SITE_MAP_CONFIG.cadastreParcelsSublayer +
      " service min:" + (smin || 0) + " max:" + (smax || 0) +
      ((smax && smax > 0) ? " ** service hides this sublayer when zoomed in past 1:" + smax + " **" : "");
    setDiag("cadastre", { ms, serviceScale: scaleNote }, "Cadastre schema returned " + fields.length + " fields; " + scaleNote + ".");
  }catch(e){
    setDiag("cadastre", { status: e.isTimeout ? "timed out" : "failed", ms: e._ms||null, note: e.message||"error" },
      "Cadastre schema lookup " + (e.isTimeout ? "timed out" : "failed") + ": " + (e.message||"error"));
    return null;   // schema unreadable → caller withholds the layer
  }
  const lower = fields.map(f=>f.toLowerCase());
  const candidates = SITE_MAP_CONFIG.roadFieldCandidates
    .filter(c => lower.includes(c.toLowerCase()))
    .map(c => fields[lower.indexOf(c.toLowerCase())]);
  for(const field of candidates){
    const where = "UPPER(" + field + ") LIKE '%ROAD%'";
    try{
      const q = base + "/query?where=" + encodeURIComponent(where) + "&returnCountOnly=true&f=json";
      const { json } = await timedFetchJson(q, "Cadastre road query", T);
      if(json && typeof json.count === "number" && json.count > 0){
        setDiag("cadastre", { status:"resolved", resolved: field + " LIKE '%ROAD%' (" + json.count + " parcels)" },
          "Road filter resolved: UPPER(" + field + ") LIKE '%ROAD%' matched " + json.count + " parcels.");
        return { field, where };
      }
    }catch(e){ diagLog("Road field candidate '" + field + "' query failed: " + (e.message||"error")); }
  }
  setDiag("cadastre", { status:"failed", note:"schema read, but no candidate field returned road parcels" },
    "Cadastre schema read, but no candidate field (" + SITE_MAP_CONFIG.roadFieldCandidates.join(", ") + ") returned road parcels.");
  return null;   // nothing resolved → withhold road layer, show banner (§5)
}

/* ---- probe contour sublayer IDs by name (1 m / 5 m / 10 m), bounded (§4.3) ---- */
async function resolveContourLayers(){
  const ids = { "1": SITE_MAP_CONFIG.contourSublayers["1"], "5": SITE_MAP_CONFIG.contourSublayers["5"], "10": SITE_MAP_CONFIG.contourSublayers["10"] };
  try{
    const { json } = await timedFetchJson(SITE_MAP_CONFIG.contours + "?f=json", "Contours schema (contours ?f=json)", SITE_MAP_CONFIG.timeouts.meta);
    (json.layers || []).forEach(l=>{
      const n = String(l.name||"").toLowerCase();
      if(/lidar/.test(n) || /contour/.test(n)){
        if(/\b1\s*m\b/.test(n))  ids["1"]  = l.id;
        if(/\b5\s*m\b/.test(n))  ids["5"]  = l.id;
        if(/\b10\s*m\b/.test(n)) ids["10"] = l.id;
      }
    });
    diagLog("Contours schema resolved sublayer IDs — 1 m:" + ids["1"] + " 5 m:" + ids["5"] + " 10 m:" + ids["10"] + ".");
  }catch(e){ diagLog("Contours schema probe " + (e.isTimeout ? "timed out" : "failed") + " (" + (e.message||"error") + ") — using fallback IDs 1 m:" + ids["1"] + "."); }
  siteMap.contourIds = ids;
  return ids;
}

/* ---- banners (non-fatal layer/service problems, §6) ---- */
function siteMapBanner(msg, kind){
  if(!siteMap.bannerHost) return;
  const b = document.createElement("div");
  b.className = "smap-banner smap-banner--" + (kind||"warn");
  b.innerHTML = `<span>${escapeHtml(msg)}</span><button type="button" class="smap-banner-x" aria-label="Dismiss">✕</button>`;
  b.querySelector(".smap-banner-x").addEventListener("click", ()=> b.remove());
  siteMap.bannerHost.appendChild(b);
}
function clearSiteMapBanners(){ if(siteMap.bannerHost) siteMap.bannerHost.innerHTML = ""; }

/* ---- where to construct the view (§4.5) ---------------------------------- */
// The initial extent is the anchor pin's coordinate — NOT a default state/CBD
// extent that a post-load goTo then has to correct. If that goTo never runs
// (blocked await upstream) the map must still be framed on the site, so the
// framing cannot depend on any async step completing.
function anchorCoord(){
  const pins = activeSitePins();
  const anchor = pins.find(p=>p.anchor) || pins[0];
  if(anchor && anchor.ok) return { center: [anchor.lon, anchor.lat], zoom: SITE_MAP_CONFIG.anchorZoom, from:"anchor pin" };
  return { center: [153.0234, -27.4710], zoom: 9, from:"default (no pins)" };
}

function hideSiteMapOverlay(){ if(siteMap.statusHost){ siteMap.statusHost.hidden = true; } }

/* ---- scale hint (§4.6): tell the user why contours/road aren't showing ---- */
function startScaleHintWatch(view){
  const E = siteMap.esri;
  if(siteMap.scaleWatchHandle){ try{ siteMap.scaleWatchHandle.remove(); }catch(_){} siteMap.scaleWatchHandle = null; }
  const update = ()=> updateScaleHint(view);
  update();
  try{ siteMap.scaleWatchHandle = E.reactiveUtils.watch(()=> view.scale, update); }catch(_){}
}
function updateScaleHint(view){
  const host = siteMap.scaleHintHost;
  if(!host) return;
  const s = view && view.scale;
  if(s && s > SITE_MAP_CONFIG.dynamicMinScale){
    host.hidden = false;
    host.textContent = "Zoom in to see contours and road reserve — they are hidden at this scale.";
  } else { host.hidden = true; host.textContent = ""; }
}

/* ---- explicit layer stacking (A1 §2) --------------------------------------
   Layers stream in as they resolve, so map.add() (append) leaves map.layers
   ordered by completion time, not by design — and the road reserve can end up
   under the contours or the labels and never show. Every layer carries its
   designed z-order and is inserted at the position that keeps the stack
   imagery → road → contours → labels, regardless of who finishes first. Pins
   live in view.graphics and always draw above every layer here. */
function insertLayerOrdered(map, layer, kind){
  const order = SITE_MAP_CONFIG.layerOrder[kind];
  layer.__zorder = (order == null) ? 99 : order;
  let idx = 0;
  map.layers.forEach(l=>{ if((l.__zorder != null ? l.__zorder : 99) <= layer.__zorder) idx++; });
  map.add(layer, idx);
}

/* ---- individual layer loaders, each bounded + self-reporting (§4.3, §6) ----
   `silent` suppresses banners/diagnostics for the throwaway off-screen copy view
   (captureOffscreen) so it never disturbs the interactive modal's report. */
async function loadImageryLayer(imagery, map, silent){
  const start = smNow();
  try{
    // §3/§4.2: the ImageServer reports a Single Fused Map Cache, so it must be an
    // ImageryTileLayer (pre-built /tile/{z}/{y}/{x}), not a dynamic ImageryLayer.
    await withTimeout(imagery.load(), SITE_MAP_CONFIG.timeouts.layer, "Imagery service (ImageServer)");
    imagery.__zorder = SITE_MAP_CONFIG.layerOrder.imagery;
    if(!silent) setDiag("imagery", { status:"loaded", ms: Math.round(smNow()-start), layerClass:"ImageryTileLayer" }, "Imagery loaded as ImageryTileLayer (tiled).");
  }catch(e){
    // Last-resort fallback to a dynamic ImageryLayer. Per §4.2 this should not be
    // needed; if it ever is, the diagnostics say so plainly.
    try{
      try{ map.remove(imagery); }catch(_){}
      const dyn = new siteMap.esri.ImageryLayer({ url: SITE_MAP_CONFIG.imagery });
      await withTimeout(dyn.load(), SITE_MAP_CONFIG.timeouts.layer, "Imagery service (ImageServer, dynamic)");
      siteMap.layers.imagery = dyn; insertLayerOrdered(map, dyn, "imagery");
      if(!silent){
        setDiag("imagery", { status:"loaded", ms: Math.round(smNow()-start), layerClass:"ImageryLayer (dynamic fallback)" }, "Tiled imagery failed; loaded dynamic ImageryLayer fallback.");
        siteMapBanner("Imagery loaded in slower dynamic mode (tiled imagery was unavailable).", "warn");
      }
    }catch(e2){
      if(!silent){
        setDiag("imagery", { status: e.isTimeout ? "timed out" : "failed", ms: Math.round(smNow()-start), note: e.message||"error", layerClass:"ImageryTileLayer" }, "Imagery service " + (e.isTimeout?"timed out":"failed") + ": " + (e.message||"error"));
        siteMapBanner("Imagery did not load: " + (e.message||"error") + ". The rest of the map still works.", "error");
      }
    }
  }
}

// Elevation-label rendering for the FeatureLayer contour path (A4 §1): keep the
// metre labels the MapImageLayer used to draw server-side, but under our control.
function contourLabelingInfo(){
  return [{
    labelExpressionInfo: { expression: "Round($feature.ELEVATION, 1) + ' m'" },
    symbol: { type:"text", color:[40,30,15], haloColor:[255,255,255,0.9], haloSize:1, font:{ size:9, weight:"bold" } },
    minScale: 8000, maxScale: 0,
    labelPlacement: "center-along"
  }];
}
function contourRenderer(){
  return { type:"simple", symbol:{ type:"simple-line", color:[150,90,30,0.9], width:0.7 } };
}

/* Contours (A4): draw the requested interval as a FeatureLayer so it renders
   client-side with WebGL and caches features locally instead of round-tripping a
   server-side exportImage on every pan/zoom — the actual cause of the slowness.
   Falls back to a lean png8 MapImageLayer if the FeatureLayer path is unavailable
   (option 2). Honours the contours on/off toggle (option 4). */
async function loadContourLayer(map, silent){
  const start = smNow();
  if(!siteMap.contoursOn){ if(!silent) setDiag("contours", { status:"off", ms:0, note:"contours toggled off" }, "Contours are toggled off."); return; }
  try{
    await resolveContourLayers();   // sets siteMap.contourIds (bounded fetch inside)
    const id = siteMap.contourIds && siteMap.contourIds[siteMap.contourInterval];
    if(id == null){ if(!silent) setDiag("contours", { status:"failed", ms: Math.round(smNow()-start), note:"no contour sublayer resolved for " + siteMap.contourInterval + " m" }, "No contour sublayer resolved for " + siteMap.contourInterval + " m."); return; }
    // Primary: FeatureLayer on the single requested-interval sublayer (A4 §1).
    try{
      const fl = new siteMap.esri.FeatureLayer({
        url: SITE_MAP_CONFIG.contours + "/" + id,
        outFields: ["*"], opacity: 0.9,
        minScale: 0, maxScale: 0,
        renderer: contourRenderer(),
        labelingInfo: contourLabelingInfo(), labelsVisible: true
      });
      await withTimeout(fl.load(), SITE_MAP_CONFIG.timeouts.layer, "Contours service (FeatureLayer)");
      if(fl.capabilities && fl.capabilities.query && fl.capabilities.query.supportsQuery === false) throw new Error("sublayer does not support query");
      siteMap.layers.contour = fl; siteMap.contourMode = "feature"; insertLayerOrdered(map, fl, "contour");
      if(!silent) setDiag("contours", { status:"loaded", ms: Math.round(smNow()-start), sublayer: siteMap.contourInterval + " m (id " + id + ")", mode:"FeatureLayer (client-side WebGL)" }, "Contours loaded as FeatureLayer (client-side, no per-pan round-trip) — " + siteMap.contourInterval + " m, sublayer id " + id + ".");
      return;
    }catch(eFeat){
      diagLog("Contours FeatureLayer path unavailable (" + (eFeat.message||"error") + ") — falling back to a lean png8 MapImageLayer.");
    }
    // Fallback: MapImageLayer, png8 + dpi 96 to cut the exportImage payload (A4 §2).
    const subs = [];
    ["1","5","10"].forEach(k=>{ if(siteMap.contourIds[k] != null) subs.push({ id: siteMap.contourIds[k], visible: k === siteMap.contourInterval }); });
    if(!subs.length){ if(!silent) setDiag("contours", { status:"failed", ms: Math.round(smNow()-start), note:"no contour sublayers resolved" }, "No contour sublayers could be resolved."); return; }
    const contour = new siteMap.esri.MapImageLayer({ url: SITE_MAP_CONFIG.contours, opacity: 0.7, minScale: SITE_MAP_CONFIG.dynamicMinScale, maxScale: 0, imageFormat:"png8", dpi:96, sublayers: subs });
    await withTimeout(contour.load(), SITE_MAP_CONFIG.timeouts.layer, "Contours service (MapServer)");
    siteMap.layers.contour = contour; siteMap.contourMode = "mapimage"; insertLayerOrdered(map, contour, "contour");
    const shownId = siteMap.contourIds[siteMap.contourInterval];
    if(!silent) setDiag("contours", { status:"loaded", ms: Math.round(smNow()-start), sublayer: siteMap.contourInterval + " m (id " + shownId + ")", mode:"MapImageLayer png8 (server render)" }, "Contours loaded (MapImageLayer png8/dpi96, showing " + siteMap.contourInterval + " m, sublayer id " + shownId + ").");
  }catch(e){
    if(!silent){
      setDiag("contours", { status: e.isTimeout ? "timed out" : "failed", ms: Math.round(smNow()-start), note: e.message||"error" }, "Contours service " + (e.isTimeout?"timed out":"failed") + ": " + (e.message||"error"));
      siteMapBanner("Contour layer did not load (" + (e.message||"error") + "). Imagery and pins are unaffected.", "error");
    }
  }
}

/* Road reserve (A1): draw as a FeatureLayer with a high-contrast magenta outline
   and NO scale ceiling, so it is legible over aerial imagery and never hidden by
   a server-side maxScale when zoomed in (the reported symptom). Falls back to a
   MapImageLayer with the same outline renderer if the FeatureLayer path is
   unavailable. Never renders unfiltered cadastre — the filter must resolve first. */
async function loadRoadLayer(map, silent){
  const start = smNow();
  try{
    const road = await resolveRoadWhere();   // bounded + diag inside; off critical path (§4.1)
    if(!road){
      if(!silent){
        setDiag("road", { status:"withheld", ms: Math.round(smNow()-start), note:"road filter could not be resolved from the live cadastre schema" }, "Road reserve withheld — filter not resolved.");
        siteMapBanner("Road reserve hidden: could not resolve the road filter from the live cadastre schema. Showing imagery + contours only (never unfiltered cadastre).", "warn");
      }
      return;
    }
    const outline = SITE_MAP_CONFIG.roadOutline;
    const roadRenderer = { type:"simple", symbol:{ type:"simple-fill", color:[0,0,0,0], outline:{ color: outline.color, width: outline.width } } };
    // Primary: FeatureLayer — client-side symbology we control, no server maxScale.
    try{
      const fl = new siteMap.esri.FeatureLayer({
        url: SITE_MAP_CONFIG.cadastre + "/" + SITE_MAP_CONFIG.cadastreParcelsSublayer,
        definitionExpression: road.where,
        outFields: ["*"], opacity: 1,
        minScale: SITE_MAP_CONFIG.dynamicMinScale, maxScale: 0,   // no zoomed-in ceiling
        renderer: roadRenderer
      });
      await withTimeout(fl.load(), SITE_MAP_CONFIG.timeouts.layer, "Road reserve (cadastre FeatureLayer)");
      if(fl.capabilities && fl.capabilities.query && fl.capabilities.query.supportsQuery === false) throw new Error("sublayer does not support query");
      siteMap.layers.road = fl; insertLayerOrdered(map, fl, "road");
      if(!silent) setDiag("road", { status:"applied", ms: Math.round(smNow()-start), note: road.where, mode:"FeatureLayer, magenta outline, maxScale 0" }, "Road reserve applied as FeatureLayer (" + road.where + ") — magenta 2 px outline, no zoomed-in scale ceiling.");
      return;
    }catch(eFeat){
      diagLog("Road reserve FeatureLayer path unavailable (" + (eFeat.message||"error") + ") — falling back to MapImageLayer with the same outline.");
    }
    // Fallback: MapImageLayer, still with an explicit outline renderer + maxScale 0.
    const roadLayer = new siteMap.esri.MapImageLayer({
      url: SITE_MAP_CONFIG.cadastre, opacity: 1, minScale: SITE_MAP_CONFIG.dynamicMinScale, maxScale: 0,
      sublayers: [{ id: SITE_MAP_CONFIG.cadastreParcelsSublayer, visible:true, definitionExpression: road.where,
        renderer: roadRenderer }]
    });
    await withTimeout(roadLayer.load(), SITE_MAP_CONFIG.timeouts.layer, "Road reserve (cadastre MapServer)");
    siteMap.layers.road = roadLayer; insertLayerOrdered(map, roadLayer, "road");
    if(!silent) setDiag("road", { status:"applied", ms: Math.round(smNow()-start), note: road.where, mode:"MapImageLayer, outline renderer, maxScale 0" }, "Road reserve applied as MapImageLayer (" + road.where + ") — outline renderer, no zoomed-in scale ceiling.");
  }catch(e){
    if(!silent){
      setDiag("road", { status: e.isTimeout ? "timed out" : "failed", ms: Math.round(smNow()-start), note: e.message||"error" }, "Road reserve " + (e.isTimeout?"timed out":"failed") + ": " + (e.message||"error"));
      siteMapBanner("Road reserve layer did not load (" + (e.message||"error") + "). The rest of the map is unaffected.", "error");
    }
  }
}
async function loadLabelsLayer(map, silent){
  const start = smNow();
  try{
    const labels = new siteMap.esri.MapImageLayer({ url: SITE_MAP_CONFIG.imageryLabels, opacity: 0.9 });
    await withTimeout(labels.load(), SITE_MAP_CONFIG.timeouts.layer, "Imagery labels service");
    siteMap.layers.labels = labels; insertLayerOrdered(map, labels, "labels");
    if(!silent) setDiag("labels", { status:"loaded", ms: Math.round(smNow()-start) }, "Imagery labels loaded.");
  }catch(e){
    if(!silent) setDiag("labels", { status: e.isTimeout ? "timed out" : "not loaded", ms: Math.round(smNow()-start), note: e.message||"error" }, "Imagery labels not loaded (optional): " + (e.message||"error"));
  }
}

/* ---- build the MapView + layers once, into a container ----
   Critical restructure (§4.1, §4.4, §4.5): construct the view AT the anchor pin,
   clear the "Loading map…" overlay on view.when() and nothing else, then stream
   the operational layers in underneath — none of which may block the modal. Each
   external step is bounded (§4.3). For the interactive modal the layer loads are
   fire-and-forget; the off-screen copy view awaits them so the screenshot is
   complete. */
async function buildView(container, opts){
  opts = opts || {};
  const offscreen = !!opts.offscreen;
  const E = siteMap.esri;
  const map = new E.Map();
  siteMap.esriMap = map;
  siteMap.layers = {};

  // Imagery created + added up front so it is the bottom layer; loaded below.
  // Tag its z-order now (A1 §2) so later layers insert above it even while it
  // is still loading.
  const imagery = new E.ImageryTileLayer({ url: SITE_MAP_CONFIG.imagery });
  imagery.__zorder = SITE_MAP_CONFIG.layerOrder.imagery;
  siteMap.layers.imagery = imagery;
  map.add(imagery);
  if(!offscreen) setDiag("imagery", { layerClass: "ImageryTileLayer" });

  // Construct at the anchor pin (§4.5). No async step gates the initial framing.
  const a = anchorCoord();
  diagLog("Constructing map view at " + a.from + " " + formatCoord(a.center[1], a.center[0]) + " (zoom " + a.zoom + ").");
  const view = new E.MapView({
    container, map,
    center: a.center, zoom: a.zoom,
    popup: { dockEnabled:false, collapseEnabled:false }
  });
  siteMap.view = view;

  // Overlay clears on view.when() and NOTHING else (§4.4). view.when() is bounded
  // (§4.3) so a wedged view cannot leave the spinner up forever.
  await withTimeout(view.when(), SITE_MAP_CONFIG.timeouts.view, "Map view");

  if(!offscreen){
    hideSiteMapOverlay();

    // First *manual* pan/zoom latches userHasAdjustedView and stops auto-refit;
    // it also invalidates the cached screenshot (§6.1, §7.3). Watch `interacting`
    // (true only on real user input) — NOT `navigating`, which our own goTo sets.
    E.reactiveUtils.when(()=> view.interacting, ()=>{
      if(!siteMap.userHasAdjustedView){ siteMap.userHasAdjustedView = true; renderSiteMapPanel(); }
      invalidateScreenshot();
    });
    E.reactiveUtils.watch(()=> view.stationary, (stationary)=>{ if(stationary){ invalidateScreenshot(); renderDiagnostics(); } });
    startScaleHintWatch(view);
    renderDiagnostics();

    // Stream the operational layers in WITHOUT blocking the already-open modal.
    loadImageryLayer(imagery, map, false);
    loadContourLayer(map, false);
    loadRoadLayer(map, false);       // road resolution is OFF the critical path (§4.1)
    loadLabelsLayer(map, false);
  } else {
    // Off-screen copy view — the screenshot needs the layers present, so await
    // them (still bounded, so this path can't hang either).
    await loadImageryLayer(imagery, map, true);
    await loadContourLayer(map, true);
    await loadRoadLayer(map, true);
    await loadLabelsLayer(map, true);
  }

  return view;
}

/* ---- pin graphics (always on top, in view.graphics) ---- */
function drawPins(){
  const view = siteMap.view;
  if(!view) return;
  const E = siteMap.esri;
  view.graphics.removeAll();
  activeSitePins().forEach(p=>{
    view.graphics.add(new E.Graphic({
      geometry: { type:"point", longitude:p.lon, latitude:p.lat },
      symbol: { type:"simple-marker", color: pinRgb(p.colour), size:15, outline:{ color:[255,255,255], width:2 } },
      attributes: { label:p.label, coord: formatCoord(p.lat, p.lon) },
      popupTemplate: { title:"{label}", content:"{coord}" }
    }));
  });
}

// Fit the view to the active pins, centred on the anchor pin, unless the user
// has taken manual control of the view (§6.1, §6.2).
async function fitView(){
  const view = siteMap.view;
  if(!view || siteMap.userHasAdjustedView) return;
  const pins = activeSitePins();
  if(!pins.length) return;
  const anchor = pins.find(p=>p.anchor) || pins[0];
  const anchorPoint = { type:"point", longitude:anchor.lon, latitude:anchor.lat };
  try{
    if(pins.length === 1){
      await view.goTo({ target: anchorPoint, zoom: 17 }, { animate:false });
    } else {
      const graphics = view.graphics.toArray();
      await view.goTo({ target: graphics, center: [anchor.lon, anchor.lat] }, { animate:false, padding: 60 });
      // Guard against a distant pin zooming the site out to an unreadable dot.
      if(view.scale > 25000){
        siteMapBanner("A pin is far from the site — showing the site at a readable scale. Use “Fit all pins” to see them all.", "warn");
        await view.goTo({ target: anchorPoint, scale: 12000 }, { animate:false });
      }
    }
  }catch(e){ /* goTo can reject if interrupted; ignore */ }
  invalidateScreenshot();
}

/* ---- contours on/off toggle (A4 §4) ---- */
async function setContoursOn(on){
  siteMap.contoursOn = on;
  invalidateScreenshot();
  const map = siteMap.esriMap;
  if(!map) return;
  if(!on){
    if(siteMap.layers.contour){ try{ map.remove(siteMap.layers.contour); }catch(_){} siteMap.layers.contour = null; }
    setDiag("contours", { status:"off", ms:0, note:"contours toggled off" }, "Contours toggled off.");
    return;
  }
  // Turning back on: rebuild the layer for the current interval.
  await loadContourLayer(map, false);
}

/* ---- switch contour interval, with coverage auto-fallback (§5) ----
   Works for both contour render modes (A4): a FeatureLayer draws a single
   interval-sublayer so switching means swapping the layer's source URL; a
   MapImageLayer just toggles sublayer visibility. */
async function applyContourInterval(interval){
  siteMap.contourInterval = interval;
  siteMap.renderedInterval = interval;
  invalidateScreenshot();
  if(!siteMap.contoursOn){ updateIntervalStamp(); return; }
  if(!siteMap.layers.contour || !siteMap.contourIds){ updateIntervalStamp(); return; }

  const setVisible = async (k)=>{
    const id = siteMap.contourIds[k];
    if(id == null) return;
    if(siteMap.contourMode === "feature"){
      // Point the FeatureLayer at the k-interval sublayer by rebuilding it in place.
      const map = siteMap.esriMap;
      try{ if(siteMap.layers.contour) map.remove(siteMap.layers.contour); }catch(_){}
      const fl = new siteMap.esri.FeatureLayer({
        url: SITE_MAP_CONFIG.contours + "/" + id,
        outFields: ["*"], opacity: 0.9, minScale: 0, maxScale: 0,
        renderer: contourRenderer(), labelingInfo: contourLabelingInfo(), labelsVisible: true
      });
      siteMap.layers.contour = fl; insertLayerOrdered(map, fl, "contour");
    } else {
      const layer = siteMap.layers.contour;
      ["1","5","10"].forEach(kk=>{
        const sid = siteMap.contourIds[kk];
        if(sid == null || !layer.findSublayerById) return;
        const sub = layer.findSublayerById(sid);
        if(sub) sub.visible = (kk === k);
      });
    }
    siteMap.renderedInterval = k;
  };
  await setVisible(interval);

  // Coverage check: if the requested interval has no features in view, fall back
  // to the coarsest interval that does, and say so (§5).
  try{
    const view = siteMap.view;
    if(!view || !view.extent){ updateIntervalStamp(); return; }
    const order = [interval, "5", "10"].filter((v,i,a)=> a.indexOf(v)===i && siteMap.contourIds[v] != null);
    for(const k of order){
      const count = await contourCountInExtent(siteMap.contourIds[k], view.extent);
      if(count == null) break;         // query failed — leave as requested
      if(count > 0){ if(k !== interval){ await setVisible(k); siteMapBanner("No " + interval + " m contour coverage here — showing " + k + " m contours.", "warn"); } updateIntervalStamp(); return; }
    }
    // none returned features
    if(order.length){ siteMapBanner("No contour coverage at this location for the selected intervals.", "warn"); }
  }catch(e){ /* non-fatal */ }
  updateIntervalStamp();
}
async function contourCountInExtent(sublayerId, extent){
  try{
    const geom = { xmin:extent.xmin, ymin:extent.ymin, xmax:extent.xmax, ymax:extent.ymax, spatialReference: extent.spatialReference.toJSON() };
    const url = SITE_MAP_CONFIG.contours + "/" + sublayerId + "/query" +
      "?where=1%3D1&geometry=" + encodeURIComponent(JSON.stringify(geom)) +
      "&geometryType=esriGeometryEnvelope&inSR=" + (extent.spatialReference.wkid||102100) +
      "&spatialRel=esriSpatialRelIntersects&returnCountOnly=true&f=json";
    const res = await fetch(url, { cache:"no-store" }).then(r=>r.json());
    return (res && typeof res.count === "number") ? res.count : null;
  }catch(e){ return null; }
}

/* ---- diagnostics rendering (§6) ------------------------------------------
   The user has no DevTools, so the modal reports on itself in plain language.
   Everything the diagnostics panel shows is also what the Copy button copies. */
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371, toRad = x => x*Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.min(1, Math.sqrt(s)));
}
function fmtDiagDur(d){ return (d && d.ms != null) ? " (" + (d.ms/1000).toFixed(1) + " s)" : ""; }
function diagLine(label, d){
  return "- " + label + ": " + ((d && d.status) || "pending") + fmtDiagDur(d) + (d && d.note ? " — " + d.note : "");
}
// Read the live layer stack for diagnostics (A5): each layer's title/type,
// visibility, effective min/max scale, and its index in map.layers. "min/max
// scale" shows the effective values the layer resolved (from what we set and
// what the service declares) so a hidden layer is explained, not a mystery.
function describeLayerStack(){
  const map = siteMap.esriMap;
  if(!map || !map.layers) return [];
  const out = [];
  map.layers.forEach((l, i)=>{
    const type = l.type || (l.declaredClass || "").split(".").pop() || "layer";
    const title = l.title || l.url || type;
    const minS = (l.minScale != null) ? l.minScale : 0;
    const maxS = (l.maxScale != null) ? l.maxScale : 0;
    out.push("[" + i + "] " + title.replace(/^https?:\/\/[^/]+/, "…") +
      " (" + type + ") visible:" + (l.visible !== false) +
      " min:" + minS + " max:" + maxS);
  });
  return out;
}

function diagnosticsText(){
  const d = siteMap.diag || freshDiag();
  const view = siteMap.view;
  const pins = activeSitePins();
  const a = anchorCoord();
  const anchorStr = a.from === "anchor pin" ? formatCoord(a.center[1], a.center[0]) : "(none — using a default extent)";

  let centreStr = "—", scaleStr = "—", mismatch = "";
  if(view && view.center && typeof view.center.latitude === "number"){
    centreStr = formatCoord(view.center.latitude, view.center.longitude);
    scaleStr  = view.scale ? "1:" + Math.round(view.scale).toLocaleString() : "—";
    if(a.from === "anchor pin"){
      const km = haversineKm(view.center.latitude, view.center.longitude, a.center[1], a.center[0]);
      if(km > 1) mismatch = "\n  ** WARNING: view centre is ~" + (km < 10 ? km.toFixed(1) : Math.round(km)) +
        " km from the anchor pin — the map is NOT framed on the site. **";
    }
  }

  const L = [];
  L.push("SoRT — Site Map diagnostics");
  L.push(new Date().toLocaleString());
  L.push("");
  L.push("Anchor pin:   " + anchorStr);
  L.push("Active pins:  " + pins.length);
  L.push("View centre:  " + centreStr + "     Scale: " + scaleStr + mismatch);
  L.push("");
  L.push("External dependencies:");
  L.push(diagLine("Esri CDN (js.arcgis.com)", d.esri));
  L.push(diagLine("Imagery ImageServer [" + (d.imagery.layerClass || "?") + "]", d.imagery));
  L.push(diagLine("Contours [" + (d.contours.sublayer || "?") + (d.contours.mode ? ", " + d.contours.mode : "") + "]", d.contours));
  L.push("- Cadastre ?f=json lookup: " + (d.cadastre.status || "pending") + fmtDiagDur(d.cadastre) +
    (d.cadastre.resolved ? " — resolved to " + d.cadastre.resolved : (d.cadastre.note ? " — " + d.cadastre.note : "")));
  if(d.cadastre.serviceScale) L.push("    " + d.cadastre.serviceScale);
  L.push("- Road-reserve layer: " + (d.road.status || "pending") + fmtDiagDur(d.road) + (d.road.note ? " — " + d.road.note : "") + (d.road.mode ? " [" + d.road.mode + "]" : ""));
  L.push(diagLine("Imagery labels (optional)", d.labels));
  L.push("");
  // Per-layer stack snapshot (A5): visible, effective min/max scale (what we set
  // AND what the layer resolved from the service), and index in map.layers.
  L.push("Layer stack (bottom → top; pins draw above all):");
  const layerRows = describeLayerStack();
  if(layerRows.length) layerRows.forEach(r=> L.push("  " + r));
  else L.push("  (no layers yet)");
  L.push("");
  // Screenshot capture (A5).
  const ss = d.screenshot || {};
  L.push("Screenshot capture: " + (ss.status || "idle") +
    (ss.dims ? " — " + ss.dims : "") +
    (ss.decoded === true ? " — raster decoded" : ss.decoded === false ? " — raster did NOT decode" : "") +
    (ss.note ? " — " + ss.note : ""));
  L.push("");
  L.push("Activity log:");
  (d.log.length ? d.log : ["(nothing logged yet)"]).forEach(l => L.push("  " + l));
  return L.join("\n");
}
function renderDiagnostics(){
  if(!siteMap.diagHost) return;
  const pre = siteMap.diagHost.querySelector(".smap-diag-text");
  if(pre) pre.textContent = diagnosticsText();
}

function renderSiteMapPanel(){
  if(!siteMap.panelHost) return;
  const host = siteMap.panelHost;
  host.innerHTML = "";
  if(!siteMap.pins.length){
    host.innerHTML = `<div class="smap-empty">No coordinates entered in this table yet. Add a coordinate to a mapped row to see a pin.</div>`;
  }
  siteMap.pins.forEach(p=>{
    const row = document.createElement("label");
    row.className = "smap-pin" + (p.ok ? "" : " smap-pin--invalid");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = !!p.on; cb.disabled = !p.ok;
    cb.addEventListener("change", ()=>{
      p.on = cb.checked;
      drawPins();
      fitView();           // re-fit on selection change (unless user-adjusted)
      invalidateScreenshot();
    });
    const dot = document.createElement("span");
    dot.className = "smap-dot"; dot.style.background = "rgb(" + pinRgb(p.colour).join(",") + ")";
    const txt = document.createElement("span");
    txt.className = "smap-pin-text";
    txt.innerHTML = `<span class="smap-pin-label">${escapeHtml(p.label)}${p.anchor ? ' <span class="smap-anchor">centre</span>' : ""}</span>` +
      (p.ok ? `<span class="smap-pin-coord">${escapeHtml(formatCoord(p.lat, p.lon))}${p.warn ? ' — ' + escapeHtml(p.warn) : ""}</span>`
            : `<span class="smap-pin-coord smap-pin-err">${escapeHtml(p.raw)} — ${escapeHtml(p.error)}</span>`);
    row.appendChild(cb); row.appendChild(dot); row.appendChild(txt);
    host.appendChild(row);
  });

  // Legend + credit.

  legend.innerHTML = `<div class="smap-legend-head">Legend</div>` + Object.keys(used).map(c=>
    `<div class="smap-legend-row"><span class="smap-dot" style="background:rgb(${pinRgb(c).join(",")})"></span>${escapeHtml(used[c])}</div>`
  ).join("");
  const credit = siteMap.overlay.querySelector(".smap-credit");
  credit.textContent = SITE_MAP_CONFIG.attribution;

  const resetBtn = siteMap.overlay.querySelector(".smap-reset");
  if(resetBtn) resetBtn.classList.toggle("smap-reset--active", siteMap.userHasAdjustedView);
}

async function openSiteMap(triggerEl){
  const table = activeTable();
  if(!table){ showStatus("No table to map"); return; }
  siteMap.triggerEl = triggerEl || document.activeElement;
  buildSiteMapModal();
  clearSiteMapBanners();
  // A3: always re-read pins from app state on every open (the view is kept alive
  // between opens, so a table edit made while it was closed must still take
  // effect). If the anchor coordinate moved, syncPinsForReopen clears the manual
  // framing so the view re-centres on the new location below.
  syncPinsForReopen(table);
  siteMap.overlay.classList.remove("hidden");
  renderSiteMapPanel();
  const closeBtn = siteMap.overlay.querySelector(".smap-close");
  if(closeBtn) closeBtn.focus();

  siteMap.statusHost.hidden = false;
  siteMap.statusHost.textContent = "Loading map…";

  // Fresh build → start a clean diagnostics record. Re-open of an existing view
  // keeps the record from the build that actually loaded the layers.
  if(!siteMap.view) resetDiag();
  renderDiagnostics();

  try{
    await loadEsri();
    if(!siteMap.view){
      // buildView clears the overlay on view.when() and streams layers in (§4.4).
      await buildView(siteMap.mapHost);
      drawPins();
      await fitView();
    } else {
      // Re-use the existing view: re-draw pins, re-fit unless user-adjusted (§6).
      drawPins();
      await fitView();
    }
    hideSiteMapOverlay();
    updateIntervalStamp();
    renderDiagnostics();
  }catch(err){
    // Only the CDN load or the view itself failing lands here (layer failures are
    // handled inline and never reach this point). Surface it in words and keep
    // the diagnostics available so the user can copy them to us.
    siteMap.statusHost.hidden = false;
    siteMap.statusHost.innerHTML = `<div class="smap-offline">🗺️ The site map could not start.<br><span>${escapeHtml(err.message||"Could not load the map.")}</span><br><span>Open “Map diagnostics” in the panel for details.</span></div>`;
    renderDiagnostics();
  }
}

function closeSiteMap(){
  if(!siteMap.overlay) return;
  siteMap.overlay.classList.add("hidden");
  if(siteMap.triggerEl && siteMap.triggerEl.focus){ try{ siteMap.triggerEl.focus(); }catch(_){} }
}

/* ---- screenshot for the Word copy (§7) ---- */
function invalidateScreenshot(){ siteMap.screenshot.valid = false; siteMap.screenshot.dataUrl = null; }

// Sample a grid of pixels; return true only if EVERY sample is pure black or
// fully transparent (A2). Real aerial imagery is never uniformly (0,0,0), so this
// catches the "map raster never landed on the canvas" failure without tripping on
// legitimately dark ground (water, shadow). Returns false if it can't read the
// canvas (e.g. tainted) — the caller handles the SecurityError separately.
function looksAllBlack(ctx, W, H){
  try{
    const N = 6;
    for(let i=1;i<N;i++){ for(let j=1;j<N;j++){
      const d = ctx.getImageData(Math.round(W*i/N), Math.round(H*j/N), 1, 1).data;
      const black = (d[0]===0 && d[1]===0 && d[2]===0);
      const transparent = (d[3]===0);
      if(!black && !transparent) return false;   // found real colour → not black
    }}
    return true;
  }catch(_){ return false; }
}

// Composite legend + interval stamp + attribution onto the raw screenshot.
// Throws (SecurityError) if the canvas is tainted by a non-CORS layer (§7.1), or a
// plain Error if the screenshot raster is missing/black (A2) — the caller must
// never export a black rectangle.
async function compositeScreenshot(shot, interval){
  if(!shot || !shot.dataUrl){
    setDiag("screenshot", { status:"failed", note:"takeScreenshot returned no dataUrl" }, "Screenshot capture returned nothing (no dataUrl) — not exporting a blank image.");
    throw new Error("screenshot returned no image data");
  }
  // Decode the screenshot BEFORE drawing it. drawImage on an undecoded image draws
  // nothing, leaving the canvas base fill — the exact black-map failure (A2). Use
  // img.decode() where available, falling back to onload.
  const img = new Image();
  img.src = shot.dataUrl;
  let decoded = false;
  try{
    if(img.decode){ await img.decode(); decoded = true; }
    else { await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error("screenshot image failed to load")); }); decoded = true; }
  }catch(e){
    // decode() can reject on some data URIs even when onload would succeed — retry.
    try{ await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error("screenshot image failed to load")); }); decoded = true; }
    catch(e2){ decoded = false; }
  }

  const canvas = document.createElement("canvas");
  canvas.width  = img.naturalWidth  || img.width  || (shot.width  || 0);
  canvas.height = img.naturalHeight || img.height || (shot.height || 0);
  const W = canvas.width, H = canvas.height;
  if(!W || !H){
    setDiag("screenshot", { status:"failed", note:"zero-sized screenshot", decoded }, "Screenshot had no dimensions — not exporting a blank image.");
    throw new Error("screenshot had no dimensions");
  }
  const ctx = canvas.getContext("2d");
  // White base (A2): if any future draw failure leaves the raster missing, the
  // result is obviously blank white — not a deliberate-looking black rectangle.
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, W, H);
  if(!decoded){
    setDiag("screenshot", { status:"failed", note:"raster did not decode", dims: W + "×" + H, decoded:false }, "Screenshot raster did not decode — not exporting a blank image.");
    throw new Error("screenshot raster did not decode");
  }
  ctx.drawImage(img, 0, 0, W, H);

  // Never export a canvas the raster didn't land on (A2). If sampling shows a
  // uniformly black/empty frame, fail loudly rather than paste black into a scope
  // document. (A tainted canvas throws here on read and is handled by the caller.)
  if(looksAllBlack(ctx, W, H)){
    setDiag("screenshot", { status:"failed", note:"raster sampled all-black (capture did not land)", dims: W + "×" + H, decoded:true }, "Screenshot sampled all-black — the map raster did not capture; not exporting a black image.");
    throw new Error("screenshot raster is black");
  }
  setDiag("screenshot", { status:"ok", note:"raster captured", dims: W + "×" + H, decoded:true }, "Screenshot raster captured (" + W + "×" + H + ").");

  const pad = Math.round(W*0.012), fs = Math.max(13, Math.round(W*0.013));
  ctx.font = fs + "px Segoe UI, Arial, sans-serif";
  ctx.textBaseline = "top";

  // Legend (top-left) over a translucent panel.
  const pins = activeSitePins();
  const used = {}; pins.forEach(p=>{ used[p.colour] = p.label; });
  const entries = Object.keys(used);
  if(entries.length){
    const lh = fs + 8, boxW = Math.round(W*0.28), boxH = lh*entries.length + pad;
    ctx.fillStyle = "rgba(255,255,255,0.86)";
    roundRect(ctx, pad, pad, boxW, boxH, 6); ctx.fill();
    entries.forEach((c,i)=>{
      const y = pad + Math.round(pad/2) + i*lh;
      ctx.fillStyle = "rgb(" + pinRgb(c).join(",") + ")";
      ctx.beginPath(); ctx.arc(pad*1.6, y + fs/2, fs*0.45, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#152531";
      ctx.fillText(used[c], pad*2.4, y);
    });
  }
  // Interval stamp (top-right).
  const stamp = "Contours: " + interval + " m LiDAR";
  const sw = ctx.measureText(stamp).width;
  ctx.fillStyle = "rgba(255,255,255,0.86)";
  roundRect(ctx, W - sw - pad*2.4, pad, sw + pad*1.4, fs + pad, 6); ctx.fill();
  ctx.fillStyle = "#152531";
  ctx.fillText(stamp, W - sw - pad*1.7, pad + pad*0.3);
  // Attribution (bottom, full width band).
  const band = fs + pad;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, H - band, W, band);
  ctx.fillStyle = "#ffffff";
  ctx.fillText(SITE_MAP_CONFIG.attribution, pad, H - band + pad*0.35);

  return canvas.toDataURL("image/png");
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// Count how many active pins are inside the current view extent (§6.1 warning).
function pinsInView(view){
  const pins = activeSitePins();
  if(!view || !view.extent) return { total: pins.length, inside: pins.length };
  let inside = 0;
  const E = siteMap.esri;
  pins.forEach(p=>{
    try{
      const pt = new E.Graphic({ geometry:{ type:"point", longitude:p.lon, latitude:p.lat } }).geometry;
      if(view.extent.contains(pt)) inside++;
    }catch(_){ inside++; }
  });
  return { total: pins.length, inside };
}

// Produce the map image for the copy. Uses the live view (honouring the user's
// framing) when one exists; otherwise builds an off-screen view with the default
// auto-fit framing (§7.3). Returns { dataUrl, meta } or null on any failure —
// the copy must never be broken by the map (§7.4).
async function getMapImageForCopy(){
  const table = activeTable();
  if(!table) return null;
  refreshPins(table);
  if(!activeSitePins().length) return null;   // nothing to show

  if(siteMap.screenshot.valid && siteMap.screenshot.dataUrl){
    return { dataUrl: siteMap.screenshot.dataUrl, meta: siteMap.screenshot.meta };
  }
  try{
    await loadEsri();
  }catch(e){ return null; }   // offline / blocked → table-only copy

  try{
    if(siteMap.view){
      // Live view exists — screenshot AT ITS CURRENT EXTENT (no refit) so the
      // user's framing is what gets pasted (§7.3).
      const view = siteMap.view;
      const pv = pinsInView(view);
      const shot = await takeViewScreenshot(view);
      const dataUrl = await compositeScreenshot(shot, siteMap.renderedInterval);
      const meta = { interval: siteMap.renderedInterval, pinsTotal: pv.total, pinsInView: pv.inside };
      siteMap.screenshot = { dataUrl, valid: true, meta };
      return { dataUrl, meta };
    }
    // No live view — build off-screen with default framing (§7.3).
    return await captureOffscreen(table);
  }catch(err){
    // Any failure here means the raster is missing — report it plainly and return
    // null so the copy is table-only (§7.4). NEVER fall through to a black export.
    if(/tainted|SecurityError|insecure/i.test(err.name + " " + err.message)){
      setDiag("screenshot", { status:"failed", note:"tainted canvas (a map layer blocked CORS)" }, "Screenshot blocked by a non-CORS layer (tainted canvas) — map omitted from the copy.");
      console.error("Site map screenshot blocked by a non-CORS layer (tainted canvas).", err);
    } else {
      setDiag("screenshot", { status:"failed", note: err.message || "capture failed" }, "Screenshot failed (" + (err.message||"error") + ") — map omitted from the copy.");
      console.error("Site map screenshot failed.", err);
    }
    invalidateScreenshot();
    return null;
  }
}

// Take a view screenshot at the screenshot width, keeping the view's own aspect
// ratio (A2): passing width alone can letterbox/square the output on some
// versions, which then misplaces the composited legend/stamp. Compute height from
// the live view aspect so the exported image matches what is on screen.
async function takeViewScreenshot(view){
  const opts = { width: SITE_MAP_CONFIG.screenshotWidth };
  const vw = view && view.width, vh = view && view.height;
  if(vw && vh){ opts.height = Math.round(SITE_MAP_CONFIG.screenshotWidth * (vh / vw)); }
  return view.takeScreenshot(opts);
}

async function captureOffscreen(table){
  const E = siteMap.esri;
  const host = document.createElement("div");
  host.style.cssText = "position:fixed;left:-10000px;top:0;width:" + SITE_MAP_CONFIG.offscreenSize.width + "px;height:" + SITE_MAP_CONFIG.offscreenSize.height + "px;";
  document.body.appendChild(host);
  // Build a throwaway view sharing the module's layer setup.
  const savedView = siteMap.view, savedMap = siteMap.esriMap, savedLayers = siteMap.layers, savedIds = siteMap.contourIds, savedRendered = siteMap.renderedInterval;
  const savedDiag = siteMap.diag;   // don't let the throwaway view rewrite the modal's report
  siteMap.view = null; siteMap.esriMap = null; siteMap.layers = {};
  try{
    await buildView(host, { offscreen: true });
    drawPins();
    // Off-screen path has no manual view to honour → default auto-fit (§6.1).
    const savedAdjust = siteMap.userHasAdjustedView; siteMap.userHasAdjustedView = false;
    await fitView();
    siteMap.userHasAdjustedView = savedAdjust;
    const view = siteMap.view;
    // Wait for the render to settle, but never indefinitely: `view.updating` can
    // stay true forever while a layer retries (§4.4), so cap the wait and shoot
    // whatever is on screen rather than hang the copy.
    await Promise.race([
      new Promise(res=> E.reactiveUtils.whenOnce(()=> !view.updating).then(res)),
      new Promise(res=> setTimeout(res, SITE_MAP_CONFIG.timeouts.layer))
    ]);
    const pv = pinsInView(view);
    const shot = await takeViewScreenshot(view);
    const dataUrl = await compositeScreenshot(shot, siteMap.renderedInterval);
    const meta = { interval: siteMap.renderedInterval, pinsTotal: pv.total, pinsInView: pv.inside };
    siteMap.screenshot = { dataUrl, valid: true, meta };
    return { dataUrl, meta };
  } finally {
    try{ if(siteMap.view) siteMap.view.destroy(); }catch(_){}
    host.remove();
    // Restore the interactive view state (and the modal's diagnostics record).
    siteMap.view = savedView; siteMap.esriMap = savedMap; siteMap.layers = savedLayers; siteMap.contourIds = savedIds; siteMap.renderedInterval = savedRendered;
    siteMap.diag = savedDiag;
  }
}

/* ===================== BOOTSTRAP ===================== */
async function boot(forceFile){
  // 0. Central store leads: when configured, the published row is the source
  //    of truth. A local copy is only an *unpublished draft* the editor
  //    resumes on purpose (see the Manage toolbar) — it never silently wins.
  if(REMOTE_ON){
    try{
      applyDefinitions(await remoteLoad(), "remote");
      return;
    }catch(e){
      console.warn("Central store unavailable — using offline fallback.", e);
      // fall through to the offline chain so the tool still works offline
    }
  }
  // 1. Local edits win (unless we are explicitly resetting to the file).
  if(!forceFile){
    const saved = localStorage.getItem(LS_DEFS);
    if(saved){
      try{ applyDefinitions(JSON.parse(saved), "local"); return; }
      catch(e){ console.warn("Corrupt local definitions, ignoring.", e); }
    }
    // 2. Remembered URL (e.g. a SharePoint link).
    const url = new URLSearchParams(location.search).get("defs") || localStorage.getItem(LS_URL);
    if(url){
      try{ const d = await fetchDefs(url); applyDefinitions(d, "url"); return; }
      catch(e){ console.warn("Remembered URL failed, falling back to file.", e); }
    }
  }
  // 3. Bundled sibling file.
  try{
    const d = await fetchDefs(DEFINITIONS_FILE);
    applyDefinitions(d, "file");
    return;
  }catch(e){
    console.warn("Could not load " + DEFINITIONS_FILE, e);
  }
  // 4. Nothing available — show the empty state.
  defs = null;
  defsOrigin = "none";
  renderSourceChip();
  renderBuilder();
  if(mode === "manage") renderManage();
  else if(mode === "map") renderMap();
  else if(mode === "ps") renderPsManage();
}

/* ===================== THEME TOGGLE ===================== */
const LS_THEME = "sort.theme";
const themeToggleBtn = document.getElementById("themeToggle");
function applyTheme(theme){
  const isDark = theme === "dark";
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  if(themeToggleBtn){
    themeToggleBtn.querySelector(".theme-toggle-icon").textContent  = isDark ? "☀️" : "🌙";
    themeToggleBtn.querySelector(".theme-toggle-label").textContent = isDark ? "Light" : "Dark";
    themeToggleBtn.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
    themeToggleBtn.setAttribute("aria-pressed", String(isDark));
  }
}
// Sync the button with whatever the early (pre-paint) script decided.
applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light");
if(themeToggleBtn){
  themeToggleBtn.addEventListener("click", ()=>{
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    applyTheme(next);
    try{ localStorage.setItem(LS_THEME, next); }
    catch(e){ console.warn("Could not save theme preference", e); }
  });
}

boot();
</script>
